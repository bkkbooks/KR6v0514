并算房該書將戶下產畝照數開付僧戶實為恩便上呈批該圖算書查明推收歸戶仍行知各該里冊書收除明白可也牌案杭州府錢塘縣正堂加五級紀錄十二次董為懇臺飭付總歸僧戶畫辦糧事准雍親王佛堂僧閱宗呈開前事前來據此合行飭著付歸僧戶除另檄知照外為此牌仰安吉五長壽五圖算房冊書速將本圖二上三甲楊縉賢戶下徵田五畝集福寺全戶人丁田地山蕩照依實在徵糧產畝撥付與城西二圖理安僧戶一處辦糧毋許隱匿開列原丈細號繕造清冊二本刻日赴縣呈繳以憑查明纂算條糧立等彚冊詳覆藩憲毋得藉詞故為掯阻如敢舛錯遲違定行差押究處不貸示詞具呈雍親王佛堂僧閱宗呈為懇憲給示護佛安僧永垂不朽事情因僧奉王命置買理安饍產前為請歸畫一過戶號冊並立僧圖辦糧等事呈禀藩憲蒙送臺下已蒙勅著各里開具細號清冊過戶歸立城西二圖自運甲寺糧按季全完但僧係弱門誠恐各里指稱派役差徭滋擾寺僧事未可定伏乞仁憲賞示飭禁使僧勒石不但僧回覆王命則緇流孱弱得以清淨焚修而佛地常輝實乃憲臺栽培之所致也上呈批給示示稿杭州府錢塘縣正堂加五級紀錄十二次董為懇憲給示護佛安僧永垂不朽事康熙五十三年三月初二日准雍親王佛堂僧閱宗呈稱情因僧奉王命置買理安饍產前為請歸畫一過戶號冊并立僧圖辦糧等事呈禀藩憲蒙送臺下已蒙勅著各里開具細號清冊過戶歸立城西二圖自運甲寺糧按季全完但僧係弱門誠恐各里指稱派役差徭滋擾寺僧事未可定伏乞仁憲賞示飭禁使僧勒石不但僧得回覆王命則緇流孱弱得以清淨焚修而佛地常輝實乃栽培之所致也等情前來據此為查理安饍產乃王恩捐帑置買現奉藩憲飭行勒石在於城西二圖設立自運甲令其完糧僧俗不相干預便得清淨焚修誠恐無知里遞指派差徭名色滋擾有干未便合行示飭為此仰住僧知悉嗣後敢有前項借端滋擾者許該住持據實赴縣指禀以憑詳究不貸督憲委錢塘縣諭理安打七牌案錢塘縣正堂加三級王為遵憲整戒等事奉總督大人那憲令照得本部院蒞任兩省雖土豪光棍業經密拏治罪其遊方惡僧未經考究是清是混仰縣即請有名誌載古剎誠實禪僧擇壇打七參禪自十月初三日起共四十九日止晝夜跑香毋得墮玩奉此照查本縣所轄地方雖有誌載古剎然慌唐游移者多惟吾理安寺及雲棲二處實係清淨焚修毫無舛錯今設壇于理安寺打七參禪仍請該寺方丈整壇督率並傳雲棲寺當家監香一面候大眾遵依到日解赴大人面諭考究釋教取具不違遵依送查如違嚴譴速速
