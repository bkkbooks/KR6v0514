body:
  text: 田畝虎林名剎每擅幽巖絕壑之奇而理安尤邃密高僧雲衲飛錫者爰止其地然厥初肇造精藍梵放高閒齋廚岑寂操瓶持缽常困屢空及我朝聖祖皇帝宏啟福田既頒內府金俾新靈宇復以錢塘秀水膏腴若干畝賚寺于是給園多士羣饌伊蒲香界四天徧聞金粟大哉皇仁施洽眾有古今檀捨之隆未或臻於斯極者也故謹條其疆畝錄之如左其他凡所裒益亦附見焉志田畝山坐落杭州府錢塘縣城西二圖十八澗地方騰字二千七百號石山一十八畝四分八釐三毫騰字二千七百一號石山二十四畝六分二釐五毫騰字二千七百二號石山二十七畝四分七釐四毫騰字二千七百四號石山二十四畝一分零九毫騰字二千七百五號石山六畝二分六釐八毫騰字二千七百十六號石山五十三畝八分二釐七毫騰字二千七百十三號石山四畝正騰字二千七百十四號石山十畝一分九釐六毫騰字二千七百十五號石山八畝正騰字二千七百十八號石山七分一釐騰字二千七百十九號石山三十四畝零七釐一毫騰字二千七百二十號石山二十五畝三分三釐七毫騰字二千七百二十一號石山七畝八分五釐五毫騰字二千七百二十三號石山七畝一分四釐四毫騰字二千七百二十四號石山十二畝二分騰字二千七百二十五號石山二十一畝七分零二毫騰字二千七百二十六號石山十七畝八分七釐五毫騰字二千七百二十七號石山八畝七分六釐九毫騰字二千七百二十八號石山十七畝一分四釐八毫騰字二千七百二十九號石山十二畝二分五毫騰字二千七百三十號石山七畝三分騰字二千七百三十一號石山三十三畝零三釐二毫騰字二千七百三十二號石山二十三畝零七釐六毫騰字二千七百三十三號石山一畝六分六釐三毫騰字二千七百三十四號石山三十四畝二分八釐四毫騰字二千七百三十五號石山二十五畝一分七釐五毫騰字二千七百四十二號石山六十畝九分三釐八毫騰字二千七百四十三號石山十八畝零一釐騰字二千七百四十四號石山三十二畝五分七釐三毫騰字二千七百四十五號石山八畝零八釐騰字二千七百四十六號石山二十畝三分五釐三毫騰字二千七百四十八號石山十畝正騰字二千七百五十一號石山八畝零八釐騰字二千七百九十九號石山十六畝零七釐八毫騰字二千八百二十七號石山十三畝一分五釐六毫騰字二千八百三十號石山三畝七分二釐四毫二絲騰字二千八百三十二號石山五畝六分六釐七毫騰字二千八百三十三號石山十三畝九分九釐騰字二千八百五十七號石山五十二畝三分三釐八毫騰字二千八百七十六號石山十六畝三分八毫騰字二千八百七十八號石山六十畝四分三釐八毫騰字二千八百七十九號石山二十四畝一分騰字二千八百八十號石山三十五畝八分八釐八毫騰字二千八百八十一號石山六十二畝一釐五毫騰字二千八百八十二號石山十九畝零六釐七毫同號石山十五畝八分騰字二千八百八十三號石山三十八畝正騰字三千一百五十七號石山三畝七分二釐四毫同號石山五畝零九釐三毫同號石山十畝一分九釐七毫同號石山三畝二分騰字三千一百五十八號石山四畝七分八釐三毫四絲騰字三千八百三十一號石山二十畝六分二釐五毫體字一千三百零四號石山九畝四分四釐四毫坐落徐村地方騰字一千零九號石山九十畝九分五釐八毫傷字八百九十二號土山一畝五分傷字一千一十五號石山三十九畝傷字一千一百一十號土山二分零七毫二絲九忽傷字一千一百一十二號土山一畝二分騰字二千七百零三號土山二畝六分四釐六毫三絲騰字二千七百十七號土山二畝七分三釐七毫騰字二千八百七十五號土山六畝八分八釐騰字二千八百七十八號土山二畝正騰字二千八百七十九號土山二十二畝四分四釐七毫騰字二千八百八十一號土山一畝九分羌字三千九百七十四號土山十九畝六分九釐八毫體字一千三百五號土山十畝二分三毫以上共石土山一千二百六十七畝六分零一毫六絲九忽內石山五百六十一畝三分六釐一毫二絲係康熙五十一年迦陵音禪師奉帑金置其餘七百零六畝二分四釐零四絲九忽皆明季以來各住持募檀信所置田坐落嘉興府秀水縣伏禮鄉下扇三圖列字三十三號田三分八釐列字三十四號田一畝二分列字三十五號田一畝九分列字八十三號田二畝九分五釐列字八十四號田一畝九分列字八十五號田六畝二分列字八十六號田三畝八分列字一百六十三號田一畝列字一百六十四號田一畝列字一百九十三號田三分列字一百九十四號田五分列字一百九十五號田二分列字二百零九號田八分列字二百三十號田一畝原字二百九十號田一畝九分五釐七毫原字二百八十九號田二畝九分六釐二毫宇字七百五十六號田五分五釐八毫宇字七百五十七號田一畝四分二釐五毫黃字二十號田四畝四分二釐四毫黃字二十一號田六畝三分一釐七毫黃字一百九十五號地七分五釐黃字二百四十八號地五分黃字二百四十九號田八分黃字二百五十號田一畝二分黃字二百六十四號田一畝五分黃字二百七十五號田三畝四分黃字二百七十六號田一畝六分黃字二百八十一號田七分黃字二百八十二號田一畝黃字二百八十三號地三分辰字八十八號田一畝零五釐六毫辰字一百三十三號田七分九釐四毫辰字一百三十四號田六分三釐辰字一百三十五號田五分一釐辰字一百三十六號田一畝零二釐辰字一百三十七號田八分零三毫辰字一百三十八號田五分一釐辰字一百四十二號田五畝零八釐九毫辰字一百四十三號田一畝四分五釐五毫辰字一百九十五號田四釐二毫辰字二百號田三分一釐昃字一百八十五號田三分四釐四毫昃字四百一十六號田一畝八分零五毫以上實在田計共六十七畝八分係明季法雨大師與國初箬菴禪師置四明戴澳藏閣僧田疏理安寺廢久矣佛石大師趺坐蘿藋中與猛獸爭所者十餘年始有感其異而為之立精舍者三十年來憑林起棟即石成基堂殿廚廊略已完葺顧獨缺一藏經閣師故可以無祖何必有經師故可以正法眼藏作法王行祕書何必有藏經閣然今之勝流高衲至湖上而尋放杖落屐之處則必首理安寺且不無夢聽南澗之午鐘魂洗松巔之法雨者知皈嚮師耳知有師因知有理安寺有理安寺自不可無藏經閣至法侶雲集寧當借飯香上古有捨身為法者各隨願力使藏經有閣飯僧有田其於功德亦遠矣楊師孔募藏閣僧田疏大藏千百億萬言不知藏在何處裂綿泥金潢楮繡墨橫畫豎捺左圈右點不知是字跡是真詮是糟粕試問大師支傘獨坐空山時雪片堆眉冰花盪胸還有是莊嚴景象還有意放開有意藏匿還知自家饑寒還知他人饑寒否若還有知境隨心滅若還無知法自道生道人試為師下一轉語藏大藏以醒大千眾生同耀光明畢竟藏無所藏種福田以飽大千眾生同滿厭飫畢竟饑無所饑依然支傘獨坐雪堆眉冰盪胸時也由前直是拿得進來由今直欲放將出去原于師一毫無罣礙也有大善知識自生懽喜黎元寬募置齋田疏余昨自長安邸居炎暑煩苦奔走空乏中心致不樂乃從某聞佛石上人名則大爽然既而詳其所為開拓理安寺功德以枯坐得之視余之勞勞於炎暑煩苦奔走空乏中而求之者所就倍萬則不獨自失其故而且若有進焉者矣據此一時一心覺已直透頂宗無復退轉豈不善哉無何而以督榷至浙一官之苦又有浙之長安矣爾時即不得遂其初聞佛石名而大有開悟之心然試一往觀以堅其信實其所聞則亦易易也乃五閱月竟不得往五閱月後往又因聞子將仇聲之為之從臾非然幾於忘佛石也此可見余之為善而不果者余之為善而不果獨此也哉佛石乃出其詩若干及理安緣起以相示較昔之聞而爽然而且若有進焉者更覺親切焉於是余思為功德于佛石而佛石則以募建藏經閣并置齋田屬余題辭於是余慨然任之非此時即能勇於為善將以志其不果之悔也予之所當悔者獨此也哉乃發心于五月而至于十月始弁一言則悔後而又得不果焉夫余之不果於為善而悔悔而復得不果者又獨此也哉余時司竹木則於藏經閣猶力所可支非期乎獨力亦乘其易勸也大藏非中國有而且玄奘能往鳩摩能來況已有經而特謀其藏力可眾支而加之以勸豈有不欣然從事意者人之為善而果不待於悔或悔而不終於不果其善心猛力固有出於予上者乎沈洵齋田碑記蓋自一花拈示獨衍心傳異草誕生聿興人瑞斯固先民之絕軌至聖之神機不可以巧力求不可以心知測也故有教無類雖開廣大之門而得意忘言遂息階梯之徑若其紹述有人津梁攸濟宏敷至教大庇來茲厥功茂矣能無傳乎然而寶林勝地兆始發於香流祇樹精藍功實繇於金布是以招提異境自有奇因瓶鉢生涯尤資檀施業無微而不著德有善而必彰固當此垂觀聽永立勞規者也茲惟佛石大師行潔冰霜德涵江海宗風玄暢遠承嵩少之源詩律清新無異石門之響肇迹錢塘徧參名宿年纔髫齔已悟空玄始依雪浪之座響答無遺繼登紫柏之壇機緣遂契親承密印大闡幽微得最上乘開正法眼遂乃振錫南旋別開殊境止足於武林南峰之十八澗一笠相隨隻身遙寄蔭松成蓋藉草為茵蔽荊棘於中林殉肌膚於猛鷙志動神靈感均異類遂使威慈被物鳥獸咸馴盛德生輝山林增蔚夫國一開基於雙徑而龍遜其居誌公卓錫於潛山而鶴移其處以古方今信不誣矣迨至樵採傳聞野人餽食固已歷盡風霜代遷時序既而緇素景從始搜榛莽遂平沙礫爰立茅茨初作維摩之室嗣開禪誦之堂因高就遠復古崇基雲擁江流星羅越甸廻崗復岫之際倏爾殊觀息心了義之徒於焉雲集禪師厭棄塵囂絕跡城市貞心苦節自始至今蓋四十餘年矣爰有秀水縣杮林鄉普濟菴道者周普牟等皈依投誠捐資作供思悠遠之圖立常住之業辛勤轉募積累成功或施自縉紳或集從緇侶彼以捨來此以慈受遂得齋僧田若干為理安下院續有楊居士等同心立社纘繼前修捐產助銀復置齋田若干畝係某都某圖耕耘斯在農安甸服之居道里非遙歲輸仁者之粟遂使山中習靜終賴安閒松下清齋不需行乞又有秀水縣王明府給之符牒免其差徭大裨能仁永為成式猶慮功積而名湮世遠而義晦用利貞石載此蕪詞庶使善行顯聞令模無替云爾順治四年秀水免差徭帖嘉興府秀水縣為懇恩照舊優免以安禪修事據理安寺僧普乘呈稱本寺係歷代諸祖創立叢林現居宗匠接衲傳流向蒙本郡鄉紳吏部金太僕曹洎諸善信捐資置買常住齋僧田六十九畝七分六釐坐落杮八都上九冊立戶辦糧閱歷多年俱經優免照帖石碑可證茲值熙朝鼎定雨露方新懇乞恩照舊例仍前給帖優免庶寺無戶役之煩僧安禪誦之業等情前來據此為照理安古剎雖隷於武林常住齋田仰給于禾郡第焚修衲子奚堪當雜泛差徭而萍集禪和似應與殊恩優異本縣培此福田眾各安心淨業合行給帖付照為此帖付本僧收執所有本寺常住齋僧田六十九畝七分六釐仍舊戶立該圖辦糧其餘里役差徭照例一體優免永為遵守須至帖者順治四年七月十二日給坐落嘉興府秀水縣零宿鄉上扇十六圖田號開後列字六十七號田一畝九分列字六十八號田一畝六分列字六十九號田一畝列字一百六十二號田一畝列字二百零