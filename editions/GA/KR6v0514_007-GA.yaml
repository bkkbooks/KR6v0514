body:
  text: 著述粵自騰蘭演法拯溺逝川性相澄虛祗園寂照印空慧於身心因文詞為解脫言之不可已也厥惟舊哉寺之宗旨闡乎法雨箬菴而繼此肇興則天笠最稱極盛是故弘啟八正妙演一音奧諦緒言上登秘藏其餘纂述寖以滋多又況上遡宋元迄於今日寶地澄輝名流連襼極勝引之鉅製結蓮社之清緣月故歲新裒然成帙爰是兼搜眾妙用表鴻裁庶幾常與名藍共不朽也乎志著述理安寺紀四卷法雨大師緝板燬乾隆戊寅住持實月重刊仁和吳樹虛序始予與智公往來於定香定香破寺也飱粥不繼未幾而腐朽化為莊嚴學侶自遠來集聲名洋溢於武林諸梵剎間甲戌之歲遂繼其授法和尚之位於理安於今五年公嘗謂予曰理安為諸山辦道之最參方諸德友向有生死理安之謠蓋以地僻遠於西湖遊人舟車所不及鉢飯悉仰給於城中午爨之餘隔日而運諸寺食常饐餲齋施簡之居者無以完整衲裓自非放下一切專其念以究明大事者裹足悉不肯𦮯而禪堂蚤晚規矩香板嚴緊十二時中不得一二時之偷以安挂單未幾脆弱者以病告其勤策學處也如是是以出於其堂者破關透網較他處為最多今予主此志欲振作淬厲還其向時模範而時異習異稍切磨之而慮其堂虛無人因循以迄於今理安不負予予則有愧於理安其思有以解其愧斯可於是謀作寺志乞諸杭太史堇浦既告成矣復以理安鐘板開堂始自箬菴和尚而箬菴之受度師則為法雨上人重創茲寺因作寺紀板刻亦毁矣乃繼新志為重刻之夫智公之楗椎接引豈有愧於昔之人哉特以西湖諸叢林首稱五山理安預五山之數而獨無志亦寺主人之一闕也智公不欲露前人之闕姑以是為辭又以寺經朝廷改建宏模壯規迥殊向時見者口豔於恩寵而目觀其巍峩幾忘昔者風雪破舍中有老人一杖一瓢畚沙以築基薙草而置棟拮据數十年始得發伏虎師之遺跡則其重為刊此其措心不亦微矣乎智公為箬菴五世孫名實月字智朗江南上元人今來問序樹虛為發其微以詔來者乾隆戊寅歲三月住持實月跋理安五代時伏虎禪師創建至明隆萬間化為荒烟蔓草佛石大師一繖一鉢入澗中勤苦數十年再成叢席箬祖因之脫白建立石磬宗旨為其後者可不飲水思源知所重乎佛經孝順為戒禮云子雖齊聖不先父食康熙年間托寺重建奉箬祖諸住持之木主於正堂祀大師之肖像於偏所失禮甚矣如曰重宗統則吾不知其說遺囑云建寺始末悉載碑記參訪緣起在行實中并著有微笑南澗等集今俱無從考核此紀大師手蹟得自杭太史處捧讀之間而雪眉跣足搬石拽木之一老僧儼立於目前矣恐復湮沒刊刻流通并敘其事如左庶閱者知所重云乾隆二十三年孟夏上浣南澗集一卷法雨大師與名人倡和之作板燬山居詩一卷法雨大師著雪嶠大師序佛石禪師埋沒山中三十年逍遙過日一味隨緣不知有佛有祖惟見疄頭蔬鉢中飯一飽便休伸腳打眼翻個身來白雲牀腳紅日窗櫺習氣現前高歌低調或踏月過山頭或問花上螺髻法雨巖頭躬身滌硯點點滴滴俱乃自己鼻孔中流出受用何多月久浸深積成數十篇門人刻行與人間咏之謂佛石山儂法雨詩丁丑仲夏徑山青獅翁圓信天笠禪師跋法雨大師山居二十七韻明隆萬間重開理安時作也語風大師書序流通海內五十餘年矣順治戊戌秋蜀中丈雪醉公賫破山和尚遺錄至維揚乞弘覺老人筆削而法雨詩亦屬稿中老人驚訝以訊醉公公答以本師住山時作老人笑云此是武林十八澗法雨詩乃箬兄受業師也其詩金聲玉振天下學者誦之誤證為汝師詩豈不取笑天下乎醉公固爭不已老人呼左右即於淨慧園收法雨詩數卷示之醉公杜口怏怏而退稿中刪去法雨詩矣庚子夏有蜀僧復持刻本以法雨詩為破山詩另行楚蜀間此余兩次目擊何醉公沉迷不醒若是按破和尚行由崇禎間始參天童出主東塔未幾返蜀法雨詩乃隆萬時作此詩可移年代不可移一也語風序中或問花上螺髻法雨巖頭躬身滌硯此詩可移山水不可移二也詩中有千樹楊梅百畝茶蜀中無楊梅此詩可移佳果不可移三也又有箬屋舊來新草生箬屋即今之且住菴大師初創時先師來求芟染即以菴名字之此詩可移人物之不可移四也吾聞破和尚在蜀法體雄偉現逆行菩薩相數人輿舁不起若我開山大師木食澗飲清苦自勵所謂山勞半世白鬚生骨瘦翻嫌拄杖肥二十七韻中句句字字寫南澗面目吐法雨血心詎可借貸他人此人詩之斷斷乎不可分移者五也縱使醉公具大神通奮五丁之力祖龍之鞭鞭南屏西湖納諸瞿塘灧澦堆中第恐鞭折力疲而牛後之金鮑魚之臭傾三峽之水不能洗其萬一也矣況破和尚乃宗門碩匠豈假以詩鳴世耶嗚呼彼時弘覺老人明誨若霹靂震其頂𩕋而醉公之醉至今不得醒何哉丁巳春余再領南澗閒誦法雨詩勉以巴調和陽春并辨其種種之誤於後云續五燈存稿十二卷箬菴大師緝笠澤居士華亭施沛彙集華亭沈荃序嘗聞世有以海嶽為大者乎曰未也天地固覆載之矣有以天地為大者乎曰未也虛空具涵之矣然則孰為大者乎曰惟心為大蓋心虛靈不昧包涵乎六合萬彙者也嗚呼心固大矣苟非穎悟其精微極致曷知其為大者哉是故聖賢治世戒謹恐懼修道教育不可須臾離其性也佛祖應緣直指朗悟傳法度迷不可毫釐異其心也足徵儒佛之性理至矣大矣無間然矣余操觚游藝時偶過山寺得閱五燈會元一書展卷如獲舊物遂留止晨夕不覺終卷備悉佛祖心心相印燈燈相續教外之旨無盡之光溢乎心燈言象之表可謂至大至極者歟故曰天地萬物至空而極江河淮泗至海而極舉世賢愚至佛而極是書之有裨於玄學修道之士可勝言也耶於是三餘之暇得與吾鄉笠翁蠡菴二師游然已默識其為法門龍象矣惜乎蠡公中殞於虞山而笠翁翱翔乎楚甸余亦宦游於四方自兹音問闃如二十有矣乙卯秋忽德音遠逮上首允公來京師并賚箬大師所緝五燈存稿命荒言弁首猗歟休哉續數百年來祖祖相傳之慧命照耀於今昔得非乘夙願而來歟余雖不敏是素志也序何敢辭方今天步維艱逆氛未殄幸邀諸祖之微言冥贊皇猷之至化俾封彊與法海彌寬聖德與心燈永大余夙夜匪懈鞅掌絲綸晷刻不忘其大者故樂為之序云爾時康熙乙卯陽月朔門人行昱序昔世尊拈華迦葉破顏微笑達磨面壁神光斷臂安心逮至曹谿以降沿流益長波瀾益廣唱愈高機愈峻派列五家門庭各立或電捲風馳或孤危聳峭或金針綿密或父子投機或箭鋒相拄其千差萬別各各不同苟非具載本末則後學何從考證斯傳燈五燈之所由作也自宋季迄今四百年來雖溈仰法眼雲門三宗不幸相繼無傳而臨濟曹洞二支繩繩不絕代有其人奈何闃然未有繼其作者致使大方宗匠湮沒無聞佛祖慧命何翅一絲之懸九鼎哉先老人為此深懼留意捃摭蒐羅有年每出訪求不遠千里崇禎壬午夏晤施別駕於雲間得其所纂不謀而同於是浩然而歸載筆從事又數年編集成書正謀鏤板遭時搶攘復秘而藏之不幸先師遽云示寂十餘年來昱僻居荒裔力不從心切思年運往矣來日幾何投足拊髀詎容再緩參徒定浪平能憂人之憂慨然擔荷成此勝事後之復有繼而作者或由此而推廣之俾燈燈不墜斯文豈有既哉康熙丙午中秋箬菴禪師語錄十卷門人行昱等編蔡聯璧序只這一針一線刺繡鴛鴦手眼各別故拈花微笑密密聯絲斷臂安心燈燈矗焰以至兩派分支五宗競秀亦總這一針一線也覿體不異拈用匪同何以故悟繇元從本領作略自趁玄機秪個禹門龍池跳出天童磬山兩大老轟天震地世界掀翻天童矢尖加鏃放去太危磬山袖裏藏鋒收來較捷盡世英靈都不出二老圈繢石車費隱破山諸翁嗣天童其最著者所以天童昔年解制金粟有放出一羣猛虎句喜可知已亦復各守邊疆各豎旗幟虎驟龍驤疇楚疇漢而嗣磬山有林臯箬菴伯仲兩師翁叔季皆崢崢獨壁護兩翁法席最切領兩翁法要最親兩翁固塤箎也然乃玄猷殊展應機迥絕奇哉希有彼劍有銛鋩能射九霄之斗此水無筋骨能勝萬斛之舟彼老碪枯樁從霜雪堆頭坌出布霧蒸霞此大鵬金翅從荊棘林中展開摩天垂日道同幾相謀耶至於登磬山之堂據螺峰之頂把住津要攔截咽喉塗毒龍蛇煅煉凡聖挽起也兩莖鐵眉噴來也一盆火血無解無結斷送春秋同作同為渾忘賓主一霎掃陳年葛藤一霎翻新年公案刀耕火種寥寂門風運石搬沙尋常生活從上古錐今日作家又無出這一針一線也雖然對對鴛鴦飛譜上莫被鴛鴦換眼睛請更向未下繡時著隻眼咦崇禎丁丑中秋門人行昱重刻箬菴和尚語錄序汾陽老祖嘗言行腳時所見知識七十餘員其間具大眼目者僅得一二行昱始閱傳燈疑其言之太過自今觀之不足怪矣吁濟上一宗四百年來陵夷殆盡苟非先南澗乘願輪而來振領提綱倔起一時則列祖不傳之要寧有今日自先師遷化十有四年聞見日益不堪洵如蘇子之言深山大澤龍亡虎逝則舞鰌鱓而號狐狸者也丁未秋杪天山定姪從浙中歸得理安堂頭洸法弟手書并寄先師五會錄一部焚香展閱頓覺耳目驚換數年土面灰頭一旦毛孔震裂茫然自失莫知端倪不異三十年前南澗室中親炙先師景況反覆紬繹終日不能釋手竊念是錄湘南潭北皆未及見欲重梓以廣流通復慮溟涬浩瀚讀者不能卒業摘其平易者僅存其十之三手鈔為一編以公諸同志擇乳鵞王素非鴨類若謂先師有所說法則劍去久矣時戊申孟春正宗錄六十一卷梅谷禪師緝自序夫道本無言栗棘蓬可吞此語不可吞也因言顯道金剛圈可跳此語不可跳也昔者積翠老南禪師深諳此義故彙刻馬祖百丈黃檗臨濟平日提唱語諸方識者稱為四家宗要嗣後有藏主頤公者即此四家上冠南嶽下續二十餘人并收青原下十餘人總名古尊宿語錄至今叢林猶得覩諸祖全體大用實承二師之力歲月迭遷屢經鐫刻其中編次之倒置字句之魯魚大非二師手編面目矣悅不揣孤陋詳加校訂凡重複者刪之譌謬者正之倒置者序之殘闕者補之又於揚岐下續白雲東山下續圓悟至禹門別作一帙為曹谿直下相承三十三代之錄蓋因曹谿中葉正脈衰微若寶藏東明諸祖語錄多散佚湮沒或未廣流通悅為此懼乃合其散佚并流通未廣者並依源流編次而上承下接燄續輝聯庶幾永無零落且便並廣流通若古若今若孫若祖歷代面目具在目前使後世宗支溯流窮源不假他處尋覓展卷可得也草創於丙申之冬至丁未秋自嶺表送列祖提綱錄板入藏歸寓金陵蔣山始獲慈祖行實碑及親書付瑄祖偈方得脫藳起自南嶽止於禹門命曰正宗語錄凡六十一卷二千一百餘葉七十萬餘言又經四載復入嶺募資刊刻備遇逆境不敢萌纖毫退志茲幸廣州眾檀同發為法忘軀之心表章宗祖之志各各助資助力兩閱寒暑方竣梓工更喜目山大師樂為讐校用免誵訛爰識歲月以志不忘盛心悅自念闇劣無能裨益我宗大典尚冀大方尊宿慈施垂示焉康熙十一年壬子十月前住持南澗理安寺平江比邱行悅書列祖提綱錄四十二卷梅谷禪師緝錢塘陸圻序竊聞釋氏之教不立文義科指則提綱胡為者也史家者流綱以為書法目以為序事而子雲亦云紀事者必提其要然則宗非史史非宗胡為而提其綱哉乃予則以為不然禪之為訓也書不盡言言不盡意學者但當推其不盡而有以立於其通不得謂書與言之遂可廢也若執以為繁稱曲說破碎大道而與荒經蔑古者等則是愍度道人可以立心無之義而黃梅獦獠可以墮無記之空也乃予所交呆翁和尚得法於南澗箬尊宿而顯揚先世之烈輯有列祖提綱一書連類比物按部考班蓋秩然不可亂者幾於禪之史矣乃予以為禪有五燈會元則問答機緣於是乎備禪有列祖提綱則因時化導於是乎全而其所直指者即從同同固未嘗以多岐惑也且臨濟之賓主歷然曹洞之君臣道合何處不提其綱而必訝和尚之創興耶是在善讀者乘時而進顧鞭影而馳得書以實其虛緣悟以虛其實夾擊而兩無所住則必有劃然以解者而我轉法華何必不更讀法華哉康熙丙午十月既望住黃梅四祖雙峰山東吳沙門戒顯序靈山拈華少室安心雖曰直指單傳不立文字而以楔出楔用兵止兵既於無言說中而藉言說即於無綱要中而有綱要故曰依經解義三世佛冤離經一字即同魔說不易之道也奈耳食者流膠滯陳說謂既稱向上眾流截斷惡藉文言又云既號宗門拈來便是豈有格則且援曹谿不識字為躱根捷徑由是邪正不分朱紫混雜羣言淆亂瓦缶爭鳴言不涉典章事不合軌則街談俚語信采亂道蜀日粵雪反肆譏訶而宗門事大變矣呆翁悅和尚與余同土且共事有年既而法嗣南澗旋從繼席道行四載痛念法門江河日潰砥柱無門佛祖慧命攸關端在說法乃裒集列祖法語分門析類輯成部帙自上堂小參示眾普說以至隨機拈示各有科條其見諸行事者千端萬緒一準大智老祖百丈清規綱舉目張各有部從題曰列祖提綱錄比類以觀如亞夫細柳之陣紀律精嚴如光弼入子儀軍壁壘一變俾末學晚進猶及見古德說法大全厥功匪細矣或曰禪貴胸襟流出稱性吐露今編列義𩔗動成格則令剽竊之徒印板打來模子脫出不更與賊過梯乎余曰非也學家杜撰亂說只為不通綱要倘肯向此精研自然識法者懼如入清廟明堂見三代禮樂綿蕞倨侮自慚兒戲高者金章玉句剔骨刷髓次者亦規行矩步言不妄發狐犴喧囂得此大救懸之國門布之叢席豈不與統要聯珠五燈諸集共為宗門日月也哉住金陵棲霞寺古閩沙門大依序吾宗自大智以下典模大備誠所云三代禮樂也洎南宋後稍凌夷衰微矣有明二百餘年岌岌於廣陵散熹廟間諸老先後高建旗鼓於江東南嗣而兩宗門下莫不家發豐城之劍人懷射斗之光但頹靡之餘叢席草創法紀未詳近一二老成留意舊章者亦既神而明之然綱要未經提揭而條理依舊參商予二十年前與呆翁和尚同參濟下尊宿每抗論及此蓋不勝扼腕焉既而南北各師吳楚異域和尚久出世名藍為東南衲子所皈一日竟拂衣去抱特立之志走天下名山川廣搜博採二十年來而列祖提綱成自粵北歸首抵金陵過我攝山燒燈道故爰出是書命為弁首快意之餘焚香載讀如登百丈堂見聲鐘伐鼓千五百人濟濟蹡蹡載奔載拜也至於法言之超卓眼目之分明四百餘人如出一人四十餘卷不多一字集者之心力真鎔鑄古今矣或云禪貴妙悟文言其末規則奚為設若令世尊降天垂寶蓋之重向紙錢灰裏坐臥舍花雨梵樂之供就廚房竹筒裏覓食則四十九年百萬人天將何所瞻依何所開悟耶抑思沛公之馬上終歸制度鵬舉之野戰還習陣圖安有到潼關云見天子外宮牆能富百官也是書也三百餘種三千餘則合上下古今人先型俱在目擊道存皆和尚之血心片片赤手提持倘或承言滯句播弄篇章帶累呆和尚沒量罪過而列祖亦沒量罪過也自序宗門列祖之機緣拈頌禪燈諸錄載之詳矣宋元諸尊宿見後學罕能通究復為採摭機緣繫以拈頌別訂集本流布叢林使學者備考明辨易若指掌此真大法光明幢也其拈古集曰宗門統要頌古集曰頌古聯珠然統要又見續集聯珠亦見通集矣惟列祖陞座提綱語古今採集者闕如每遇叢林先輩咸為慨歎行悅人微道薄聞見陋狹勉承先輩之志借百丈清規住持日用諸事會集列祖提綱語二十年間蒐獵羣策以事集言因言立事或今或古隨見隨書故無尊卑世次宗派異同僅如妙喜之正法眼藏其編次標題概遵清規舊本所集古今提唱宗師四百餘人在臨濟至龍池幻祖下三世止曹洞至壽昌經祖下三世止雲門澄祖下二世止其溈仰雲門法眼及五宗前正傳旁出諸祖各收至燈錄止處提綱語三千餘則叢林所宜事務之要三百餘種命曰列祖提綱錄次四十二卷雖列祖提持佛法大綱旨要固不在兹而於唱道立言之體大略備矣庚子春因謝先南澗院事乃攜是稿浪遊粵東感都督栗公性然并劉公新菴鳳菴兩護法喜流通大法捐資共為剞劂首倡雄郡郡伯陸公孝山葭州太尊閔公捷宇保昌邑侯李公集公及王公曼壽李公茂先張公徧菴蕭公聖至等解槖捐資翕然樂助板刻既成謹書緣起於右康熙五年十二月成道日梅谷禪師語錄八卷宋之繩序呆翁和尚濟下宗工錐劄後學語語血痕凡有心眼者靡不嚮往而傾誠之客冬飛錫瀨渚暫止東林去敝廬僅數百武而予適患風痺不克一扣洪鐘因緣間阻可勝太息臨濟正宗傳至慶暦危乎九鼎懸於一絲實得吾鄉幻師老和尚唱道禹門光明炫赫千日當空門下象龍星分棋布其鼎峙海內者推天童磬山兩宗特盛師磬山嫡孫南澗真子今上首源公長老持師平日提唱見示病餘展讀如明月走盤不足喻其活潑如吹毛出匣不足喻其鋒鋩如金剛圈不足喻其難透如栗棘蓬不足喻其難吞信乎臨濟真正血脈與諸方自別如臯范端序從上佛祖明心見性不可以名相求安有文字文殊入室乃至無有至於五千四十八皆文字中見性靈即機鋒湊合亦在忘言得力之後豈一味寂照便可了當七佛二十八祖悟道有機緣傳燈有錄文字亦方便法門也古今衣鉢相承必心口印證而授受始為有據然則支那撰述其曷可已乎呆翁禪師嗣磬山正派先後開堂南澗龍光蔣山諸勝皆具獅子奮迅說法如雲雷傾動六宇閉關雉臯歷有年所甲子飛錫京師九臯一鳴流聞天野非吾學之云聲色不大者乎時余歷任版曹公事暇竊探門外不勝歎服一日因國舅佟公達於朝允建剎延師適駕東巡剎未遑師遂圓寂其明心見性普示學人者歷歷目前所著法語如舌上蓮花庭前柏子不足殫其義藴付剞劂以廣流傳凡利生覺世者可知文字言語乃不二法門此編一出不怕狂象不就馴瞎驢兒不開眼也釋大依序握掣電之權者未必窺二酉之祕爛天花之藻者自不神石火之機合璉嵩之靈苗為濟洞所欽式今不能不翹首我梅翁呆和尚也和尚吳門人於丙辰年月日時郡人見白光燭天和尚母夫人夢梅而和尚生焉命名杲襁褓口喃喃皆佛字聞者異之稍長業儒目十行下才河漢無極老師皆憚之既盡讀古人書曰此無與生死也因閱大慧禪師錄有省遂棄家受業於中峰蒼雪法師講筵數千指首推和尚一副講即四座辟易起再歲詣清涼徹和尚受三聚戒徹深器和尚也禮愛出萬指上一日墮枕子徧參天童石鼓千指曹谿金栗報恩徑山雲門夾山南澗乃嗣南澗然所至皆首肯和尚獨不可所謂在溈山不肯溈山在洞山不肯洞山獨於南澗一見機契推第一座予始自夾山過報恩法堂稠人中和尚視予且久予亦視和尚久旁人不知也乃相與數晨夕上下古今者久之和尚謂予曰此法門何等時也神前酒臺盤溪深杓柄長之語我兩人勉之予唯唯恨見之晚是時濟洞下法席棋布和尚聲稱藉甚凡腰包者皆仰止和尚焉既罷參始養母終其喪開法於浙之古漏澤而甘露而淨居而小雲棲而天福而東林而白雲而龍山而伏虎禪淨土龍象肩相摩和尚壁萬仞立而望崖點額者比比然也有各剎錄行世平生一食敝衲又性躁好直言不苟與世人晚結茅深塢以永明百八自律游覽華藏入龍祖月輪三昧人莫測其所止云南菴依曰予與梅和尚先後出入於石磬下尊宿之門故予於諸衲子中獨深知和尚者也且無論和尚人天報所至龍象而冥冥之神請說法要當絕人遠甚和尚法座徧天下著述充棟梁晚律百八入月輪三昧予亦何足以知和尚也所恃和尚知予深敢謂予深知和尚有自來矣高風凜然可畏而仰鶴林釋行植序原夫曹溪滴水雖分為五派獨滹沱一脈瀰漫浩渺莫測涯涘繼而流入龍池頓驚浪涌雷轟雲興雨布頭角並現神變愈奇由是太白燈傳天下磬音響震中外法運之隆靡過此也我南澗法伯箬老人門下諸兄尤為烜赫各化一方建大旂鼓梅翁法兄和尚更居其首梅兄少挺生知棄儒學佛初歷講筵繼登禪席所到之處丰儀温雅人皆喜近之至機辯縱橫人又敬畏之昔張子房貌如處子坐籌帷幄萬夫莫當永嘉一宿覺柔弱亦然然其發言曰急須提起吹毛利要剖西來第一義則猛利可知矣梅兄居恒好戴幅巾著皂靴舉止飄逸宛一儒者標格見人和顏悅色藹然可親及其整刷風規操持法柄則如棘門霸上詎可觸其鋒鋩徧叩尊宿當仁不讓勘驗學者縱奪自由設遇不是那家種草拈弄這家茶飯以法為戲論者必正言厲色深錐痛剳使其情枯智竭口呿目張而後已所謂佛法無人情放過則不可老婆心切有如此者或曰梅兄一生卓絕過人惜無紹後余曰非也梅兄四坐菩提場槌拂之下緇素參隨者莫計其數豈無一個半個入其堂奧密契其意者乎或祕重韜晦一旦時至理彰人天眾前拈出瓣香知恩報恩亦未可定此不特慶悔兄之有後抑以慶法門之有人也余當拭目望之兹者護法魯菴張公請金山鐵翁法兄和尚董率智可度公編錄梅兄遺稿付梓屬余序余愧不文又不敢卻蓋梅兄同門契厚莫過鐵兄而最後知深又莫過魯翁與余故其入滅將近並以後事見囑旨固有在也嗟乎梅兄著作頗多今遺稿十不存一然廣大精微靡所不備讀之者自能眼開心悟不異現在說法在生平行由詳鐵兄傳中余僅述其概云顯正說一卷濟水洸禪師著天笠珍禪師序法道下衰莫甚於今諸方鬥諍堅固涯岸各封欲抑濟源之盛謬云先斷必先續濫收無統系之徒直列之於前擬尊洞派之高偽稱先覺即後覺擯棄有名位之祖反置之於後其間矯亂傳燈疑誤正統難以枚舉不有具大眼目痛傷佛祖慧命者聿起而輔正之則後學從冥入冥滔滔趨下莫之返良可歎也余生不辰忝厠法門自五領祖席以來無補於世惟朝夕與十方衲子眉毛撕結必期徹證己躬下事圖報佛祖萬一而已至於諸方是非非是不願見聞乙卯秋訪濟水法兄於花塢挑燈夜話間出製作千餘言文簡意深理直氣順句句摧訛顯正揀異辯邪讀之不忍釋手蓋為洞下位中符公出釋誤篇之誤而反正之嗟乎吾濟兄謝事南澗數載韜光巖谷諸方咸稱古佛安有古佛動念發此不平之鳴則知符公誤己誤人誤祖宗之極矣釋誤種種之誤余無暇置喙獨以先老人論笑祖聯芳序云不肖上承迦葉六十三世之元祖指祖天奇之元祖下繼曹溪三十一葉之真孫指父無聞為真孫玩承繼二字可見若云六十四世豈得稱父為元祖若云三十二葉豈得自稱為真孫此千古不易之論而符公強以元祖指迦葉言自笑祖溯數至迦葉為六十三世故曰上承既指迦葉何不竟稱始祖今天下叢林皆稱迦葉為西天第一祖達磨為東土初祖夫元者長嫡之謂也元孫元祖上下通稱迦葉斷無稱元之理焉有從己溯至迦葉自稱為元祖乎稱元者確指天奇上承六十三世之嫡祖也又強指真孫為大鑒言自迦葉順數至四祖道信為三十一葉五祖為子六祖為孫故曰下繼既指大鑒為真孫何不竟稱下繼大醫三十三葉而又先稱四祖五祖為曹溪豈不自語矛盾乎先師直揭天奇為元祖無聞為真孫如青天白日尚自昏瞶反扭捏五祖為子六祖為孫此真何說那能顛倒我衣裳耶復妄引悖逆狂禪欺祖蔑宗不經之臆說為釋誤張本輕侮光明碩大繼往開來之導師益見符公之攝心乖戾釋誤之誤己誤人將謂天下竟無其人焉符公復不見續略南嶽二十八世南京覺華禪師之上堂乎迦葉微笑二祖覓心不得處紹如來之傳燈續祖庭之正脈聯二十八世之英華接三十四代之骨髓華初參翼善海舟慈有省後至太平寶月潭印證潭與楚山琦同嗣東林悟為南嶽下二十七世華與海舟為嫡堂昆弟豈不同接初祖之骨髓為三十四代並聯南嶽之英華為二十八世則海舟為楚山猶子深切著明矣符公何謬證楚山寄玉峰之訛偈沈貫銘海舟之偽文妄欲截去南嶽正傳寶藏東明二世奈何覺華之法語在續燈中世代班班可考符公何不先為剗去而出釋誤誤人可也今而後吾知符公通身舌劍徧地筆刀不能偽辨順非矣是以濟兄惜祖道之凌夷後學之失據不得不摧訛而顯正之豈好辯哉亦不得已也余特揭其大誤之尤者弁其首云正法錄一卷濟水禪師著自序夫立言垂世非智通今古識鑒物表理事融會而不惑者莫能為之觀古之著述義高旨勝詞意俱暢者指不勝屈鐔津集雜毒海山菴雜錄等是矣非若後之竊名欺世言行乖舛而妄自評議無所畏忌者得可企及乃有學乖先哲道非契悟之士代不一出言循臆說理出矯誣衒一己之偏私翳多人之慧眼人無凡聖之殊解濫正邪之辨屈大聖於世賢之不若排祖語於世諺之無分或以圓極之談釀成偏小之說或以莫羈之侶雷同具縛之流喪金錍於庸手沉智檝於禪河自非據理相與正之則後學從冥入冥何時而得睹天日之明也余賦性固陋幸藉先聖之慈於道少有一隙之明閱古今方冊見有與佛祖見處齟齬者皆就其已然之詞析而決之非敢少萌生滅之心而自甘沉埋於是非之域也幸諸明眼鑒而原之以知余之心有在焉兹名正法錄者欲使知靈山一會猶未散也回生訣一卷正訛錄一卷傳戒儀範二卷濟水禪師著回生訣自序我宗無語句亦無實法與人若有一法與人喫土亦不消今之所以有言者何也其有毒樹生庭不得不伐若樹之根株枯朽雖長柄斧亦無所用也余每見諸好心參學者迷失良導金鍮罔辨往往以食迦羅迦果謂鎮頭迦果身壞命終而莫之覺故發惻隱心出此回生訣以辨二果之損益令人慎其所養以全天年非有他所尚也智者祈為鑒諸濟水洸禪師語錄一卷仁和楊鼐序禪之為道也以寂為宗以空為旨不著色相不立文字禪之有語錄非禪本義也雖然盡如我佛如來拈花微笑盡如達磨尊者面壁九年則此上乘正宗何從闡發而世之甫髠其頂受戒具而參心性者將何自而見西天面目乎是以古之聖僧不惜為後人提撕警覺雖巉頑如石尚欲使之點頭而況在有知有覺之人哉第世運日卑法輪難振如古之百丈南泉高風絕響一二粗疎淺陋之輩狐竊虎皮陡升法王之座口出非道之言自命為一宗語錄以惑夫世之不知其理者嗟夫何怪禪燈日暗而正覺罔明於天下哉若濟水禪師則真如來之弟子也戒行精嚴毫髮不苟而其說法也則可展獅子之座驚龍王之耳天女散花凡夫覺夢蓋其所得原出尋常萬萬而其所以昭宣大道以喚醒迷津者又豈世之冒竊者可同日語哉禪師居報先古剎起衰復古以創為守寒烟蔓草之場忽變為寶相莊嚴之地厥功甚懋其生平所說法語侍僧梓之以行世當世之耆宿名衲與留心佛印者皆能心契其微予偶從興福之雨花僧舍得見其書謂從來語錄中所未有因即書景仰之意於其簡端曉庵昱禪師語錄三卷天笠禪師序黃面老子七處九會不曾說一字末上拈起一花獨金色頭陀冷地覰破別傳正法眼藏嗣後四七二三東西密付馬駒踏殺天下瞎驢滅卻正宗至我南澗先師為臨濟直下三十一世焉先師五闡名藍座下象龍雲涌惟曉庵法兄分座最久為室中長子乙未夏繼席澗南安厝後事既而一錫湖湘三十載并汾絕信於兹矣迨庚申秋余再領院事忽專使賫香掃塔兼示黃曇諸會全稿命刪定作序余愧忝同門嘗聞先師告眾曰昱首座悟處不異高峰斷崖出語不帶枝葉雖乏文采流動直如煅過精金具眼者誰肯昧渠隻字嗚呼先師言猶在耳珍譾劣不文謬承推許何敢復贅一辭古亦有言諸方說法非不美麗要知如趙昌畫花花雖逼真非真花也余謂今之要見真花者向瞿曇未拈起時裂破正法眼藏便見黃曇錄中句句字字不從人得皆真香發現觸著奪命返魂豈是而今彩繪無根所能企及者哉康熙癸亥清和佛誕楚萍集一卷天笠珍禪師著自序凡物之生乎天地間也靡不應於時而繫乎命若鳥之處空魚之樂水命也葵之傾日蕉之聞雷時也向使葵蕉不待雷日而展則違其時矣魚鳥互以空水為居則失其命矣故知萬物以天地為逆旅天地以萬物為芻狗皆莫能逃其時命而出其樊籠矣至若萍之生也異於是稟柳絮飄搖而不翳於空點澄波宛轉而不滯於水浮乎長江大海而不盈覆處乎幽壑深淵而不欹隘順逆隨流放浪忘返庸知萍之為命歟為時歟抑知萍之為萍歟非萍歟天地萍也萬物萍也余之集楚萍也亦猶是而已矣天笠珍禪師語錄十二卷嘉定張立廉序古之以言傳者皆其不得已而有言者也所謂不得已者以大智力照法中偏黨以大悲心破人根昏鈍然而非赴乎時機迫於叩激則又終不發也惟發之甚重故其行之也遠竊謂今時禪師有說語錄三字存於胸次其語不必說也何況鰓鰓焉以死套格式分門別類使祖師元旨徒成具文為末法之通病乎天笠和尚久入南澗堂奧機用超脫是能破情量為出格道人者吳楚單丁有年嗣後歷主祖剎電掣風馳有軼羣之作無元字腳存於胸次所謂動乎自然而發乎不得已嗚呼世有知機鋒言句如國家兵器不得已用之者庶幾動窺是錄之旨乎曉庵禪師序昱住山久矣一關獨扃百念俱灰然猶有所不能忘懷惟先師門戶潑天未聞有能繼之者數載干戈旁午浙中音信杳然此心懸懸不遑寧處戊午夏得南澗珍法弟書並寄新刻展閱未竟曷勝欣躍神機妙用電閃雷轟將先師門戶盡底掀翻不特不讓實跨竈焉弄大旗鼓如此雖昔之湛堂真淨東山演天童華諸尊宿豈得擅美於前所謂過量人五百年間氣所鍾者哉昱耄矣得吾弟光大先師門戶快然於心謹為之序門人超格序先師笠老人九座道場說法十二會已刻未刻錄共若干冊藏於方丈內記篋中其語如石蜜中邊皆甜如旃檀片片皆香非頂門豎亞摩醯者不能拈隻字也甲戌夏五示寂同門奔赴皆於龕前以結集見推授格全錄格智照淺劣何敢當但念乙丑歲分座澗南即面承先師委以結集壬申退金山院招格同赴東禪札云結集之事汝之責也今老人往矣又重之以諸長兄之命何敢固辭謹彙輯檢校編為十四卷卷首有冰庵張孝廉曉庵和尚二序末附格所述行狀及毛司李塔銘乙亥佛誕日結集告竣敬述始末弁其緣起云獨超方禪師語錄一卷淨土格言一卷世宗憲皇帝御製語錄序原夫道昉鷲山法開鹿野伽林書貝義學於是敷條師座拈花禪宗為之發穎然而自周及漢大乘僅顯於新頭由魏迄梁妙諦未傳於震旦自海州遙泊嵩室弘開揭淨體之光明示無心之元寂於是智燈續燿朗月連輝法信六傳至靈照而門庭益廣派流千別惟滹沱之瓶鉢堪珍自唐以來於今轉盛獨超方禪師者幼鍾福慧長涉文華厭世網之沉迷慨慷別父緣宿因之深厚勇決尋師珠毓難生席設何嘗著脇牆遮慧可雪來都至埋腰恒因苦以悟空遂離塵而證道高提祖印明湖之草木增榮遠振宗風赤縣之人天引領共迎桑宿來主柏林暮鼓朝鐘數百眾之軍持翕集擎拳豎拂三千界之道信爭來變定水於迷津回岐途為覺路積成公案錄自支那現教外之圓通脫人間之撰述精求弁簡顧屬制文余忝列藩維沃叨宸眷拱薇垣以北陌邇蘭若為南隣數以詩禮之餘閒來與菩提之勝會恒河比貌警語頻承吾岫聞經梵音罕譜潛符冥冥頗量測以靡涯崇委殷殷欲遷延而不得懵個中之賓主贅門外之言詮玉帶鎮山何妨一笑金樓在望佇喻三禪康熙四十二年嘉平既望皇四子多羅貝勒書夢庵格禪師語錄八卷寶倫集二卷越鑑徹禪師語錄一卷迦陵禪師序楊子有云辭達而已矣聖人以文其隩也幽深謂元理微謂妙數博謂色辭約謂要章成謂文成此五者故曰不得已我宗門於幽深者淺示之理微者顯示之數博者簡示之辭約者剖示之章成者分析而明示之又豈得乎師翁四主南澗越叔不遺餘力師翁示寂後即入南山誓不復出先師迫之再四方勉強繼席一言半句往來禪客寶之為璧然皆不存稿蘿弟於殘紙遺灰中僅成一帙余喜之不勝因命付梓使後之未見未聞者俾知我法叔老人之不得已也康熙己亥夏五月宗鑑法林七十二卷迦陵禪師緝雜毒海八卷迦陵禪師增集明初龍山仲猷師所錄偈頌恕中愠禪師序昔妙喜老祖居洋嶼菴凡有所唱說僧侍宏首座者皆錄之而名之曰雜毒海蓋取老祖所謂參禪不得多是雜毒入心之語也是故後之學者凡遇宿師碩德偈頌佛事等語手錄成帙亦以雜毒海目之其來久矣龍山仲猷禪師一日閱其所錄厭其訛舛遂刪其繁冗摭其精要分類成卷始板行之其心蓋欲不負作者之心永永為後學之懿範也或謂師之用心固善其如戾妙喜之訓何然文字語言以不著為尚譬如鳩毒人飲之則死曹瞞飲之則無害在學者取捨何如耳然則是編之行其於法門不為無補故為之說時洪武十七年梅谷禪師序恕中和尚曰吾宗所謂偈頌者借事顯理曉人心地使事理混融純一無雜如醍醐之味薝蔔之香使人鼻舌略經觸受莫不通乎心暢乎體洒然清爽者也又曰宋季咸淳間諸尊宿凡寓興贈別及呻咏字號之類皆有偈頌以四句為準其作至精假使滅去名目而其義自昭顯自非契證深密傍通墳典取之左右逢原用之頭頭合轍而託此以吟暢元旨者不能也余每謂門人曰此作頌偈不易之定論開人眼目之金針也是書流布法社其來已久至洪武初龍山闡師為之刪繁摭要分類成集始版行於叢林而恕中和尚乃為之序余觀闡師重編之意甚與恕師所論吻合而恕師作序之意又與闡師刪摭心同因效顰二師徧採古宿遺珠并蒐近代全璧依類增入再行叢林原集共七百三十二首今增八百七十有奇至若泛採阿私則吾豈敢或於見聞寡陋惟高明教之順治丁酉自序同是點畫所成之字經有心眼者拈掇之便能如畫家點睛令其人生氣溢目對之不覺咄咄叫絕又如人各與鏡面目俾之了了德山之棒臨濟之喝似猶遜此痛快雜毒海所集往哲偈頌皆是物也此真道人本色文字宗門中不得已而有文字必若是而後可也余嘗謂衲僧家不向本分吐露而馳騁聰明炫燿辭句與文人墨士角工巧誇多鬥靡是何異尼山所云君子而去仁也若使之從毒海游吾知必爽然自失矣是集從恕中梅谷二和尚增訂之後較龍山所作尤成大觀但南中之板流通不廣北方學者恒少見焉因重為刊出其間補入一二亦援梅和尚之例併如梅和尚之言非敢阿好也昔世尊自述在因時求得半偈乃徧書於林葉石壁間以傳示國人余今補刻之役非與前人爭功聊代書葉書壁之勞爾康熙甲午夏六月迦陵音禪師語錄二十卷鳩江丁懋學序世惟良醫其用藥能變通方術不膠於古不泥於今雖若造意而起疾如神然拘守陳法者未免駭其好奇豈知藥以治病病治則已正可也奇亦可也宗師家垂手接人能如良醫之變通或立一機或示一境或語言提唱欲使魔者懾異者正病者起死者活不難也譬諸聲傳空谷靡有不應箭落神鵰從無虛發故馬師門下同時出八十餘人後之圓悟亦使十八人一夜徹去至今豔稱之然邇來唱導之師拈椎豎拂無虛日求如馬師圓悟當日之盛事竟未聞焉且魔益熾而疾益錮何古今之大不相及也人皆罪參徒之淡薄吾謂今人根器豈盡劣於古古人根器豈盡勝於今恐亦師家說法不能變通遂致學者坐病不起而區區欲參徒獨受其過是何異醫者不善用藥而謂舉世皆受不治之症真堪令人絕倒矣迦陵和尚傳磬室五世法印出世京師千佛柏林繞座半千餘指門庭甚嚴鉗錐甚毒彼依止之徒豈少苦參力學眼明識卓者苟其師非真有為人手腳接人機用烏能忍苦相從依者弗欲去來者弗能拒也今觀其左右輩所集陞堂示眾等語出正入奇盡變極化無非對症發藥又皆臨時應變能起今時學者之膏肓悉翻諸方說法之窠臼宜乎方來者之水赴而風馳歟昔臨濟之言曰大凡演唱宗乘一語須具三元門一元門須具三要今觀是錄非深入元要之奧不能神其變通若是也滹沱老子去今七百餘年元要之在人僅不絕如綫乃得大師一肩力荷而恢張之誠法門之幸識者諒不以予言為諛請即書之簡端釋超蕉序當今宗社濫觴門戶戈矛潔清峻上莫盛石磬而下珍叔笠老人十據名剎四主澗南如山如嶽巍然不動時有生死南澗世法齷齪之謠天理人心誠不可沒再傳而得迦陵音公者悟門修持具見拈香一段親切淵深上堂小參一一皆從自己胸襟中流出斷非印板上打來模子裏脫出一洗剽竊摹擬拾唾尋羶之弊如僧問如何是道云山僧怕聞既是大善知識因甚怕聞云夕死可矣以此非但為天下知解宗徒尋章逐句輩解黏去縛直令道學頭巾脫骨換胎矣嗚呼世衰法微淳風盡喪往往匙挑不上者亦愛承奉讚揚稍有拂意掉頭不顧顧予不肖陳朽何似而公業已德重京都名欽四海可以無求於今日乃以語錄不遠三千里外乞言於余且有痛下鉗錘之語只此一節邈然追古人千載之上真有大覺璉祖之風予以祖宗故土受託之深不得不任再住之責迄今近三十年日與大梅龍山為伍夜隣肉身老祖同夢耳不聞諸方之行目不覩諸方之刻今讀千佛之書真如聞迦陵頻伽之聲哀愍一切眾生續五宗旦夕之慧命此吾珍叔夢兄苦心法門之報也是為序康熙五十二年歲次癸巳自恣日再住東山愚伯超蕉拜題於肉身殿側住吳興弁山釋仁岠序宗門有三印印空印水印泥是也此中分三句一句天無四壁一句半合半開一句合泥和水若以三句作一句會則突出難辯只眨得眼閃電提持衲僧無湊泊處若一句作三句會便覺有君有臣有元有要葛藤蔓延刺刺不休兹所謂印泥者也然而法無定相道在人弘大量者用之則同小器者局之則又不得不異耳迦陵和尚與余同事先老人於雲門相得最善其後天各一方萍踪萬里企慕之私僅付一暮雲春樹而已今秋赴和碩雍親王之召館於柏林因得與師挑燈話舊促膝談心得來澗中一滴浪拍滹沱放出黃河九曲聲光動地再觀千佛法林諸錄如登匡廬而望彭蠡長天一色空水無垠而隨機應變卓有氣蒸雲夢波撼岳陽之象他年起我臨濟宗磬山老祖於一百年前早已為師道破了也奚待余言迦陵禪師語要一卷指要一卷調梅鼎禪師語錄二十卷和碩莊親王序維摩經曰乃至有無文字語言是真入不二法門循是以思敬以象外之說暢以無生之論者皆兆乎而吾知其不然也調梅著有語錄若干卷闡禪宗之邃旨抒性地之靈機六葉既敷千花競秀居然於傳燈已其生平梗概予曾銘其塔而敘及之往復斯編不禁三致意焉夫佛法廣大瓦礫遑能盡汰荊棘未易俱芟使非調御以一心遊於八正路徒逞元渺之言撤籓遊奧不虞涉於饒舌耶若夫逗根機而演教逐權實以敷文內以證其淵修外以迪夫學侶升堂問答豎拂機鋒東道西道即曹溪之風動心動也真諦世諦即鏡智之髮白心白也而寧以無有文字語言為足多哉王弼謂凡有皆以無為本無以有為功將欲悟無必資於有抑聞之運轉文句以佛心中化他之法度入他心是則一默一言一呼一笑皆歸實際豈得覈空空而疑其鏡象未離詮耶不覺歡喜讚歎因以弁其端云孟維邃序自梁武時達磨已入東土不立文字面壁九年實為禪宗之初祖而未聞有語錄五傳至慧能大師乃著壇經語錄之說是始此乎自曹溪分傳青原南岳而後五宗並起各相授受片香致念用表法源然臨濟二十九傳至笑巖寶寶傳龍池池傳磬山山傳南澗問問傳柏林格格傳師乃臨濟三十四世也今主磬山祖席高懸祖印提唱宗風斬釘削鐵直指人心見性成佛正謂石磬一响聲振天下於臨濟何多讓焉當此佛法濫觴之際若非調公一出廻狂瀾於汎濫之中燃死灰於燼盡烟消之後茫茫宇宙不知佛法為何物矣調公誠哉不愧為臨濟之兒孫夏仲以語錄問序於余然余儒也禪師釋也儒釋不同道何分焉況文公守潮時見海外無一人可語因與大顛盤桓遂成知己若我閑堂冷署岑寂無聊乃得方外談心不有遠過於大顛者因援筆敘其大概以遣意也文覺禪師序己酉秋予叨隨駕圓明園佛樓調公和尚特函書附其語錄若干卷來乞序言得盡披閱機用痛快語句清穩絕非凡響可同日語者因憶曩時見先磬山老人諸錄質而厚簡而嚴最近古滋愛之是錄也尤喜頗有祖風深得演唱之道焉公與迦陵禪師為同門昆季皆早被皇上眷注極法門之異數首拔公主陽羨之磬山次武林之南澗遂唱導南中歷一十五載今雍正六年戊申春復承旨由南澗起視柏林之篆寺為磬山家祖庭京師稱首剎然奉勅開堂於寺者實自公始知遇之隆因緣之勝豔稱一時然而出世領眾垂廿載來住持鉅細門庭接納清操忍力守約安素大抵皆得其謹嚴之家法故聲望久而益著衲子趨赴如歸自說法柏林眾恒滿三千餘指提示不倦遂咸望為京師第一法席焉昔臨濟謂山僧無一法與人惟是去病解縛風穴亦謂滯凡情墮聖解學者大病先聖為施方便以楔出楔故宗家之有言猶醫者之用藥藥以治病言以去病病有差別言亦有差別所謂對症發藥古之道也苟無病雖無言可近來言者之病有甚於學者之病以從上方便盡成格則則言滋多病滋甚負先聖誤後學老成不作典型蕩然猶幸石磬遺音尚有續其清響者繫豈淺哉故於斯錄為之歎而樂道其善云春臺後錄序余癡愚特甚嘗在香嵒聞一言半語未敢承當至今長住化城夢想極樂國土羞見諸山長老一旦調梅大士不以為卑之無甚高論乃出自敘以示余余口誦心維妄為擬議其始於修己繼之行道終於普度而抱一於知止者乎猗歟休哉佛法真種舍此僧其誰與歸余嘗披閱楞伽矣其超忽處則神其飄洒處則仙其無奇特處則佛千古大傳千古至文其何以加焉今捧讀自敘本末逢萬杉拈竹箆子應機而解稍無窒礙不覺令人恍然如登藐姑射之山後復往江浙參金粟走洞庭包山等處參訪不已畢竟將百二十斤擔子一時放下不覺令人爽然如遊無何有之鄉乃至兩朝供養諸王大臣門庭擁塞不覺令人悠然如覩著衣持鉢敷座於舍衛城噫神耶仙耶佛耶余固莫得而名言之返而問之自敘者而亦不得而自知也至於最後歎芻狗謝刊錄歸宗於止夫止之為言豈易易哉不離事物不即事物此心湛然如如不動所謂知止也易曰憧憧往來朋從爾思蓋為不知者而發惜其見滅於東而生於西中無所主也中有主則止止則內外兩忘故自參訪之日起至應酬無窮始終只此一字耳昔白香山詩云欲識吾師行道處天香桂子落紛紛正可為今日調梅大士道盡了也後兹者又何能贊一辭但余既承命不得已而聊為續貂竭我平生力量揉碎這段幽芳化作天女溥散梅花亦只得為今世門頭拈一瓣香薰破大家鼻孔外集八卷佛日羲禪師著板存瑪瑙寺同德序日星炳耀雲漢昭回天之文也山林秀蔚川澤清漪地之文也凡耳遇之而成聲目遇之而成色皆天地間自然之文也鳶飛魚躍道察上下無之而非文故見道者目擊道存一有所觸發之為言其或有韻之文無韻之文一皆天地自然之文也陸放翁詩有云文章本天成妙手偶得之粹然無疵瑕豈復須人為是知天地自然之文借妙悟者發之如折旃檀片片皆香禪門之參悟何獨不然面壁功成拈花微笑不必語言文字而無非語言文字也其見諸語言文字者初非執筆學為如此之文也妙悟所至信筆而成其詩文皆作語錄觀可也佛日禪師歷遊都下卓錫西湖聲名文字之場山川風月之地聞聞見見色色空空詩文皆見道奧捧誦之餘如親謁禪壇面聆棒喝也風塵俗吏何能契探宗旨聊據所見而敘諸簡端云爾自序文字者文其言宣道而化物者也余固無道之可宣抑又何言之可文哉然亦間嘗自思生斯太平文明盛世便乃甘為惷爾無知之物耶故於蒲團枯坐之暇亦文焉亦詩焉忘乎世之通人為邯鄲唐步之誚矣雖然吾為佛氏徒者文不關於政治詩不犯乎風化惟幾於佛氏文者文之幾於佛氏詩者詩之若然則是吾自為吾之詩吾之文又何歉焉且夫仰觀俯察羣品萬彙有有聲焉者有無聲焉者無聲則為無聲之詩文斗柄其誰旋乎龜紋其自坼也不以不能有聲與有聲而競鳴有聲則為有聲之詩文風何為其翏翏焉泉若是其活活也不以不能無聲與無聲而并默亦不幾乎天之所與文者文之天之所與詩者詩之則是俯察仰觀羣品萬彙亦何莫而非自為自之詩自之文也乃若宣道而化物唯然否耶則亦試問乎風泉龜斗乾隆十四年己巳歲桂月朔佛日羲禪師語錄八卷板存瑪瑙寺自序余語荒拙無似去峨眉白長老千頌不甚遠嘗持乞敘於法門為當代推者咸橫點首姑自敘焉或曰洵如是則己之猶為愈矣余曰余有所不得已也昔我先師越老人主斯澗南未嘗不以法道是寄而求人求於上者不可得乃求其次而次又不可得乃求其次之又次乃始得余以白拂一枝授焉則是我以法道在躬敢以語言荒拙而遂己耶先師嘗訓余曰大凡說法須是無法可說若有法說謂之法執亦謂之以實法繫贅於人須是大機大用擊石火閃電光如擊塗毒聞之者立喪似揮大阿膺之者旋亡若乃勾章棘句合縫磨稜未免究妙失宗為從上所訶也又余嘗問於先師曰說法當何如先師曰有如龍之行雨焉使人但見雷電奔騰風雲馳驟究亦不知龍之所在若夫首尾畢彰丰神全露抑又淺矣復又嘗聞於先師曰說法貴要胸中無一厡字腳譬如有人為高垣萬仞所圍正爾圖維欲出之際忽然而得通天活路如是而後乃可若乃依樣畫猫照本塗鴉腐爛千尋唾餘十斛令人啗之同乎嚼䗶抑奚取焉先師三段訓言渺焉如在天河可望而不可即當時聞之早自縮項短氣謝非小子所洎以故向時行腳南遛吳越北逗幽燕及歸豫章住靜新林蓄有千金之帚一旦揮而棄之嫁與陸離君矣兹所輯者惟住雲居與理安祖山二處語也語雖荒拙無似然不敢捫摩攘竊於先賢自盡其分而已如秋蛩之語臺砌不冀續於春鶯塞雁之唳遠天不借聲於海鶴寒蟬之噪疎樹不雜響於焦梧所謂自鳴其鳴自聲其聲自語其語亦求其知我於不得已也
