body:
  text: 梵宇伊夫佛屋之緣起地廣由旬世閲人代開山於唐季鼎盛於皇朝其間迭興迭廢不恆厥居其廢也把茅蓋頭而不足其興也莊嚴煥儼輪奐甲於寰宇供養備極其隆溯其締造之勤功行之苦則法雨大師實為法門龍象重以迦陵之遭遇布金長者乃獲自不世出之人主法界重新金繩永奠雖曰人事蓋有天焉志梵宇古涌泉禪院亦名法雨寺在九溪十八澗吳越時伏虎逢禪師卓錫於此錢忠懿王為之建寺宋理宗曾幸寺中以祝國泰民安敕改理安明弘治四年六月二十四日寺廢於洪水隤林堙谷滌蕩無餘寺基為仁和湯氏所有六十年無過而問者萬歷甲午法雨大師仲光掛瓢巖壁間與蛇虎共處為蒲龕覆之以蓋拾橡栗以自給獨居者八年嘗掘地至丈餘得柱礎舊趾歷然巖洞中流泉注灑如雨即法雨泉也㫄一泉從地涌出為涌泉石壁上有大佛字為佛石巖石甃六方施生臺石塔半座刻涅槃經偈萬歲石牌涌泉龍王石牌凡寺中故蹟皆於榛莽中搜訪而得之植援激流周以虎落四方參訪者漸衆辛亥十二月湯氏感師德化復捨寺基郡人吳之鯨黃汝亨為之草疏勸募方伯吳用先竇子稱捐俸錢助之重建禪堂五楹佛宇僧寮諸廢具舉峰頂有靜明尊者塔普同塔及寺前後山數百畝按施生臺石塔石牌暨靜明尊者塔今皆不存茲據法雨大師舊志録入以備搜考吳方伯給帖歸之寺中而規模式廓矣大師祝髮弟子箬菴問禪師得法於磬山天隱修禪師與玉琳琇國師為同門兄弟崇禎丙子大師示寂問禪師歸寺住持提唱宗風學徒雲萃嗣法者至三十人彬彬乎稱極盛焉繼問禪師住持者天竺珍禪師鉗椎妙密非真切參究期脫生死者不敢親附海內緇流因有生死理安之目數傳至康熙中歲久法衰寺亦漸圮寺僧之不法者復乘其衰敝而鬻寺田常住日益困壬辰歲大侵越鑑徹禪師入城乞食餒死於萬安橋下訃至京師時迦陵音禪師住持柏林寺為位而哭甚哀世宗憲皇帝龍潛雍邸適幸柏林詢知其故念理安為選佛勝場興願重修以祝延萬壽命僧越宗賫帑金至寺中撤其殿材而新之又命僧成鑑為置山六百餘畝齊田二百畝鳩工於癸巳落成於乙未奏聞聖祖仁皇帝御賜匾額對聯命僧性音來主方丈由是琳宮貝宇藻耀山阿永為皇家祝釐之地扶萬祀而不傾矣刑部尚書臣胡會恩敕建理安寺膳僧山田記西湖之西有十八澗澗繞山而流凡十八折深曲幽邃為臨安勝境其上有理安寺明弘治四年遭陽侯之厄片瓦無存至崇禎間法雨大師駐錫於此誅茅結菴獨居數十年有法雨山居詩行世再傳箬菴禪師法公剃度弟子也以磬山衣鉢繼師演教弘其規制始為叢林梵鐘花雨一時稱盛傳及天竺夢菴宗風大暢凡十方名山無不知有理安寺云夢菴奉雍親王命來主柏林方丈迦陵音和尚嗣之道行精卓極見優禮然茲寺年遠圮壞迦陵仰承師志修整未遑康熙五十二年恭遇皇上六旬大慶維時久道化成羣生樂利京畿外郡所在名剎廣建道場華祝嵩呼洋溢宇內王念理安為名宿淵源遂命即其勝槩修建一新永奉香燈祝延萬壽蒙賜敕建理安寺額並御書石磬正音四字龍章爛然山川增色王又發帑捐金於錢塘秀水兩邑置買山田若干畝以供膳僧之用隨經署藩司事臣呂猶龍飭行知錢塘縣事臣董天眷查明過戶設立城西二圖自運甲令僧俗不相干預毋得指派差徭借端滋擾在案會恩祗奉王命俾紀其事刻石以示久遠將靈山勝果並垂不朽云康熙五十四年二月日記謹將梵剎規制備列於左方御碑亭在九溪橋外乾隆辛未春聖駕幸理安寺御製七言律一首恭摹勒石奉安於亭中詩載恩寵門山門一楹有敕建理安寺舊額彌勒殿五楹有樓恭懸聖祖仁皇帝御書理安寺額和碩裕親王對聯蒲團染就烟霞色布袋熏成知見香大雄寶殿三楹舊有微笑堂額聖祖仁皇帝御題對聯二副法雨晴飛繞殿香風至天花晝下交空瑞日懸勢到嶽邊千峰環秀色聲歸海上萬水涌洪濤俱奉懸殿柱辛未春御書樹最勝幢匾額恭懸大殿正中和碩恆親王題微笑一枝額多羅淳郡王對聯香靄橫金風靜拈花去蓮苞綻玉露寒踏月歸並懸於前楹梁柱孫儀微笑堂詩登堂禮佛餘羣巒薦蔥峭十月杜鵑紅開花代師笑禪堂五楹有和碩顯親王題選佛場開額多羅淳郡王對聯七尺棒頭有句超香象一彈指下無心攝毒龍法堂即宗堂五楹內供箬菴問禪師以來諸住持香火和碩誠親王題善獅子吼額又對聯二副喝下龍蛇林泉受潤終何極杖頭日月雲漢昭回不記年香閣搖星簾陰移夜月碧池涵藻波影映禪關和碩顯親王對聯思而知慮而解鬼窟裏作活計縱經三大劫來何曾見我未生面目斬不斷割不開牛頷下逞風流猶有一絲毫許爭免纍他鐵鑄心肝多羅淳郡王題宗風丕振額又對聯座涌千華天地震筵圍萬指象龍奔分懸於梁柱間法堂之上為螺月樓左右有廊房共十楹藏樓即螺月樓五楹恭藏御賜藏經全部恭懸聖祖仁皇帝御書石磬正音額世宗憲皇帝御製對聯作佛念輕縱然自在還為妄度生心切須信慈悲也是貪松巔閣五楹恭懸世宗憲皇帝御題來機亦赴額御製對聯杖履得回遊子腳葛藤灰盡老婆心曹寅松巔閣記南澗理安寺文章家紀述甚詳松巔閣自佛石以來即有其名而不知所緣起夢公告余曰閣俯層巔據南澗之最勝萬松肅立法雨泉正注其下登斯閣者咸泠然有遺世之思故陳眉公有老我松巔煮朮蒸梨之句夢公曾侍師秉拂於此別久繫懷囑余為記康熙四十三年甲申余視鹺揚州理安僧衆亦請夢公繼祖席馳書相報曰閣將圮勉余為之重葺而平湖遜亭高編修亦出資相助是夏閣成夢公徵前約夫松巔閣之勝余熟之耳中而端居凝思每芒然無以應徘徊浹旬始覺有岧嶤崒嵂者蒼然露沒於楮墨之間卒攬之而不得也偶閲釋門雜著云雪天有三種僧上種坐禪中點筆詠詩下則圍爐說食嘗托其語以期夢公遜亭為他日遊觀之笑樂然余從駕再至湖上咫尺不得至南澗今五月織部金公歿擬赴弔便道一遊又值詩局事不果因思眉公者世之幸民當其時蒸梨煮朮求敵一下種僧不可得矧以中上之事將寄老茲閣徜徉於其間誠無異說夢也已又思今之僧足跡放浪無所底止以世諦計之三種之中於中下似較易而理安之僧於中下則最難此磬山立宗之本意也夢公迥與世遠不闌入場隊世之士夫恆怪其清苦以為不情余獨見其寒儉若素士輒心禮之豈方以內外復同具別調也乎夫心之洽於心者久而不渝則事必有以相契他日登斯閣其所事事固不出中下之間而遊觀之笑樂或有出於三者之外則畢世之願備矣世故不得而蘄之也於是乎記趙韓登理安寺山閣望江詩由來登此地絶閣幾人攀越嶺當孤寺江聲入萬山供餘猿弄鉢慈力虎投關歸到湖堤上如聞戒律還吳之鯨松巔閣詩窗外高松不礙山泉飛巖竇日潺湲閣中晏坐雖無事聽水看山也不間蔣全昌松巔閣詩巖棲福過清脆筍飯香粳磬引問奇客鈴驅盜柿鶯雲生窗紙潤松落瓦溝平僧臘吾知得年來耳順盈蔣泰濂松閣待月詩山影沿溪換竹烟羃寺深峰高逗月慢藤壽絡樓陰古壁疑僧面空泉悟佛心憐余塵夢雜光不照前林趙之翰雪晴登閣詩石閣多奇勝扶藜踏凍來雪深埋曲磴松臥掩平臺日映山容變雲移江色開惟師享清樂啜茗對瓶梅方丈三楹有樓在法堂左陳奕禧書額和碩恆親王對聯一句當天朱點窄全鋒敵勝寶光寒西方丈即官客堂三楹有樓在法堂右多羅淳郡王題萬木森然額懸於樓上又題啐啄同時額懸於堂中伏虎堂三楹在禪堂左上有樓曰梅萼法雨堂三楹在禪堂右上有樓曰桂花庫房五楹有樓在大雄殿左法雨泉亭在其左經書房五楹有樓在大雄殿右且住閣五楹下為伽藍堂祀伽藍其中即客堂昔法雨大師建一菴於松巔閣後以歸老焉且營其旁為埋骨之地名曰摩竭提窟且住菴久廢今改建庫樓之左法雨大師摩竭提窟且住菴銘并序蓬萊圓禪師云新縫紙被烘來暖一覺安眠到五更聞得上方鐘鼓動又添一日在浮生浮世如漚生水上速起速滅豫年過耳順日來月去寒暑迭攻薑辣蔗甘備嘗已遍今倚山阿搆一椽開一壙生可遊死可葬四十餘年青山白雲受用過分緣在則在緣去則去住得一日是一日名且住不定之辭也門曰摩竭提窟即掩室義銘曰有住無住無住有住不住有無是真常住真常無常真住無住不住不住且住且住蔣全昌登摩竭提窟詩鳥窠新搆險拄杖試攀尋松頂雲沾絮江湄日射金採花供指笑遇鹿許知音洗出丹崖面平生一片心徐時泰且住菴詩千仞山腰一室開白雲多處足徘徊閒身麋鹿堪為侶且住何妨拾芋煨魏㟲登且住閣廢基詩花宮幽絶地攀躋薜蘿高廢圃容泉隱荒臺插石牢夜聲聞竹露晝靜悟松濤安得從茲住春星滿布袍符夢閣五楹下為祖堂有和碩履親王面目猶在額閣向在寺後法雨大師建久廢今改建於經書房之右法雨大師符夢閣記萬歷庚戌十一月二十六日夜豫夢入古寺見几上舊書一冊皆豫生平所未見詩覽其一絶云蒼天風冷糢糊色兩個道人背雪立影落蒹葭幾處明回看江水鉛池黑復巡寺後登山山積雪盤曲而上見一虛室有僧背立不言回顧江水黑如鉛池四山皆白天色糢糊雲破日光漏影沙洲心思此境即現詩中覺而紀之也天啓癸亥松巔閣成再夢一僧云此處雖佳更有佳處對曰豫老矣他山諒不能往僧即引至此地見江流三折四山環抱喜出非常不信吾山有此奇境遲明攀蘿而上儼如夢寐由是己巳春仲鑿窟開基秋晚閣方草就臘月草六夜大雪草七日稍晴與鹿崖登山踏雪及門見一僧背立閣中豫趨至閣相與通問僧忽不見四窗深閉雪擁無蹤鹿崖愕然歎曰何幻乃爾回頭瞰江水黑山白日影射沙明滅變換宛遇夢中人詩中意也嗟乎草年前不但無此閣亦未嘗識此地昔夢中詩現詩中境今醒時見即境中詩等一夢幻耳遂題此閣為符夢云吳廷簡察泉歌并序壬申冬初謁佛石大師於符夢閣天半虛懸迥絶人世第苦無水師以法眼察石壁捫而鑿焉土溼石潤漸及泉矣喜為察泉歌翠削芙蓉千仞壁老僧獨臥藤蘿隙江流昏曉送潮聲饑斫白雲炊怪石毒龍久伏不須禪滿鉢惟應貯翠烟松濤未解道人渴自有山靈獻法泉蔣全昌符夢閣詩疾雨鳴春壑橋亭雪浪濺印泥攜雨蠟燃石覩山鵑且住知非住當前要更前江峰迎小閣夙夢契詩緣崔世召上符夢閣詩雲際誰當俯落暉罡風扶杖踏層巍潮光夢裏真同幻僧伴山頭是也非半偈石龕君且住滿江𠀌壑我將歸虎溪一笑還攜手為約明春筍蕨肥崔嵸上符夢閣詩十八橋灣步澗南竹藤為級夢為菴鐘憐客午嘶茶竈月伴僧孤照石潭四壁掛餘雲笠瘦千峰看去浙江藍松巔煞上羌無住且住蓬頭噉碧嵐煮雪齊今廢卓爾昌煮雪齊詩門閉九溪深烟斷火欲絶舉世說餐霞道人方煮雪掛衲齊今廢蔣全昌掛衲齊詩石塢三間屋初遊記甲寅峰真如佛髻樹好盡龍鱗布衲晴雲碎茶瓢秋露新安禪安不定慚愧未間身齊堂九楹在彌勒殿樓上和碩裕親王題冷淡家風額法雨大師齊堂銘耕種艱辛搬煮煩苦若不努力修行要見將何抵補不餓便休莫貪滋味才過三寸喉嚨唉轉即成穢氣盤裏菜蔬碗中粥飯且道從何處來也要口喫腹算東邊浪走西邊間說閻王打算飯錢不怕甕中走鱉廚房五楹在伽藍殿後雜貯寮五楹有樓在庫房後茶房在庫房後旦過堂即雲水堂三楹在彌勒殿外首座寮在法堂右西堂寮在法堂右後堂寮在梅萼樓右堂主寮在梅萼樓右都監寮在庫房左監院寮在庫房左維那寮在桂花樓右書記寮