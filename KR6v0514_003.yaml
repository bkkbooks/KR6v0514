body:
  text: 山水沿西湖之濱由柳洲達於浴鵠灣為赤山埠自赤山埠之西歷石屋煙霞踰楊梅嶺而下為九溪十八澗南通徐村北達龍井匯南山諸水西南流注於江窈然以深瀏然以清懸流灇射鬱撓溪谷環溪澗之側者有螺髻大人獅子八覺諸峰皆幽邃深靚藤竹蔓絡為屐齒之所不到故自有唐以來湖山之題咏殆遍而茲地閴然無聞焉向非伏虎創寺於前法雨結廬於後則亦委棄於荒榛密箐中為獵火之所焜耀樵唱之所響答而已涌泉院建於吳越自時厥後亦不甚著好事如坡公僅至龍井水樂洞而止一時名僧如參寥輩入山唯恐不深未聞有安禪於此者南宋人始見之品題蓋在留都臨幸之後也元明之際勝境漸開法雨師與吳朗士交結淡社為無言之會黃貞父胡休復卓去病仲昌諸君子聞而赴之馮太史開之實來主社由是名流勝賞無不知有理安寺者澗中覽眺之處記録靡遺則法雨之力居多焉造寺歲久中稍陵夷因迦陵音禪師以達於世宗憲皇帝發帑而新作之崇樓傑閣妙相莊嚴與溪山相輝映皆呈態騁奇於几席之下則夫山川清淑之氣盤礴鬱積之既久而後泄其菁英歊其靈異沐浴聖澤肸蠁皇靈以馴致乎今日之極盛也豈山靈亦有遇不遇哉蓋有時數存乎其間矣赤山埠舊有下院久就頽廢石屋嶺梅林菴理安寺所修葺也煙霞嶺點石菴法雨師弟子鹿崖所建菴後即水樂洞勝遊久著茲不具書自楊梅嶺而下撮其勝概以著於篇楊梅嶺在水樂洞西旁通楊梅塢嶺西為十八澗澗連九溪東為滿覺壠多桂郭祥正楊梅塢詩紅實綴青枝爛熳照前塢不及杏繁時林間有仙虎張振孫晚入楊梅塢途中詩一徑逶迤探乳竇遠公精舍隱山坳晚煙故白層峰腳秋葉先黃老樹梢隔嶺清鐘行漸近引泉枯竹臥相交禪宮知在長松外指點雲中見鶴巢朱彝尊楊梅塢詩我行楊梅塢惜是孟夏初是時果未熟但見柯葉舒思包緑荷飯五月來精廬金志章自楊梅塢循九溪十八澗至理安寺詩二首青松影裏尋山寺黃葉堆中踏澗泉行過亂峰溪又轉一聲疏磬到門前欲覓心安未得安講鐘初動白雲寒樓頭大好青山色不厭搘頤盡日看九溪在煙霞嶺西南通徐村出大江北達龍井周文璞九溪十八澗詩九溪十八澗冷見帝青苔洗足僧書石臨流客放杯案頭松葉響身畔野花開百六辭歌吹清遊始一回又再遊九溪詩昔遊九溪十八澗今度見之逾清真靜依落落石路晚間繞寂寂山家春可憐潺湲似留客更覺曲折能隨人得得杖藜來盡日野棠山杏亦精神張昱九溪詩春山縹眇白雲低萬壑爭流下九溪欲溯落花尋曲徑桃源無路草萋萋朱彝尊九溪詩尋遍十五寺九溪鳴淙淙下無一寸魚上有百尺松緣流思濯足奈此菖蒲茸許承祖九溪詩謖謖松風步步苔清流淅瀝繞香臺落花何與幽溪事也學愁腸日九回九溪橋在寺門外橫亘溪上其南建御碑亭徐𦙌翓九溪橋詩小橋得得聽洄瀾松帶溪風灑面寒應接好山誰共笑瘦藤隨我一枝安徐𦙌翀九溪橋詩澗中流水三三曲上有石梁度幽谷客來長嘯入煙蘿時見遠公嗽寒玉陳祕書監褚玠墓褚氏家譜云玠字良璧陳時官祕書監卒葬九溪十八澗在龍井山西東出錢塘江談元春遊十八澗贈佛石僧詩雨已離三日亂流溪若何僧間有詩積路誤得幽多柴少虎相送花殘猿未過不攜餘興返留半與山阿張祖望十八澗詩十八澗邊木葉稀清泉坐啜已忘歸褰蘿更上南峰望江色東來倚翠微卓爾昌十八澗詩至此遊屐盡橋回雨外深山童方拾薺野老未歸林絶澗重三曲懸崖可十尋秋窗清夜坐松月擁寒衾楊文驄十八澗詩二首雙眼去無主秋溪半是春葉爭花富貴泉敵士清貧氣肅山容古沙明鹿迹新前途松影裏斜日上間身亂接前林翠微峰送小寒蟲鳴山色淡鼠竄葉聲乾望寺思靈鷲逢僧説懶殘欲從修竹底終日借雲看王道焜遊十八澗贈佛石師詩古澗無人草正芳到來塵慮淡俱忘六時啼鳥和清梵滿地幽光出戒香茅舍松燈間自得石泉槐火晝初長高賢十八如相見不羡匡山舊講堂僧戒如澗中早行詩雞唱曙光分溪行見鹿羣草寒棲玉露衣溼帶朝雲殘月林間落疏鐘嶺外聞山家少人事晨起亦紛紛聞啓祥雲棲晚歸原擬取道十八澗以多虎有戒心不果詩禪林歸路晚逐伴且兼程殘雪消還在寒潮落更生望煙知郭近畏虎避山行忽忽辜清景還家意未平嚴繩孫十八澗詩羣山西來如走馬天風吹人𣤛焉下匼匝中分一徑深卷起羣山向身瀉忽疑身在屏風牒山勢交關徑回接有時築罷幽琴間碧流環轉白石間誰將荊浩圖中瀑挂向礬頭百尺山此中亦有招提子怪我看山意無已劃然指點匹練開連蜷翦入錢塘水錢塘之水奈爾何郫筒酒盈金叵羅僧寮煮筍截肪白林中卻立如人多山門碧樹樵未盡此地何時再當過朱彝尊十八澗詩暮經南山南曲徑一十八山橋往而復山路坱兮圠夕曛漸催人延首望香剎許承祖十八澗詩苔徑彎環擁帝青澗中流水碧泠泠四山清響因風急遠送林鐘空外聽法雨泉在寺中有亭泉從巖下滴瀝如雨下為清池可鑑毛髮翁汝進法雨泉銘法不生滅雨無分別吾師寂然萬象敷説周雯法雨泉銘仗佛説法傳法藉僧僧之所聚山靈式憑宋建古剎名曰理安香積無水負汲實難有茲甘泉空巖滴乳傾倒匏尊斟量瓦釡取之不禁用之無竭灑灑洋洋唯然法力大珠小珠不涸不枯供佛陀耶酌之以觚泠泠寒玉清而不濁浣滌法器塵纓可濯飛空若雨不霑下土給彼僧伽獻之龍女法雨名泉人天永護馮夢禎法雨泉詩曉為雲氣夕為嵐石上泉飛松下菴欹枕欲眠驚未得恍疑秋雨落澄潭吳之鯨法雨泉詩虛壑瀉清沁涼飇上客衣響疑秋雨細波入野煙微坐與冰心合流將石齒飛深山已共老相賞在知希戴澳法雨泉詩法雲凝作石法雨澍為泉日白雲根溼天青雨腳懸寒聲疏梵唄淡味醉詩禪願借松巔閣晴霄聽雨眠楊師孔法雨泉詩晴空片雨懸處處散蒼煙玉濺雲容碎珠穿松葉圓聽深如有法味淨了無禪泛出天花片隨風落講筵蔣如奇法雨泉詩幽響流清聽偏宜靜際看當秋韻自遠迸石意逾寒雪蕊寧沾翠晴巖放作瀾于焉識禪味竟日共盤桓蔣全昌法雨泉詩客到觀空坐枯崖法雨零澆胸勝酒德含象給茶星魚現金身色龍沈寶劍形箕瓢分一勺楊柳灑餘馨周正儒法雨泉詩二首懸崖忽飛雨俯注何涓涓石眼吐列星點點墜鳴瑄啜之冽以甘迥眸清且漣中有挂瓢客卓錫𠊓南泉空鉢𫎓神龍一勺石壁穿澄然悟性海枕流可長眠尋壑品諸泉多向地中出茲泉有奇脈偏為石所昵不逐沙眼生不隨洪流溢如珠篩不歇又如髮可櫛應是悟法石懷寶現其七香冽沁青蓮凡水胡能匹王道焜法雨泉詩寒雲入空翠點點散蒼煙湛遠成無漏秋深別有天雨恆周藏海法已離言詮獨對心逾寂悠然象帝先徐時泰法雨泉詩點破雲根滴暗泉半規碧甃浸瑤天秋聲是處堪留聽又幻簷鳴到耳邊黃允交法雨泉詩丹壁灑飛泉散落天花影一滴是醍醐法王曾灌頂張遂辰過理安澗中石泉池上詩并序理安寺在十八澗嶺岫回復野竹蜿蜒荒翳殆甚佛石上人初結草閣其間左崖右畔窪水漸滴成池沙寒蒲緑微漣動搖日影漾壁每坐對幽清惝恍無際崖仄吐細泉滴瀝日無已何年成窪潭緑蒲臥為底其中多龜魚蜥蜴復十許寄託一以間但覺情如水向夕漣漪生蕭蕭竹風起寒色上人衣驟點灑飛雨歸寢松際菴幽香吹夢裏空山如有逢忽逝不得語周雯法雨巖詩最愛招提畔孤危石一拳灑空飛法雨劃地滴清泉餘澤分香積靈源接梵天涓涓長不息流出已無邊周宣猷遊理安寺且住閣尋法雨池詩九溪路盤盤一澗一回抱言尋泉響處更涉雲封道薜蘿手自捫招提境倏造紫閣聳層霄丹梯恣幽討遠色駢諸峰目力窮所到樹杪出煙青海門蒸氣皓陂凹日沈沈巖吞江灝灝森森萬木屯如建千夫纛我遊及麥秋一杖開晴昊半生世網攖擺脫苦不早且住聊復佳縋險從所好法界雨長飛講壇風細掃窅矣鬱神庥爛然輝天寶名山富標題禪悅耽枯稿循階俯清池德水澄寸潦深黯隱鱗甲微漪橫荇藻用遣塵壒滌頓息炎雲燠茶瓜況供客相對破煩惱願宿贊公房邀月上瓊島但結靜者緣漫言憂用老涌泉在法雨泉側寺舊名涌泉禪院以此著稱歲久淤塞今方事疏濬徐堂重濬涌泉記理安寺舊名涌泉院一名法雨寺以寺有二泉也今法雨之名著而涌泉反晦詢之老僧莫究其處去秋法雨偶竭主僧朗公經行巖畔見巖根石隙間泉眼涌起纍纍如珠始悟向所謂涌泉者殆以是夫遂亟加濬治導其秀脈舊觀頓還法雨亦涓流不絶矣于是軍持灌佛應器滌僧寺中千餘指飲食庖湢之需利用恆足蔬畦稻田之豐注抑無論矣今年春豫遊寺中飯罷至泉上乳泉緣巖而下涓涓泠泠若逗秋雨其下青蒲白沙靜鑑眉髮瀐涌細流迸泄靈澤二泉交匯源異而功同爾雅云濫泉正出正出涌出也沃泉縣出縣出下出也然則法雨其縣出者耶涌泉其正出者耶乃歎斯泉晦迹數十百年之久一旦知見于時與夫藴貞儲異湮鬱勿彰知之者徒高其名而莫指其地不知者并沒其實而莫舉其名幸不幸又何如耶豫故記以慶斯泉之遭而亦以見長老宏慈願力度越流輩視環公之異虎晝跑曇師之神龍撫掌有以異耶無以異耶因并書之以告後之飲斯泉者螺髻峰亦名碧螺峰自龍井達煙霞可三里許兩旁悉皆奇石森峭其崒者為碧螺峰端好如佛頂螺髻正東面西春秋二分日月剛從峰頂出如佛髻放光理安寺面峰而建法雨大師螺髻峰題詞覿面一峰儼然螺髻春分秋分風清朗際日出峰尖月亦如是日往月來照天照地劫盡劫初無同無異稽首空王出無佛世楊式玉螺髻峰詩維摩宛對天女螺髻一峰靜間何似雙眉翠掃那須十二煙鬟按錢塘縣志碧螺峰在風篁嶺側獅子峰在天門山月輪峰在五雲山法雨師略紀形勝不言其去寺之遠近要皆層巒復岫瞻眺所及者今依舊志録詩數首回象峰在寺東澗邊如象王回顧耳鼻宛然法雨大師回象峰詩二首六牙白象高崔嵬瓔珞莊嚴七寶臺靈山一會未曾散願王座向東方來青獅出入娑羅林香象回觀煙水深誰識遊行回顧處芳草落花無限春獅子峰在寺東勢若蹲獅高出羣岫可瞰江滸北望天竺諸峰疊秀如畫堪輿家目為嘯天獅子楊傑獅子峰詩巖風壯威猛晴雷隱哮吼無心露爪牙百獸自奔走楊維楨獅子峰觀潮詩二首海國梅青瘴雨收繩牀高踞碧獅頭三韓水接天無際百越山窮地欲浮樓閣剛風吹碧蜃旌旗落日照紅鰍行人莫問驅潮事潮落山西淺十洲獅子拿雲涌翠巒我來親拂頂花看隨潮月上樓臺溼度海雲生鐘磬寒蓬島未應三萬隔桑田今有幾回乾大千不究恆沙界細問彌天釋道安法雨大師獅子峰詩踞地盤空久昂頭獨嘯天羣狐不敢過花落碧巖前白鶴峰在獅子峰左怪石林立嘗有白鶴巢其上法雨大師白鶴峰題詞白鶴棲山山依白鶴短樹蒙茸巉石磊落林逋豈能收放丁令來看城郭霜天雪後月明誰道揚州快活八覺峰峰居寺東南臨澗上有盤石平臺大數十丈昔有仙人對奕於此法雨大師八覺峰題詞人誰無知山何有覺山既有覺無物不覺春日花開秋風葉落依報正報塵塵剎剎通玄滿目心外無法山色溪聲是廣長舌臺高入雲八楞壁立昔有二仙曾坐對奕樵夫至今到此歎息摩碧峰在寺西北孤立最高下有暉落塢法雨大師摩碧峰詩羣岫列青螺一峰摩碧漢晴將落日低夏與奇雲亂強猿難到尖高鳥未及半淡墨塗遠天宛然畫中看月輪峰在寺東南上有天然井長江三折正當其前梁普覺禪師立道場於此峰後即六和塔錢思復月輪峰詩普覺遺衣久不傳五雲山色尚蒼然斷崖蘿薜三千丈喬木風霜四百年龍井雨深泉獨響漁村潮滿月初圓寶坊金碧紅塵聚何似茲山更絶緣法雨大師月輪峰詩東南好峰如月盈開窗相見若有情松聲謖謖晚煙淡澗水琤琤秋月明五雲峰在寺西南即五雲山天門山之支阜也岡阜秀絶林巒蔚起沿江盤曲而上凡六里七十二灣石磴千餘級嘗有五色雲籠罩其上南望三浙羣峰可數東觀龕赭兩山大海可掬與月輪峰對峙西北即雲棲塢法雨大師五雲峰詩峰在寺西南巉絶映江浙常凝五色雲相對一輪月落日海門潮萬里峨眉雪有時快登臨俯仰盡吳越大人峰亦名大鵬峰寺之主峰也如大鵬鳥翔佛光中堪輿家目為飛鳳沖天望之不甚高峻及登其巔則西湖如杯三江如帶諸峰皆在其下矣法雨大師大人峰題詞九峰之中此峰獨秀不奇而大不險而厚登巔一望別開宇宙碧澗清溪環抱左右衆山攢列如長若幼千花異種萬松鬱茂潭有馴龍林無猛獸象王回顧獅子哮吼如金翅鳥翔集佛後是何覺場竺乾靈鷲應菴華禪師銘大人峰詩螺髻生雲雨鎮踞何舂容具此大人相題為大人峰偉哉天地間萬象同擴充僧越澗咏大人峰詩不偏不倚屹晴空南北諸山列下風忽爾有雲飛一片膏霖三尺落塵中月巖峰禪師大人峰詩百千峰裏一高峰勢不凌人貌自恭坐斷古今無向背晴雲芳樹繞重重吼獅巖在溪路邊張口露爪如獅子吼佛石大師吼獅巖詩從來不肻吼一吼萬象剖野干絶無蹤羣魔皆遠走誰駕白雲來文殊一老叟溪清草色新春風動楊柳佛石巖寺右石壁上有佛字縱橫丈許苔蘚欲沒蓋唐宋人舊迹法雨大師佛石巖詩二首牛頭昔日嘗趺坐四祖無端為書破豎起空山千萬年猿鳥獻花不敢過不作模稜呈醜怪兀搖不動無遮蓋徑山欲喝不敢喝何用米顛袍笏拜黃育礽佛石巖詩巖頭一片石石上有佛字欲識山僧名記取此巖是問虎洞有客問此處有虎否聲未絶有虎出焉法雨大師問虎洞偈李廣射虎虎原是石此念一動虎從崖出合掌巖呼之聲應亦名響巖在回象峰下法雨大師合掌巖偈兩石排雲人呼答響剎塵皆佛豈不合掌黃育礽合掌巖詩問此合掌巖胡然而合也恰如佛弟子胡跪白佛者鹿臥崖在松芝隴上峭壁數十丈中空可坐五雲三浙在揮麈間法雨大師鹿臥崖題詞山半層巖欲墮一洞僅容人坐崖前三尺雪深白鹿玄雲共臥羅漢石法雨大師羅漢石詩一塊粗沙呆石頭空山冷落幾春秋明霞已足三時飯密蘚猶當五月裘樵去牧來常作伴猿啼虎嘯莫知愁隨他呼喚不肯應只是與人無所求先照臺法雨大師先照臺詩登臺望海微茫裏日月初升先照臺一條紅縷貫山海下方城郭猶煙霾懸鼓巖法雨大師懸鼓巖詩西峰落照駕天鼓東海涌出白玉盤朝作暮息人自老去去來來雙彈丸鶴澗亭即今御碑亭許承祖鶴澗亭詩夾路林巒一徑通孤亭靜俯水淙淙鹿馴虎伏獅停吼時有霜禽下碧松楊式玉鶴澗亭詩君復孤山寂寂太初荒渚迢迢舞罷澗邊顧影七峰任意逍遙豬頭塢楊式玉豬頭塢詩祭虎本由八蠟逢師伏物無爭得食於菟自止至今滿塢春生
