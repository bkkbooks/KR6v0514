front:
  text: 理安寺位於浙江杭州南山五代伏虎逢禪師卓錫於此錢忠懿王為之建寺原名法雨寺宋理宗時改名理安寺明弘治四年一四九一龍井山洪水發寺廢萬曆年間法雨大師重建清康熙五十一年一七一二以僧衆産薄不支發帑重建增寺下千畝齋田二百餘畝寺位於九溪十八澗中而四繞之峯巒高接天日煙霞鬱勃風景殊勝寺志舊有法雨大師撰理安寺紀四卷歲久板毀世不及見康熙年間迦陵老人又撰寺志六卷稿成未刻而遭祝融劫去乾隆年間釋實月據法雨舊志修訂重刋亦失於火乾隆二十五年一七六杭世駿承智朗上人之請為撰寺志計得八卷略分八門恩寵梵宇山水田畝禪宗規約著述藝文前冠以寺圖一幅恩寵一門備録清康熙雍正乾隆三帝之賜敕御製理安寺至康熙乾隆間殿宇廣建於斯為盛朝廷敕賜獨多乾隆時曾賜藏經全部雍正曾御撰禪祖之傳贊凡三十二位寒山拾得在焉所録並非全為本寺之高僧要為禪祖之通傳實存禪門之重要文獻也乾隆則有遊理安寺詩七首梵宇一門述本寺之沿革山水一門述名勝田畝一門記寺産禪宗一門傳本寺禪祖起伏虎逢禪師迄智朗月禪師凡二十八位規約一門録法雨箬菴迦陵禪師之手訂規約著述一門載本寺禪師之著作凡二十五部歷代詩文有關本寺之梵宇山水者則分繫於該門內無所依屬者則另列藝文一門以備録分詩賦疏序記書題跋等七目杭世駿乃乾隆時之大儒志出名家體例嚴謹洵為寺志善本茲據清光緒四年一八七八刋本景印武林理安寺志序昔如來言我得宰官之外護者為文證明之垂諸久遠可以無恐亮哉言之不可已也此武林理安寺志智朗上人請之堇浦太史作之而復丐余言辨其端歟余惟理安為古涌泉院道風演迤遠有條序自有明中葉沈災小劫堙谷隤林緇素屏迹幸法雨濬流淨信結社粥魚茶板蔚為禪叢桑海變故不百年而復盡斥其産焉夫給孤初地功藉布金勢不能損齋鉢之斷粒敗衲之寸絲為締構之助然至持鈴柝飾竿牘如市賈之相求淨業日微流塵眯目斯亦佛所大恐也我聖清光宅大千慈覆衆有於是法嗣性音遭際世宗憲皇帝為聖祖仁皇帝祝釐特賚貢金莊嚴法界廣儲福田玉音耀于岩阿寶笈充乎反宇種種名相彈指雲湧檀捨之宏為梵典未覯之盛事斯其因緣固大不偶然矣志之作也凡梵宇之成虧山水之形勝禪宗之正別疆畝之至到與夫高流素侶裁詩選勝之迹州次部居紀載翔實而臚三朝之恩寵以冠於前太史所序推本淨明忠孝之旨而願與智朗勉思報效嗟乎慧業無邊不離本分此正如來付囑所恃為金湯者豫雖無阿難之多聞其竟不為一證明乎余以今春嘗扈蹕三至寺遍厯九溪十八澗之勝山翠四合飛泉泠然鯈魚鳴鳥肸蠁嘉澤翔泳不已思繼淡社之勝引而未得序太史之書輒復神往蓋實為茲寺慶所遭而不禁欣然樂其樂云時乾隆二十七年歲在壬午冬十月賜進士出身誥授光祿大夫內閣學士兼禮部侍郎提督浙江全省學政今調江蘇學政加三級晉寧李因培撰理安寺緣始有唐絶續之關綿延迄今約有三變伏虎開山一也法雨鼎建二也迦陵荷兩朝不世之遇法域宏開恩膏疊沛三也龍象護持興替有運不有紀載後將何稽向有寺紀四卷法雨大師所手定也斯時規條初設銓次未周抱殘守闕留以有待智朗上人承諸尊宿之後節縮衣食誓發宏願欲以世出世間之文字成佛法之金湯禮幣及門請余秉筆小友周進士辰告湯孝廉韡齋為余先撰長編芟剃繁冗別為八門釐然完備既輟簡或設主客之辭以相難曰阿難號多聞而文殊又欲離語言文字斯志之作其為選事耶抑亦有大不得已於其中者耶余應之曰奚為其選事也善則歸君臣子之義矧其君有善而可以恝置之茲寺之興出自天家締造內府之金錢尚方之巧匠錫賚便蕃古無倫比天章下賁照耀山谷大衆安居飽食宜如何仰答高厚而不農力以竟成前人之緒與夫蚩蚩貿貿而忘所自來即違淨明忠孝之旨每一念及通身汗下此上人惟日孜孜不遑暇逸葺完是書之本末也嗚呼創寺難也創志亦難也前人為其難上人不肯獨居于易勞心焦思首尾十年而後乃潰於成其用力勤而志亦堅且確矣余生長是邦食毛踐土與上人同在帡覆之內思報國恩惟有文章鬱忠孝之忱借寺志略一見端後有覽者或亦鑒其志而深許之也夫乾隆二十有五年十月朔召試博學鴻詞前翰林院編修仁和杭世駿謹撰名山古剎莫不有志香界之緣起知識之化迹無不畢載以傳不朽而理安獨無者何耶伏虎逢禪師五代時神僧與永明壽禪師為同門昆弟吳越王感師道範為建梵宇為理安開山始祖其法化之隆不在壽禪師下是蓋古佛應世而視大千等一漚者區區紀載非所事事且寺在九溪十八澗中而四繞之峯巒高接天日煙霞鬱勃竹樹菁叢石磴雲梯橫於鳥道之上南渡後雖羽衛嘗過而名流罕至好遊嗜佛如陸務觀張橫浦輩僅至湖上諸寺而止染翰無人表彰斯失逮恭宗北狩元録告終兵火紛馳臨安為甚弘治年間寺復為洪水所廢前此即或有志非化為灰燼即葬於魚腹此理安所以無志也隆萬間法雨大師一傘一鉢入澗中與蛇虎處者數十載再成叢席著有寺紀四卷蓋香界之緣起知識之化迹無不畢載者然歲久板毀世不及見我箬庵老祖倔起螺峯宗弘石磬爐韝鉗錘妙絶古今而傳衣付拂且代不乏人故生死理安之名洋溢乎海內而至迦陵老人感世宗憲皇帝之殊遇重新梵宇增置山田思盡涓埃表彰聖德與名山不朽再著寺志六卷然脫稿未就攜返瞻雲即遭祝融劫去此理安所以終無志也壬申秋先師示寂門弟子問後事獨顧余曰法南勝公曾致書老僧請作理安寺志今已矣汝其識之甲戌夏余得承乏祖席而一惟遺命之言輒不禁鹿頭心撞爰録陳文遍尋故實得稿若干復由不解屬文送龍泓丁處士編輯而龍泓復不戒於火屋廬焦土諸稿盡失夫方外之志所載者方外事耳不與國史相埒而為之者自不當有昌黎所謂天災人禍之事而一毀於瞻雲再毀於龍泓者何哉蓋有待乎人而後成者在焉丙子春因蕚棠湯孝廉得識堇浦杭太史承為不請友操觚是任再事搜尋遠陟匡阜而舟過鄱陽濱覆者數次所得之稿不敵前之六七幸而載閲寒暑刻印俱竟先師公案得了此理安無志而有志矣然搜録未遍綿力已殫拾遺補闕俟夫來者乾隆二十四年歲次己卯中秋日南澗五世孫實月謹撰理安寺圗仁和陳霖署眉志史類也史必左圖凡紀載不盡之迹俱得藉之以彰猶眉之彩目之瞳通體之攸重也繄可略乎如曰妙性圓明離諸名相則請質諸深於禪者理安寺志總目卷之一序山圖恩寵卷之二梵宇卷之三山水卷之四田畝卷之五禪宗附舊記卷之六規約卷之七著述卷之八藝文詩賦疏序記書題跋
