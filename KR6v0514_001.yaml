body:
  text: 恩寵昔宋理宗命易古涌泉院為理安寺嘉名肇錫實始權輿厥後金地漸荒玉音罕覯及天清光宅大千聖祖世宗撫期命世特賚貢金數飛宸翰異數駢蕃焜耀千古我皇上丕承前烈疊沛湛恩蓋天眷之優隆祇林之盛事未有過於此者也故敬備而録之志恩寵康熙五十三年世宗憲皇帝幸京師柏林寺時臣僧性音以理安法嗣住持柏林深念舊山頽廢奏達聖聽世宗憲皇帝上聞聖祖仁皇帝發帑命臣僧越宗至寺重修命臣僧成鑒為置柴山六百餘畝齊田二百畝刑部尚書臣胡會恩奉敕撰重建理安寺膳僧山田記記載梵宇命臣僧性音住持書理安寺石磬正音二額墨寶二幅恭藏寺中賜對聯二副法雨晴飛繞殿香風至天花晝下交空瑞日懸勢到嶽邊千峰環秀色聲歸海上萬水涌洪濤賜金剛經一冊并佛像巨鐘莊嚴供器皆內府製造世宗憲皇帝於藩邸賜來機亦赴螺髻聳翠慈悲自在曹溪人瑞四額賜對聯二副杖履得回遊子腳葛藤灰盡老婆心作佛念輕縱然自在還為妄度生心切須信慈悲也是貪賜萬壽袍一領錦衣一領香板一塊御製臣僧超方語録序序載著述御製臣僧超方塔銘銘載禪宗雍正四年臣僧性音圓寂廬山隱居寺十二月初八日奉上諭朕在藩邸時披閲經史之餘每觀釋氏內典實契性宗之旨因時與禪僧相接惟性音深悟圓通能闡微妙其人品見地超越諸僧之上朕於西山建大覺寺為其靜修之所及朕嗣登寶位凡體國經邦一應庶務自有古帝王治世大法佛氏見性明心之學與治道無涉且若以舊邸熟識僧人仍令主席京師天下或以朕有好佛之心深有未可且有纍於性音之清行而性音亦力辭歸隱遂安禪於廬山隱居寺四年於茲謹守律規謝絶塵境即本省大吏盡不知不聞也今聞其圓寂朕心深為軫恤著照玉林加恩之例追贈國師并賜其諡號交內閣撰擬其語録乃近代僧人所罕能者著入經藏以彰其真修翼善之功欽此乾隆三年皇上賜藏經全部恭載雍正十三年四月初八日世宗憲皇帝御製頒賜藏經卷首偈佛光恩照三千大千隨緣遍滿恆河法界普度羣生悉證菩提身心安泰時年豐稔風雨調順日月升恆乾坤清寧百昌蕃熾上下樂利中外協和庶物咸亨萬善圓成情與無情同登正覺乾隆九年皇上賜祖像三十二軸世宗憲皇帝御製傳讚石刻裝潢像首恭載全篇僧肇京兆人俗姓無傳以晉孝武太元九年生家貧為人繕寫傭次歷觀經史備盡墳典初師莊老繼而歎曰美則美矣然以棲神冥纍為期未是究竟及見舊維摩經歡喜頂受曰吾知所師矣於是出家兼通三藏年二十名振關中京兆宿儒對之箝舌爾時至有負糧千里入關抗辨者嶽嶽而來肇盡折其角既而鳩摩羅什在吕光處肇往從之什來長安歸姚秦肇亦隨至姚興命佐什宣譯梵經與僧䂮僧遷法欽道流道恆道標僧睿等八百人俱住禁中逍遙園尊禮優異時南朝遠法師為蓮社高賢社中開士劉遺民越疆致書商榷元旨肇所問答遠極嘉歡其書垂今肇著般若無知涅槃無名不真空物不遷寶藏等論并注維摩經並紙貴當年香流億劫宗門膠柱之流謂達摩未入震旦前直指一宗未度肇論猶是教相又妄造臨刑詩云四大本無主五藴本來空將頭臨白刃猶似斬春風雖元沙備禪師猶以為肇實有此語拈云大小肇法師臨死猶䆿語肇於晉安帝義興十年在姚秦長安吉祥滅度史氏所載可考也至一燈炯照達摩未來時之震旦其論具在識者自知大清雍正十一年封大智圓正聖僧肇法師讚曰破塵出經天函地蓋此天地中塵塵法界及破一塵宏開法會於此親聞造論無礙雍正十一年二月初一日御筆寶志俗姓朱金城人生於晉安帝義興十四年出家道林寺師事沙門僧儉宋太始初始顯齊建元中神通異驗士庶敬事齊武帝收付建康獄既而出之猶終齊世禁其出入梁武帝即位乃下詔曰志公迹拘塵垢神遊冥寂水火不能焦濡蛇虎不能侵懼語其佛理則聲聞以上談其隱淪則遁仙高者豈得以俗士常情空相拘制何其鄙狹一至於此自今行來隨意出入勿得復禁梁天監十三年滅度壽九十七示寂自然一燭以付後閣舍人吳慶白帝帝曰大師不復留矣燭者將以後事囑我也因厚葬於鍾山獨龍阜敕陸倕為銘於塔內王筠勒碑於寺門識者曰志公拳拳梁武老婆心切行時猶以本分提持而梁武不悟可惜也有十二時歌大乘讚不二頌等製入藏其迷悟不二頌尤為喫緊提撕頌曰迷時以空為色悟即以色為空迷悟本無差別色空究竟還同愚人喚南作北智者達無西東欲覓如來妙理常在一念之中陽焰本非其水渴鹿狂趁忩匆自身虛假不實將空更欲覓空世人迷倒至甚如犬吠雷叿叿至其前知靈迹語若讖緯具載梁書何敬容傳梁高僧傳陳書徐陵傳魏楊衒之洛陽伽藍記隋書五行志等書非本分故不録大清雍正十二年封一際真密禪師讚曰菩提大道京都鄴都迷悟不二㗭唎蘇嚧萬萬不殊一一如如十二時中無缺無餘雍正十二年二月十五日御筆慧思武津人姓李氏頂有肉髻牛行象視夢梵僧勸出俗乃辭親入道及禀具日一食誦法華等經滿千遍又閲妙勝定經慕禪那功德乃至慧聞處受法晝夜攝心經三七日獲宿智通尋四支緩弱不能行步自念曰病從業生業由心起心源無起外境何狀病業與身都如雲影如是觀已顛倒想滅輕安如故夏滿猶無所得深懷慚愧放身倚壁背未至間豁爾開悟自是名行遠聞學侣日至乃以大小乘定慧等法隨根引喻俾習慈忍行奉菩薩戒焉北齊天保中領徒南邁止大蘇山嘗示衆曰道源不遠性海非遙但向己求莫從他覓覓即不得得亦不真偈曰頓悟心源開寶藏隱顯靈通現真相獨行獨坐常巍巍百億化身無數量縱令逼塞滿虛空看時不見微塵相可笑物兮無比况口吐明珠光晃晃尋常見說不思議一語標名言下當又偈曰天不能蓋地不能載無去無來無障礙無長無短無青黃不在中間及內外超羣出衆太虛元指物傳心人不會時衆請講法華般若二經門人智顗至一心具萬行有疑請決師曰汝所疑乃大品次第意耳未是法華圓頓旨也吾昔於夏中一念頓發諸法現前吾既身證不勞致疑陳光大六年六月自大蘇山將四十餘僧趨南嶽值一處林泉勝異思曰此古寺也吾昔曾居之掘之基址猶存陳主屢致供養目為大禪師太建九年六月示寂壽六十有四思以梁武帝天監五年生蓋與菩提達摩同時云大清雍正十二年封圓慧妙勝禪師讚曰得大總持於法自在演教明宗不思議海法華三昧燈傳智師少室天台奚隔一絲雍正十二年三月初一日御筆元覺字明道春秋宋戴公之後世為魏郡名家隨東晉渡江為永嘉人覺齠年剃髮與兄宣法師並為名僧其猶子二人亦與緇侶住龍興寺巖下菴既乃與東陽策禪師偕詣曹溪既申長鯨逆水之機決定不疑之旨欲遄返曹溪為留一宿時號一宿覺云覺所著證道歌得無生法忍提示最為親切又作禪宗悟修圓旨全水是波全波是水羅該三千威儀八萬細行唱導十方窮未來際令彼自他兼利頓漸雙忘生於唐高宗麟德二年滅於唐元宗開元元年蓋與曹溪同時滅度焉未滅前有鵝千羣止於寺西及建塔適於其處北海李雍列其心行録為碑銘慶州刺史魏靖緝其遺言刊永嘉集元宗敕諡無相禪師塔曰淨光宋太宗淳化中詔本州重修龕塔大清雍正十一年封洞明妙智禪師讚曰深通妙相莊嚴性空舉足下足在道場中惟此道場乃水中月明明真空步步實躡雍正十一年三月十五日御筆慧忠諸暨人姓冉氏少而好學既出家遍參名宿遊覽四明天目五嶺羅浮承心印於能公乃卜居黨子谷四十餘年開元中中書侍郎王琚太常少卿趙頤貞奏薦詔居龍興寺計忠是時少亦年五十餘至代宗大歷十年示寂蓋百餘歲矣屬安史之亂賊寇南陽臨以白刃詞色不撓賊帥投劍羅拜無何羣盜又至忠曰不可以踵前也遂杖錫沿江而去不隨忠去者並遇害肅宗再定區夏聞其德高以上元二年正月敕內給事孫朝進驛騎迎請肩輿上殿坐而論道稱國師尋敕居千佛寺與西天大耳三藏紫璘供奉等當御辨論為俗所傳代宗大曆八年奏度天下名山僧道萬餘人卒諡大證禪師詔歸黨子之香嚴寺起塔供養大清雍正十二年封真實大證禪師忠將涅槃辭唐代宗代宗曰師滅度後弟子將何所記忠曰告檀越造取一所無縫塔代宗曰就師請取塔樣忠良久曰會麼代宗曰不會忠曰貧道去後弟子應真卻知此事乞詔問之後詔應真問前語真良久曰聖上會麼代宗曰不會真述偈曰湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識應真即耽源讚曰未始有宗大耳罔測摸著鼻孔躲避不得無縫塔中金剛大士剪樣示人虛空為紙雍正十二年四月初一日御筆道一以唐中宗景龍三年生於漢州什邡縣俗姓馬故人稱馬大師亦曰馬祖生禀異姿牛行虎視舌過鼻準足成文字年方童孺不好嬉戲嶷如山立湛若川澄及長謂九流六學不足經慮惟宅心禪宗正覺削髮於資州唐和上受具於渝州圓律師後聞衡嶽有讓禪師為曹溪法嗣乃往參承本珠頓朗讓禪師曰道一得吾心善古今禪誦於撫州西裏山又南至處州龔公山山中夔魈蛇虎自然屏跡尚書路嗣恭為連帥聆風景慕迎居治所開化接人學徒雲集趙州嘗云馬祖大師下八十餘員善知識箇個俱是作家嘗示衆曰夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界惟心森羅萬象一法之所印凡所見色皆自見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事唐德宗貞元四年登建昌石門山謂弟子曰吾至二月當還及期跏趺歸寂遂塔於石門春秋八十夏臘五十唐憲宗追諡大寂禪師弟子唐宰相權德輿為塔銘大清雍正十二年封普照大寂禪師讚曰影留海昏塔在石門微言妙旨龍藏垂文都沒交涉捉風繫雲是一橛柴或師之真雍正十二年四月十五日御筆希遷陳氏子瑞州高安人處胎母即不喜茹葷血生而岐嶷孩提如成人六祖開化於南乃直詣祖所祖持其手曰苟為我弟子當肖遷笑曰諾乃祝髮為座下沙彌自是上下羅浮往來三峽間開元十六年受具足戒於羅浮後詣廬陵清涼山參青原思禪師思公之門學者駢集及遷之來思曰衆角雖多一麟足矣遂嗣青原天寶初始造衡山南寺寺之東有石狀如臺遷結庵其上俯臨衆峰時人因號石頭和尚師以唐中宗嗣聖十七年生德宗貞元六年滅春秋九十一僧臘六十三門人慧朗等六人相與建塔敕諡無際大師塔曰見相大清雍正十二年封智海無際禪師遷答問簡敏提示切要其居衡嶽也讓禪師每謂其徒曰彼石頭真獅子吼必能使汝眼清涼論曰世謂遷於六祖將滅問當依何人祖曰尋思去遷遵誡晝夜尋思首座謂思禪師在吉州汝緣在彼師言本直汝自迷耳乃詣吉州思曰子何方來遷曰曹溪思曰將得甚麼來曰未到曹溪亦不失思曰若恁麼用到曹溪作麼曰若不到曹溪爭知不失觀遷答問其時已達根源豈有滯於言句兀兀尋思之理且祖師直指字字誠實豈如世諦戲作廋詞況令弟子參承何人何妨明示非欲令其自己證入者可比又何必語焉而不詳蓋後人神奇其說以見杖拂源流大鑒先知之明不知卻是鈍置伊耳讚曰曹溪法乳千子齊注厥味如何無舌可味從何而來從這裏去木頭碌磚如是如是雍正十二年五月初一日御筆惟儼俗姓寒絳縣人以唐肅宗乾元二年生代宗大曆八年納戒於衡嶽寺律行嚴密既而南造石頭謁遷禪師求直指之旨遷令謁馬師一居三年一問子近日見處作麼生儼曰皮膚脫落盡惟有一真實一乃遣歸石頭一日在石上坐次石頭問曰汝作麼曰一切不為石頭云恁麼即間坐也曰若間坐即為也石頭云汝道不為且不為個什麼曰千聖亦不識石頭乃以偈讚之後居澧州藥山海衆雲會與道吾雲巖高沙彌龎居士輩提唱宗乘振戛圓音朗州刺史李翱者韓愈弟子也入山見儼不覺自釋所負欣愜作禮相國崔羣常侍溫造亦每問道焉唐文宗太和二年告衆云法堂頽矣衆不喻率人舉大木支柱儼撫掌大笑合掌順寂春秋七十夏臘五十三敕諡宏道大師塔曰化城大清雍正十二年封達宗宏道禪師儼嗣石頭於六祖為第四世李翱初見儼儼時誦經不顧翱問如何是道儼以手指上下曰雲在天水在瓶又一夜登山經行雲開見月大笑一聲聞澧陽東九十里許李翱贈詩曰鍊得身形似鶴形千株松下兩函經我來問道無餘話雲在青天水在瓶又曰選得幽居愜野情終年無送亦無迎有時直上孤峰頂月下披雲嘯一聲讚曰針劄不入非思量地石上栽花榮枯兩是高高山頂深深海底立斯行斯非師本位雍正十二年五月十五日御筆澄觀姓夏侯越州山陰人生於唐元宗天寶間年十一依寶林寺霈禪師出家及長遍尋名山旁求祕藏既具戒從潤州棲霞醴律師學相部律詣金陵元壁法師傳關河三論在瓦官寺傳起信涅槃於淮南法藏受海東起信疏義就蘇州湛然法師習天台止觀法華維摩等經疏謁牛頭忠禪師徑山欽禪師咨決南宗心要復見慧雲禪師了北宗元理兼習儒門經傳子史小學蒼雅學天竺悉曇諸部通祕咒儀軌博聞多能出於天性以語言文字作佛事用烟墨緗素演圓音北遊五臺講華嚴經并演諸論更撰經疏起於唐德宗興元元年正月成於貞元三年十二月既而德宗遣中使李輔光宣詔入都與罽賓三藏般若譯烏茶國王所進華嚴後分四十卷又詔令造疏遂於終南草堂寺編成十卷進呈敕令兩街各講一通撰疏時池生嘉蓮五枝一花皆有三節尋奉詔譯守護國界主經唐順宗在春宮時常垂教令述了義一卷心要一卷觀平生依法修行如命盡形不出梵網寂於唐憲宗元和年間春秋七十所著述甚富列在法林其答唐順宗心要一書可謂橫該三界一切處豎徹三際一切時函蓋無餘神妙破的學人於此薦得入流無所大清雍正十二年封妙正真乘禪師讚曰六根塵識遍含法界嚴淨毗尼極樂自在八教五乘蓮雲靉靆層映重重各各無礙雍正十二年六月初一日御筆天台寒山子者不知何許人也自昔以豐干有寒山文殊拾得普賢之語遂謂文殊普賢在唐末應化為二大士又自為和合二聖云其住世亦莫知其紀年且無氏族名字唐興縣西有寒暗二巖以其居寒巖中則曰寒山子也冠樺皮衣破襦時就國清寺從拾得取衆僧殘食食之或時叫噪慢罵寺僧以杖逼逐則大笑而去人皆以為風狂貧子一日豐干告之曰汝與我遊五臺即我同流曰我不去干曰汝不是我同流寒卻問干汝去五臺作麼干曰禮文殊曰汝不是我同流後豐干為閶閭邱太守治頭風且令入山訪寒拾閶邱竟造二人所禮拜寺僧驚愕曰大官何拜風狂漢耶寒山執閶邱手笑曰豐干饒舌自此寒拾相攜去更不復入寺趙州諗者當時宗匠海內所欽行腳至天台禮二士相問答有久嚮國清有寒拾之語而國清寺僧見太守作禮然後愕然足知一寺皆啞羊也閶邱又往寒巖拜問送衣裳藥物寒山但云賊賊即退入石穴中高唱曰報汝諸人各各努力穴竟不可尋遂絶蹤跡閶邱乃令寺僧道翹尋其遺句於林葉石壁村墅垣落間得寒山詩三百餘首拾得詩五十餘首其言句並是圓宗極則如理實談從佛口宣作將來眼大清雍正十一年封妙覺普度和聖寒山大士讚曰天然獨立無有伴侶淨潔空明何能何所石壁題詩寒巖獨坐三際十方金剛常住雍正十一年六月十五日御筆拾得天台國清寺行者寺舂榖僧豐干山行至赤城道側聞孺子泣聲尋得之問其由曰孤棄於此久矣遂攜至寺付典座僧有來追尋者付還之久之寂然沙門靈熠乃受而撫育以長名拾得拾得詩云從來是拾得不是偶然稱也初知寺中食堂香燈一日忽登座與佛像對槃而食呼憍陳如為小果聲聞旁若無人執箸大笑熠乃白尊宿罷其堂任令入廚下滌器拾得每洗鉢已即收殘食截巨竹筒盛之待寒山子來負而去每與寒山子聚語或同笑舞此啐彼啄𠔏演圓音寺僧不知其何說也有護伽藍神廟每日僧廚下食為鳥所掠拾得以杖抶之曰汝食不能護安能護伽藍乎其夕神附夢於合寺僧曰拾得打我詰旦說夢一寺紛然又寺僧說戒次拾得驅羣牛至僧所集堂前倚門撫掌大笑曰悠悠者聚頭首座叱曰清淨戒壇風漢何得喧礙拾得曰我不放牛也此羣牛者多是此寺知事僧乃呼亡僧法號其牛一一應聲而過閶邱太守從豐干之言入寺向二大士致敬拾得遂與寒山子出寺去不知所終寺僧道翹奉閶邱之命搜録兩人語句於寺土地廟壁得拾得詩偈五十許首今附寒山集中行於世大清雍正十一年封圓覺慈度合聖拾得大士讚曰曾不將來誰其拾得放下苕帚一切常寂凡愚奚知自亦不識任運騰騰無為之力雍正十一年七月初一日御筆希運閩人十歲出家於高安黃蘗寺額間有肉珠隆起儀貌修偉遊天台逢一僧偕行屬澗水暴漲其僧躡波如地既登彼岸足不沾水招運曰渡來渡來運呵之曰自了漢其僧歎曰子真大乘法器至京路間乞食次遇一老嫗咨決元旨乃曰此五障身曾參南陽忠國師來師若欲了此一大事須往南昌見馬大師運如其語往南昌時馬祖道一已示寂乃參百丈一日百丈舉馬祖振威一喝三日耳聾悟由運言下證入遂嗣百丈後居洪州大安寺學者奔湊運嘗示人曰一切色是佛色一切聲是佛聲見一切法即見一切心一切法本空心即不無不無即妙有有亦不有不有亦有即真空妙有六道四生山河大地有性無性元同一體言同者名相亦空有亦空無亦空盡恆沙世界原是一空誰是授記人誰是成佛人誰是得法人相國裴休出鎮宛陵建大禪院延運說法以運出家黃蘗仍以黃蘗名其寺運示裴休幾千萬言甚得心無心地法性空位休亦有傳心偈述所證為運法嗣運於曹溪為五世孫其俗姓及年歲載籍莫考以唐宣宗大中年間示寂其嗣臨濟元支流蕃衍於今最盛諡斷際禪師塔曰廣業大清雍正十二年封正覺斷際禪師讚曰黃蘗吐舌百丈耳聾振威一喝臨濟宗風到此化城須達寶所大方廣地本無寸土雍正十二年七月十五日御筆從諗郝氏子青州臨淄人或云曹州郝鄉人以唐代宗大歷十三年生童稚之歲孤介不羣其披剃也或云青州龍興伽藍或云曹州扈通院其納戒也在嵩琉璃壇自為沙彌參南泉願禪師即深器之許為入室一日問南泉如何是道泉云平常心是道云還可趣向否泉云擬向即乖云不擬時如何知是道泉云道不屬知不屬不知知是妄覺不知是無記若是真達不疑之道猶如太虛廓然虛豁豈可强是非耶言下頓悟元旨心如朗月乃往嵩山受戒尋返南泉既而遊歷寶壽鹽官夾山五臺因住趙郡觀音院時藩鎮王景崇王鎔父子封王於趙諗慈雲所潤歸心禮足道化大行凡所舉揚天下傳之號趙州門風唐昭宗乾寧四年右脅而寂壽一百二十歲諗出南泉願願出馬祖一一出南嶽讓讓出曹溪凡五世諸方私諡真際大師大清雍正十一年封圓證直指真際禪師讚曰趙州石橋度驢度馬老僧平生用不盡者過得此關東院西也明月清風非其儔亞雍正十一年八月初一日御筆景岑號招賢其氏族里居出家具戒因緣俱莫考初住鹿苑其後居無定所但任緣接物隨請說法化行湖南長沙時衆謂之長沙和尚初岑久住南泉獻投機偈曰今日還鄉入大門南泉親道遍乾坤法法分明皆祖父回頭慚愧好兒孫南泉願偈答曰今日投機事莫論南泉不道遍乾坤還鄉盡是兒孫事祖父從來不出門遂嗣南泉僧問和尚繼嗣何人岑曰我無人得繼嗣僧曰還參學也無曰我自參學僧曰師意如何以偈示曰虛空問萬象萬象答虛空誰人親得聞木義丱角童後瑞聖通得其提持岑示寂後通以弟子禮事之岑常與仰山寂玩月次寂曰人人盡有這個祗是用不得岑曰恰是倩汝用寂曰爾作麼生用岑劈胸與一踏寂曰㘞直下似個大蟲自此諸方稱為岑大蟲岑言句洞明提持直截如香象渡河步步到底如養由架箭一一穿楊盡為破的之文皆是窮源之說其與講經供奉皓月論三德涅槃及教中幻意又與僧論佛與文殊觀音普賢真體妙用並宏深微妙廓徹圓融學者真參實悟得了自心發書觀之自然冥契岑住世若干歲不見於方策考普願以唐德宗貞元間倡化南泉岑預法席其後瑞聖通詣岑參承約在唐宣懿間則岑壽少亦當七八十矣大清雍正十二年封洞妙朗淨禪師讚曰幻本來真水月天月說水說天皆為強說真本無生幻亦不滅無滅無生天然成佛雍正十二年八月十五日御筆靈祐福州長溪人俗姓趙丱角之歲有天人降其庭謂家老曰此童佛之真子衢巷之人諦觀焉年十五依本郡恆法師執勞什伯於衆年二十剃髮三年具戒入天台遇寒山子於途謂曰千山萬水遇潭即止獲無價寶賑恤諸子遂詣泐潭參百丈頓了祖意司馬頭陀者精鑒人倫地理者也百丈曰老僧欲住溈山可乎曰和尚是骨人彼肉山也居之徒不滿千乃喚華林曰不可喚祐至曰此正溈山主矣百丈是夜召師以溈山付囑時華林為第一座不平百丈云若能對衆下得一語出格當與住持即指淨瓶問云不得喚作淨瓶汝喚作什麼華林云不可喚作木𣔻也百丈不肯問祐祐踢倒淨瓶百丈笑云第一座輸卻山矣是山峭絶敻無人烟祐飲泉飯橡猿鹿為伍山下居民稍稍知信為營梵宇襄陽帥李景讓奏表山門為同慶寺相國裴休崔慎並崇師禮祐敷揚宗教四十餘年達者不可勝數入室弟子四十一人仰山寂為上首世號溈仰宗焉自曹溪傳南嶽讓以迄於祐凡五世祐唐代宗大歷七年生宣宗大中七年滅春秋八十三夏臘五十九敕諡大圓禪師塔曰清淨大清雍正十一年封靈覺大圓禪師讚曰道人之心一泓秋水無事無為澄渟淡濘不受一塵無渠下觜不舍一法全在裏許雍正十二年九月初一日御筆義元邢氏子曹州南華人幼負出塵之志及落髮進具便慕禪宗初在黃蘗隨衆參侍問如何是祖師西來的的意黃蘗便打三問三打乃辭去參大愚言下頓契黃蘗無意之意乃返黃蘗黃蘗印可從此啐啄同時了然通徹乃北歸鄉土俯徇趙人之請住於城南臨濟其罏𨪋所鑄煜爍古今迄今千五百年嗣法者幾遍震旦自曹溪傳南嶽讓以迄於元凡六世元建三元三要四喝四賓主等為揀魔辨異門庭施設嘗曰山僧無一法與人袛是治病解縛蓋此本與向上事沒交涉後之執指為月者於此每多金鍮混雜云平日應機多用喝世傳臨濟喝其示語有曰不被境轉處處用境東涌西沒南涌北沒中涌邊沒邊涌中沒履水如地履地如水緣何如此為達四大如夢如幻故聽法者非爾四大能用爾四大若如是見得便乃去住自由又云目前用處始終不異處處不礙是活文殊一念心無差別光處處總是普賢一念心能自在隨處解脫此觀音三昧法互為主伴顯即一時顯隱即一時隱一即三三即一唐懿宗咸通八年示寂敕諡慧照大師塔曰澄虛大清雍正十二年封真常慧照禪師讚曰無依道人諸佛之母痛與三十免教出醜如是無依可受棒否棒亦無依誰與誰受雍正十二年九月十五日御筆慧寂俗姓葉韶州懷化人也年九歲於廣州和安寺投通禪師出家十四父母取歸欲與議婚寂斷指誓求正法夜有白光二道從曹溪直貫其舍父母悟其誠感乃與削染初參耽源真數年謁大溈祐於時尚未具戒祐問曰汝是有主沙彌無主沙彌寂曰有主祐曰在什麼處寂從西過東立祐大異之寂問如何是真佛住處祐曰有思無思之妙返思靈焰之無窮思盡還源性相常住事理不二真佛如如師於言下頓悟尋往江陵受戒復還大溈前後十五載父子共闡元旨化度學人其心源契合啐啄同時正如迦陵頻伽聲應音圓師子三歲兒便能大哮吼既住仰山時歸省覲祐亦數遣信共相提唱後世因傳為溈仰宗法父子繼述之盛冠絶古今寂初於耽源處受忠國師所傳曹溪九十七圓相其後接人每用以施設宗徒傳之謂仰山門風然考耽源傳示日寂一見即焚卻異時耽源問之寂曰寂一覽已知但用得不可執本和尚若要重録不難即重集以呈更無遺失其後溈山作圓相中書日字示寂寂亦作此相於地以腳抹之然則寂所受者法法何曾法學者於此不得入海算沙自取目眩矣寂後居東平山年七十七示滅門人遷歸仰山塔曰妙光諡智通禪師大清雍正十一年加封真證智通禪師寂之示滅蓋在唐宣懿間溯其生年當在德宗時少溈山祐十餘歲寂平生多遇異僧有稱之為小釋迦者故世號小釋迦云讚曰鼠糞黃金一手拈出奮迅爪牙接機利物實即是權權即是實驚散野干師子在窟雍正十二年十月初一日御筆良價俗姓俞會稽諸暨人以唐憲宗元和二年生少從師念般若經問無根塵義其師駭曰吾非汝師即指往五泄山禮默禪師披剃年二十一具戒於嵩山首謁南泉次參溈山舉忠國師無情說法公案溈山云父母所生口終不為汝說價不契乃令謁雲巖疑情頓寢述偈曰若將耳聽聲不現眼處聞聲方得知雲巖曰價闍黎承當個事大須審細後因過水覩影了徹前旨述偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如常曰直須心心不觸物步步無處所常不間斷稍得相應又曰道無心合人人無心合道欲識個中意一老一不老在泐潭尋譯大藏纂大乘經要一卷激勵道俗又作五位君臣頌明正中偏偏中正正中來兼中至兼中到其後因付囑曹山寂復述其旨要其詞層映交光誠得寶鏡三昧禪門謂之曹洞宗唐宣宗大中末始於新豐山開堂後盛化於豫章高安之洞山唐懿宗咸通十年順化大衆戀慕價忽開目起曰出家之人豈得心附著於物耶召主事僧營齊曰齊畢乃行衆故延之至七日齊具價亦隨齊謂衆曰此齊可名愚癡矣壽六十三臘四十二諡悟本大師塔曰真覺大清雍正十二年封淨覺悟本禪師讚曰本來面目不行鳥道方便垂手正偏兼到五五三三天真而妙月住波流粼粼金藻雍正十二年十月十五日御筆大同懷寧人姓劉氏髫齡依洛下保唐滿禪師出家初習止觀次閲華嚴獲窺性海耽慕真宗乃詣翠微山謁無學禪師一日無學在法堂經行同問西來密旨和尚如何示人無學駐步步時同又請無學曰更要第二杓惡水作麼同乃禮謝而退無學曰莫躲卻同曰時至根苗自生由是如冰釋水任性卷舒乃歸故里隱投子山結茅而居趙州從諗嚮其元風行腳到投子相訪一時問答之語諸方傳播天下雲水禪侶奔湊門下雪峰義存曾造法席被其鉗鎚五鹿嶽嶽朱雲折其角不是過也同住投子三十餘年陶鑄學徒如金鎞刮眼運斤成風辨才無礙有師子無畏之目乃其直截提持向上實為檀那法食能令隨器大小並飽香飯妙味非肯以舌鋒搘拄人者同嘗在京赴檀越齊檀越將一槃草來同拳兩手安頭上檀越便將齊來後有僧問和尚在京赴齊意旨如何同曰觀世音菩薩有僧問一等是水為甚海鹹河淡同曰天上星地下木黃巢寇起賊持刃上山問同住此何為同為隨宜說法渠魁拜服脫衣禮施而去同以唐憲宗元和十一年生以梁太祖乾化四年順寂春秋九十有六詔諡慈濟大師塔曰真寂大清雍正十二年封智照慈濟禪師讚曰投子古路驀直前去參老钁頭主人油是眼目定動漆桶裏坐覿體真鈍十身調御雍正十二年十一月初一日御筆本寂閩莆田名族黃氏子莆田在唐衣冠鼎盛時號小稷下寂佩服儒風博聞強記年十九入福州雲居山出家二十五具戒雖年少而舉止過老苾芻咸通年間良價開堂洞山寂往來請益洞山問名曰本寂曰向上更道曰不名本寂洞山深器之自此入室密印所會數載辭洞山價問什麼處去曰不變異處曰不變異何去耶曰去亦不變異初受請止於撫州之曹山後居玉屏山兩處學徒雲集堂盈室滿所著對寒山子詩流行宇內又嘗讀傅大士法身偈意不肯門弟子請別作之乃作偈自為注釋又嘗問強上座曰佛真法身猶若空虛應物現形如水中月作麼生說個應的道理強曰如驢覻井寂乃改其語曰如井覻驢皆平生示人最親切處寂既深達妙旨契合真歸接引上機略無軌迹洵如香象渡河步步到底其受洞山五位銓量叢林以為標準號曹洞宗寂以唐文宗開成五年生至唐昭宗天復元年辛酉春秋六十有二問知事僧曰今是何月日曰六月十五日曰曹山一生只知九十日為一夏至十六日辰時圓寂休夏三十有七敕諡元燈大師塔曰福圓大清雍正十二年封寶藏元燈禪師讚曰非我非渠亦同亦別全無消息直下了徹銀碗盛雪古鏡照物十方一心不動不絶雍正十二年十一月十五日御筆師備福州閩縣人姓謝氏唐文宗太和九年生咸通初投芙蓉山靈訓禪師落髮豫章開元寺道元律師受具還歸故里行頭陀行布納添麻芒鞋續草并日而食宴坐泊如與雪峰義存禪師為法門兄弟備師事存存以備苦行故目為備頭陀云存開荒雪峰備與同力締搆山門勞役每率先於衆入室咨決罔替昕昏誦楞嚴經發明心地由是理事一如辨才無礙雖因緣雪峰得入正智而一心圓滿實為見過於師其所垂語如師子遊行如金剛鋒鍔如圓鏡交光如杲日赫焰廓徹洞明總持圓湛獨脫無依直示衆生令自知有頓入凡聖平等真原其無緣之慈同體之悲流轉音間晃朗句外時閩越忠懿王王審知帥閩極隆禮敬奏賜紫衣號宗一大師備初受請住梅溪普應院中間遷止元沙山應機接物三十餘年承青原石頭之法流轉導來際諸方臻萃請益剖疑十二時中誨人不倦室戶為之不閉學侶八百許人羅漢桂琛為上首閩浙之間法嗣繁衍以梁開平二年戊辰寂滅春秋七十有四夏臘四十有四王審知為樹塔院嘗曰佛道間曠無有程途無門解脫之門無意道人之意古錐風味千載常存大清雍正十二年封超圓真鑑宗一禪師讚曰十方虛空微塵一切皆無自性在本覺裏靜亦不沈動亦不起此是元沙真實人體雍正十二年十二月初一日御筆文偃嘉興人姓張氏幼依空王寺志澄律師出家侍澄數年研窮律部以己事未明往參睦州道明明閉卻門偃乃扣門明開門一見還閉卻偃連三日扣門明開門擒住曰道道偃擬議明推出掩門曰秦時𨍏轢鑽偃一足猶在門內遂為所損從此悟入明乃指詣雪峰存參證契合元旨遂嗣雪峰先是靈樹知聖二十年不請首座常云我首座生也我首座牧牛也我首座行腳悟道也忽一日鳴鐘集大衆三門外接首座衆如言出迓而偃至聖曰望子久矣時南漢劉氏據廣聖坐化日呈一帖曰人天眼目堂中首座劉氏遂請偃繼聖開法既而遷雲門山光泰寺偃每顧見僧即曰鑒僧欲酬之則曰咦率以為常故門弟子録曰顧鑒咦善為學人勦情絶見俾直了自心所為細看即是陷虎機忽轟一聲塗毒鼓不許門弟子記録其語學人以紙為衣隨時竊書之嘗自作頌曰雲門聳峻白雲低水急遊魚不敢棲入戶已知來見解何煩更舉轢中泥又曰舉不顧即差互擬思量何劫悟弟子嗣法者五十一人世號雲門宗以後五代晉天福十二年順寂諡曰慈雲匡真宏明禪師閲十七載為宋太祖乾德元年詔迎其肉身入京師供養月餘仍送還山讚曰行腳本色真空絶跡日升月恆日日好日四面無門十方無壁六既不收一亦不立雍正十二年十二月十五日御筆桂琛俗姓李常山人童稚之歲篤求遠俗齊茹一餐調息終日秉心誠確鄉黨共欽弱冠從萬歲寺無相師出家既登戒地力學毗尼一日為衆升臺宣戒竟歎曰持犯束縛非解脫也依文作解豈究竟乎於是誓訪南宗跋涉萬里初謁雲居後詣雪峰參訊勤恪未有所見後造元沙宗一禪師一言啓發廓爾無惑元沙誘迪學者每命琛助其闡發琛住密行三昧珠藏川底不現輝光而月印江心朗然逈異禪侶歸心咨稟來決疑叢於時王廷翰剖劇閩越於城西石山建精舍曰地藏請琛駐錫一紀有餘遷止漳州羅漢院大宣法要南北參徒輻輳駢集更盛於在地藏時弟子清涼文益居上首為一方法眼琛空假雙圓可中徹去舉金剛祕密不思議光明藏直截提示令學人出五陰界嘗曰諸上座不用思量思量不及便道不消揀擇委得下口處麼試道看還有一法近得汝遠得汝同得汝異得汝麼既然如是為甚麼卻特地艱難去後唐天成二年戊子復屆閩城舊址遍玩遠近梵宇隨喜數日安坐順寂距生時唐懿宗咸通八年春秋六十有二僧臘四十塔於地藏院之西門人私諡曰應真禪師大清雍正十二年封本覺應真禪師讚曰羅漢宗風表裏看取豎起掃帚四楞塌地大須彌山常在眼裏須彌云何掃帚便是雍正十二年二月初一日御筆文益俗姓魯餘杭人唐僖宗光啓元年生七齡削染於新定智通院依全偉禪師禀具於越州開元寺屬希覺律師授徒鄮山益往居門下嚴淨毗尼旁通儒典既而謂非了義乃振錫南邁抵福州長慶法會尋約伴西出湖湘值溪流暴漲憩城西地藏院時羅漢琛在院素知其穎脫因舉肇論次琛問山河大地與上座自己是同是別益曰別琛豎兩指益曰同琛又豎兩指便起去越日辭別琛送之曰上座平日說三界惟心萬法惟識指庭下片石曰且道此石在心內在心外益曰在心內琛曰行腳人著甚來由安片石在心內益窘無以對遂留止求決擇月餘而疑山頓摧遂授記於琛已而臨川州牧請住崇壽院四還緇侶雲集咨請江南國主李升迎住報恩禪院署號淨慧禪師益朝夕演唱諸方被化聲流海外異域嘗曰出家兒但隨時及節便得寒即寒熱即熱欲知佛性義當觀時節因緣又云盡十方世界皎皎地無一絲頭若有一絲頭即是一絲頭以周顯德五年寂於金陵江南國主諡大法眼禪師塔曰無相春秋七十四夏臘五十五大弟子天台德韶吳越國師慧炬高麗國師元沙一宗至益而中興於江表故世號法眼宗系出青原思為曹溪下第九世江南國主李煜作碑頌韓熙載撰塔銘後門人行言復請改諡大智藏大導師大清雍正十二年封妙光法眼智藏禪師益好為文詞所作偈頌贊銘等凡數萬言讚曰眼不見眼能依所現大地是眼阿誰求見眼無自性是眼亦幻幻即非幻大法眼遍雍正十三年二月十五日御筆德韶處州龍泉人族陳氏年十有五有梵僧見之拊其背曰汝當出家乃往依龍歸寺剃髮十八詣信州開元寺受戒後唐同光中遍參諸方至龍牙問雄雄之尊因甚親近不得遁禪師曰如火與火韶不契後至臨川謁法眼頓了心要法眼出青原思於曹溪為九世孫韶嗣法眼為十世入天台山建寺院大興元沙之宗歸依日衆吳越國王錢元瓘尊為國師數使使存問旁午山谷時天台智者教典散落惟新羅國有全本韶允羲寂之請白吳越忠懿王發使並賚韶書往彼國繕寫備足入藏宋太祖開寶五年滅度距生時閲春秋八十二為唐昭宗天復元年住六十四夏傳法弟子百餘人永明壽為上首韶圓徹洞明為古德中所希有在般若寺開堂說法十二會其方便為人語句如清涼風如寶珠網如無著華如旭日輪誠為震旦妙法慈航其嗣永明壽益震雷音以宗為教以教為宗於言語道斷心行處滅處直截無礙灼然見於語言文字雖壽見過於師然實韶有以啓之也嘗以涅槃四種聞示學者曰聞不聞不聞聞不聞不聞諸方目為四料揀韶多靈異通術數至今江浙間傳之與本分無涉不具録大清雍正十二年封妙慈圓徹禪師讚曰三宗一毛今古一念如火與火中邊全占無中可入無邊可出曰有則明曰無則實雍正十三年三月初一日御筆重顯蜀遂寧李氏子生於宋太宗太平興國五年初依普安院銑上人受具潛心教乘深極幽元每逢講席機辨鋒馳四衆盡屈乃南詣智門祚問不起一念云何有過智門召顯近前以拂子驀口打顯甫擬開口智門又打於時豁然開悟留止五年復遍參洞山聰大龍洪羅漢林大愚芝乃出世翠峰遷於雪竇山顯既宏博多聞詞旨妙絶平生頌古最多叢林競傳刊在大藏後世沿流忘源遂成文字然顯所拈頌不離本分直臻向上原未嘗有絲毫點滓繫綴當來也其開堂日瓣香智門有大龍小師曰何不與先師燒香顯曰昔僧問如何是堅固法身先師曰山花開似錦澗水湛如藍我頌此因緣報他恩了也雲峰悅以不嗣大愚特過勘顯驀曰入荒田不揀信手拈來草觸目未嘗無臨機何不道顯拈一莖禾示之悅不肯顯曰你不肯即休一日遊山次周覽烟嵐顧謂侍者曰何日復來耶於是弟子並請遺偈顯曰平生惟愚語之多矣翌日乃曰七月七日重相見及期盥沐攝衣北首而寂時仁宗皇祐四年也閲世七十三坐夏五十顯嗣智門為雲門三世孫系出青原思思受記於六祖凡十世諡明覺禪師大清雍正十一年加封正智明覺禪師讚曰日月星辰水火土石上亘九霄下橫六極各演圓音靡有止息雪竇有口暫須掛壁雍正十三年三月十五日御筆延壽王氏子以唐昭宗天佑元年生於吳越錢氏國歷梁唐晉漢周至宋太祖開寶八年順寂時吳越未歸宋版圖故延壽為吳越錢塘人壽生而知歸心佛乘既冠不茹葷血日一食誦法華終身不輟得一萬三千許部年草八為華亭鎮將督軍需吳越文穆王從壽本志放令出家依翠巖參禪師執勞供衆持頭陀行甚至既往天台山天柱峰習定九旬鳥巢衣褶中天台韶國師深器之為付囑出住雪竇山時靈隱祖庭頽廢吳越新之迎壽住持其明年遷住慧日永明寺高麗國王遣使航海遠遺器物恭敬作禮壽自能言即不兩舌戒行精嚴安而行之昕夕修持無轉睫彈指之間及開堂說法誨人之外惟坐諷經唄乘大願力檀那妙法度弟子幾一萬二千人又以一代時教流傳東土龍藏浩瀚學者目不周覽去聖遙遠性宗教律橫分畛域講師律師不達宗旨而託迹宗門者復妄議教律壽為重閣館天台賢首慈恩三宗諸知法比丘更相設難以心宗要旨折中之參合梵經唐語疏通證明作宗鏡録一百卷實能攝無量法門歸涅槃一路又作萬善同歸心賦惟心訣等書皆無上甘露妙味盡未來際利益無邊俱登一際解脫之門並受平等菩提之記至其戒乘雙圓理事無礙實為震旦宗師首出涌泉欣云見解人多行解人萬中無一如壽者可謂行解人矣壽住世七十二僧臘四十二宋太宗額其塔曰壽寧禪院大清雍正十一年封妙圓正修智覺禪師其平生著述在藏者並重刊頒布天下叢林為禪衲法式讚曰生佛一際何佛何生菩提道場法爾圓成不假修治要須履行無緣慈化真實等平雍正十一年四月初一日御筆義懷北宋真仁間人永嘉樂清陳氏子也世業漁母夢大星入屋而孕懷為兒時父捕魚坐之船尾得魚則付令折柳以貫懷輒私投諸江中雖數受怒笞恬然自若也長遊京師依景德寺為行童天聖中試經得度謁金鑾善葉縣省皆蒙印可至姑蘇禮明覺於翠峰入室數四不契尋為水頭因汲水折擔忽然有省作投機偈曰一二三四五六七萬仞峰頭獨足立驪龍頷下奪明珠一言勘破維摩詰覺聞拊几稱善其後七坐道場化行海內嗣法者甚衆常示人曰須彌頂上不扣金鐘畢鉢巖中無人聚會山僧倒騎佛殿諸人反著草鞋朝遊檀特暮到羅浮拄杖針筒自家收取又曰雁過長空影沉寒水雁無遺蹤之意水無留影之心若能如是方解異類中行不用續鳬截鶴夷嶽盈壑晚年示疾池陽弟子智才住臨平之佛日迎歸侍奉一日才出寺未還懷速之歸曰時至吾行矣才曰師有何語示乃曰紅日照扶桑寒雲封華嶽三更過鐵圍拶折驪龍角才問卯塔已成如何是畢竟事懷舉拳示之遂就寢推枕而寂崇寧中敕諡振宗禪師大清雍正十二年封圓湛振宗禪師讚曰晝日夜星靈山授記日日好日心空及第蕉耳親聞葵眼諦視本分如然奚為妙智雍正十二年四月十五日御筆克勤彭州駱氏子生宋英神間童時日記千言偶遊妙寂寺見佛經三復之恍如舊觀省前生曾為沙門乃祝髮具戒初參真覺勝繼謁玉泉皓次依金鑾信大溈哲黃龍心東林度僉推為法器最後見五祖演盡其機用演皆不肯勤謂演強移換人忿然而去至金山遇疾始覺平生所得略無用處旋還依演作侍者演一日因部使者問道舉頻呼小玉緣何事為要檀郎認得聲句勤侍立次見雞飛上闌干拍翼且鳴忽爽然曰此豈不是聲耶即袖香入室通所得演遍告山中耆舊曰勤侍者參得禪矣勤號佛果演門下高足弟子以勤及佛鑑佛眼為上首時稱三佛所至學侶景從開堂成都昭覺寺政和間出峽南遊遇丞相張商英於荊南劇談華嚴旨要商英得勤指證踏得末後一關乃以師禮留居碧巖復徙道林寺樞密使鄧子常奏賜紫詔住金陵蔣山既而敕遷天寧萬壽寺召見褒寵甚渥南渡後又遷金山宋高宗之在維揚入對賜號圓悟禪師改住雲居久之復領昭覺紹興五年八月示寂塔於昭覺寺側諡真覺大師勤負荷宗乘提持祖印嘗自作像讚云為人到徹骨不惜兩莖眉大清雍正十一年封明宗真覺圓悟禪師讚曰口角濤翻傾倒心肝纖塵不立搘拄梵天隨分些些時節因緣鐵錘無孔體實名權雍正十二年四月初一日御筆宏袾字佛慧號蓮池俗姓沈浙江仁和人以明嘉靖十四年生年十七充本縣學生員三十二歲辭家祝髮遍參諸方得念佛三昧歸依淨土一門乞食次見雲棲山水幽寂乃結茆三楹倚壁危坐常絶糧至七日念佛不輟環山多虎袾住後虎為遠徙值歲大旱循田念佛雨隨足跡而注居民德之遂成蘭若道風大扇四衆翕集嚴淨毗尼傑出諸方專勤念佛遠追蓮社人稱雲棲菩薩時當明季魔民法藏輩以雙頭獨結細宗密旨誑惑無識口傳手授實法死句以為教外別傳又藉世典文章詞賦塗飾士大夫耳目俾為外護翕赫熾張勢如燎原競以濁穢作芬陀利汚人慧命宗風衰謝日甚一日袾以宗門無義路必真參實悟始得豈可輕談漫語罪同謗大般若於是禁止學徒妄拈妄頌及講說宗要違者出院惟將一心念佛平等大悲導衆入四安樂行所居不名方丈示非唱導之師其常住執事無高下大小一衆輪值至今門庭峻整戒香薰郁百餘年來留佛種子以待更復世出者殆功德不可思議矣以萬歷四十二年示寂臨行張目云老實念佛勿捏怪勿壞規矩向西念佛而逝塔於五雲山之麓年八十有二大清雍正十二年封淨妙真修禪師讚曰三乘十地頓漸偏圓一句具足法爾如然作麼一句阿彌陀佛方廣等平圓通明徹雍正十二年閏四月十五日御筆通琇號玉林毗陵楊氏子幼讀金剛般若生希有想年十九因翻盛水器見浮漚有省即詣磬山禮天隱修落髮具戒不三年而見與師齊年二十二天隱修命主報恩法席時天隱修密雲悟為諸方老宿琇以年少開堂秉拂而能紹述宗風為海內所欽仰順治十五年戊戌世祖章皇帝詔入禁中萬善殿焚修封大覺禪師琇母練行尼也號大慈老人琇居報恩時建報恩堂以奉母視膳問安不輟至是大慈老人圓寂詔從其請歸山葬母特賜金起塔庚子春遣使賜紫加封大覺普濟禪師其冬復詔來京加封大覺普濟能仁國師開壇於京西慈壽寺徒僧千五百人辛丑春南還往天目山師子正宗寺丙辰八月順寂琇生於明萬曆四十二年至大清康熙十五年春秋六十有三僧臘四十有四琇平生有自厲四誓一誓不與本分間隔作一佛事乃至一稱一禮一誓不與本分間隔為一人乃至交一言一誓不與本分間隔閲一書作一字一誓不與本分間隔一坐立一談笑在世祖章皇帝時恩禮優渥琇始終未嘗有絲毫與本分間隔處誠足為衲僧法式讚曰太士應化遭逢聖君華足藻地景星絢旻普吉祥光演妙圓音具無盡德度無量人雍正十二年五月初一日御筆行森號𦭎溪又號慈翁博羅人俗姓黎氏器宇神俊壯歲四大偶不安和倚枕間忽聞鼓吹聲頓省根源不從他有遂決志出家依雲嶠信信示寂乃參大覺普濟能仁國師玉林琇洞明心要琇令分座說法接引海衆十方參承捷得解脫一時目為大鵬劈海又稱為森鐵棒云開化龍溪緇侶輻輳大清順治十五年戊戌世祖章皇帝召玉林琇入京琇令森主報恩法席己亥玉林還山森奉詔留京師世祖章皇帝寵遇極隆屢降恩旨欲加封號森以父子不敢並受封奏辭甚力世祖從之既而請謁五臺山宿顯通寺寺前遇一婆子手提竹籃口嚼石子若仙若神與語深明宗旨呼森為大通佛自五臺回遂乞歸龍溪世祖賜所居寺曰圓照御書以賜森持律精純導衆嚴整雅有百丈之風雖機辨迅利而實能正眼接人非祗露一己之爪牙者受世祖章皇帝知遇甚深及其歸里如日邊雲影既離絳霄即隨意孤飛斷崖荒水間不挂一絲真是無為道人所行如其所解世諦無非第一義諦足以媲美玉林為千古衲僧規則康熙十六年遊華巖曰此中修篁奇石可以臥數江帆吾老此畫圖中矣乃自刻化期手書封龕偈而寂世壽六十有四僧臘三十有六蓋生於明萬曆之四十二年也大清雍正十一年追封明道正覺禪師讚曰一人首出八表升平爰有龍象僧中之英十虛融攝正眼洞明日光月華水緑山青雍正十一年五月十五日御筆乾隆十六年聖駕南巡三月初四日幸理安寺御製遊理安寺詩路盡九溪十八澗境奇三竺兩高峰香臺聽講來馴鴿靜室安禪制毒龍法雨淙常空色相巖花放不論春冬歸鞭卻恐留清戀倩取白雲一片封初五日臣僧明羲詣宮門謝恩蒙賜銀五十兩衣縀八匹茶葉四瓶荷包二個回鑾後賜御製心經塔圖一幅御書樹最勝幢額御書遊理安寺詩墨寶二幅恭藏寺中乾隆二十二年聖駕南巡三月初一日幸理安寺蒙賜大士圖像一軸御製詩一首一徑入深秀萬峰森簇攢石橋原不隔蓮界總生歡既狹中方闊憑高望亦寬禪寧與儒異惟願理之安初五日臣僧實月詣宮門謝恩蒙賜銀五十兩衣縀八匹東菀香一包荷包四個乾隆二十七年春三月聖駕南巡幸理安寺御賜詩一首見說安心竟何來理與安山如標靜諦鳥亦發清歡蓋影張祇樹經聲出戒壇了當忘結習歸去漫回看又蒙御書識安心竟額乾隆三十六年春三月聖駕南巡幸理安寺御製詩一首環繞七峰處合流雙澗間棲真適歸徑挂衲便尋山詎亟一遊興圖消片刻閒憑欄挹蔥翠可以謝躋攀聖駕再幸理安御製詩一首儒釋雖殊道理安原實同為咨學佛侶何以繼宗風澗水環門淨山峰映座崇縱然聲與色個裏不空空乾隆四十五年春暮聖駕南巡幸理安寺御製詩一首溪澗回環徑不寬到來精舍暫盤桓泉流法雨毛髮鑑閣坐松巔衣袂寒唐宋遺蹤頗可考人天顯應漫從看理安傳自理宗定其代偏安理豈安乾隆四十九年九月初六日蒙頒賜出滿漢蒙古西蕃合壁全咒龍藏全部十月初三日蒙賜出維摩詰經三卷乾隆四十九年三月蒙賜出無量壽佛經兩卷七葉碑圖一幅又蒙賜竹絲鑲嵌玉如意二柄乾隆五十年正月二十八日蒙賜出御製大雲輪請雨經五卷七月十三日蒙賜出御製白傘蓋經五卷十二月又蒙賜出碑刻應真像十六軸乾隆五十四年八月十二日蒙賜出御製理安寺詠古詩一首一谷一溪環抱巒到來古寺愜遊盤蹟留唐代實已泯名定宋年義可觀合與墨家娛性地似殊儒道論心官爾時早失中原半於理安乎抑未安住持臣僧恭紀
