body:
  text: 規約伏虎禪師創寺距有明弘治中四百餘年規制已不可考法雨師以一瓢一笠入山獨居晚得大弟子曰戒慧披榛剃草創造維艱然徒衆未甚盛也七條之約立意較然非明眼尊宿不能作如是語矣箬菴問禪師少事法雨更受衣鉢於磬山歸而唱法大集學徒章明條教闡發宗風俾各司其職違則以律繩之規模於是乎大具嗣以天笠珍禪師鉗椎妙密戒律益精故海內錙流有生死理安之稱則惟立法之嚴且善也迦陵音禪師奉世宗憲皇帝命來主方丈懼其日久法弛復申箬祖之言以警有衆由是午夜梵鐘三時贊唄威儀齊整器鉢無聲甲於武林諸梵剎將來祗守勿替以毋越前人之規繩於嗣法者有厚望焉志規約法雨大師遺囑大涅槃經遺教經佛之遺囑也百丈清規禪林寶訓祖之遺囑也又復何言但老朽一傘一鉢入澗中嗣以傘易篷以篷易茆又縛廠閣方圓丈許意將終身焉蒙諸檀越建禪堂安僧禮誦搆一閣供佛藏經廊廡三門廚竈厠溷叢林不足靜室有餘儘可棲身學道念我年將古稀飲食漸減形神日衰以吾世期將近恐致身後事事無憑不得不作一語付諸守成者建寺始末悉載碑記出家參訪緣起在行實中不必復言屋宇靜室前後門牆石砧壞宜修理不必營添四圍石山若干畝護培茶竹界址須明秀水齋田深想置時煩苦用心管業且山屋田地之資一瓦一椽一磚一石雖賴十方善信皆我同戒慧省口剝膚辛力共成我室內經書袈裟鉢盂等物亦是知己相贈俱付戒慧收管托真實道心不欺不敗者堅守不損壞不借出代代相傳如中峰楚石之衣鉢蘇東坡陸五臺之玉帶至今尚存古老遺迹為山門增勝倘戒慧老倦代管常住必得行解兼全者如無其人推真實老誠厚德者收人宜少貴選精修此山非納海衆之所不必廣容雜穢度庸人百不如度慧心人一也老朽披緇五十餘年住山將四十載一味條直平常秪好安分守拙亦不裝魔捏怪誑惑世人惟愛松筠為居泉石為侶客至煮茗清談客去焚香默坐汝等遞相勸化努力勤修弗空過日又山中住過不守清規久行擯出者我在生不許見面身後豈容入門吾十三歲父喪母寡發心出家十四祝髮披緇並不攜俗家寸草出門親族亦毫無半錢資助彼此心迹明白衆所共知料無他説我乃懶於攀緣從不募化所來者微所費者廣裝佛請經買山造屋砌路布橋壘牆填地築砧開溝連年賦稅加嚮日用猶自不足豈有餘蓄我平日並不欠人一文人或欠我者不負前約償還常住招提之物一針一草斷不可取生減福壽死墮阿鼻財物受用有盡地獄苦報無窮因果歷然貪心永絶倘有人曾經到寺者或面目不認得者來此生端假捏誆騙異言詭詐者決不可聽信以理遣之以上實言付囑若不遵依是名不孝非吾徒也老朽入山初志只要了己躬下事茅屋數椽道人兩個松雲泉石以樂天真隨緣度人用報佛祖自揣無神通三昧大福大緣大才大辨不敢自瞞每思隱山不肯見人趙州不肯告人道林鳥窠懶殘土穴往古先德尚且如此我乃何人敢於出世耶昔紫柏先師云良賈深藏躲得一日有一日受用以是終年不甚輕出亦不欲多造殿宇廣容徒衆護法議古剎當興不得已而搆禪室有屋必有僧又不得已而留人古人云三人便是叢林宜遵清規務守戒律參禪念佛淡泊精修豫年十四歲萬曆十年十月初十日求靜明老師為我祝髮至今五十餘年請雲棲大師授沙彌戒菩薩戒甲午參學金陵禮紫柏大師印我禪宗向上一事即攜鉢入十八澗精心苦志惟期開悟完我平生衆議古剎復興四十餘年不停土木之工不敢妄行一步不敢妄費一錢錯昧因果獨我戒慧實心苦助毫無私念其餘衆徒亦皆苦心為理安常住我並無珍玩留下只有經書之類存於常住後人讀誦不可與人取去想我辦時艱難我去世後不可四處報訃不許戴孝行世俗之事乞衆檀越念我平日相與苦心修造更加護惜理安常住也老朽在寂光中合掌稱謝不盡崇禎九年五月日法雨大師出家七種不留不為生死真實修行出家者不留父母不許者不留強棄妻子者不留偶有事故一時激發者不留貪眠懶惰苟圖衣食者不留遊蕩人間結交壞法邪見曾經擯逐者不留身有惡疾坡課不隨衆者不留箬菴禪師同住規約夫叢林之設本為辦道修行每見淪落不堪積成流弊皆緣主者偏徇己私愛護眷屬遂至法門頽敗靡靡下衰通問向來行腳諸方歷覽弊端痛心徹骨本寺開山受業先大師一生苦節埀四十年方成叢席圓寂以來鹿崖大師力能遵守遺規猶恐法久弊生邀同檀護招通問歸院提持此道與十方衲子粒米共餐則眷屬即十方十方即眷屬同為佛祖兒孫有何內外界限然人情好縱不得不建立規條為衆作則凡我同住須各各以自己本分大事為急務朝參暮究斷絶攀緣即或飽歷叢林宿參耆德猶宜謹確為末法津梁後生標榜本寺山深路僻凡百艱辛雖未能廣納衆賢實願利養同均甘苦共受幸相體悉延接古風佛祖慧命端有賴矣規條開列於左不許破犯根本大戒犯者責擯出院不許私立徒衆收畜年少沙彌違者出院不許鬬搆是非破口罵詈互相行拳犯者不論曲直俱出院不許不赴齋堂私相授受背衆飲食輕則議罰故違出院不許私據間房自取安便長養惰習除老病違者出院不許將山地與人安葬違者出院不許斫伐前後山場竹木永遵開山遺命違者重罰出院不許私向施主募化違者出院不許遊玩山水無故往來城市頻到鄰菴攪擾違者重罰不聽出院不許私竄寮房嬉笑雜語誤己妨人違者重罰不聽出院不許不隨二時功課除老病及公務違者罰不許假託疾病攜酒入山如病非酒莫療者白衆方許違者出院不許侵損常住物件及尋覓樹根花草等物違者重罰不為生死真實參究者不留恃狂妄知見破蕩威儀者不留涉獵詩文沉酣翰墨習學應赴經懴及效俗人喫煙者不留恃己有功不受職事人規諫者不留祇見人短不揣己過者不留身在局外好議局內事者不留以上規條各宜恪守若不遵依毋勞共住崇禎歲次丁丑春王朔日箬菴禪師禪堂規約古規失檢怠惰成風時弊多端提持貴密雖則現成公案要須一衆共知行解相應則無愧於先宗道德兼資乃有利於末學是在同心共相遵守巡照四板監值揭帳淨面五板值日鳴報鐘接板定香大鐘完鳴三板止靜香一寸開靜早課誦畢候梆鳴過堂粥罷值日接板定香鳴魚二下經行香半枝鳴二板候香完鳴魚一下抽解三板止靜香完開小靜監值打茶巡香散鐘子茶畢鳴魚二下經行香半枝鳴站板一下坐少刻鳴板二下行香完鳴魚一下抽解鳴魚三下止靜候午梆開大靜過堂齋畢復如上行夜粥罷鳴報鐘晚課畢接板日暮定香經行止靜亦如前四枝香完開大靜六枝香完展單所有條款計開於左妄作拈頌評論公案者出堂爭香板者出堂亂統機鋒者出堂不滿期告假者罰過堂不隨衆者罰有病三日不食者方許出堂調養違者罰偷看文書者罰課誦不隨衆者罰交頭接耳及靜中破笑者罰經行笑談者罰行香坐香不到者罰出入職事在前違者罰私造飲食者罰開靜後語笑及出外者罰惡人警策昏散者罰三香板不下單者罰行坐不隨衆者罰無病躲坡者罰鐘板參差者罰報魚不清者罰出入不白職事者罰值日交代不清者罰破壞什物者罰堂內前後縫補者罰私借堂內什物出外者罰不受人約束者罰崇禎歲次丁丑春王朔日箬菴禪師禪堂結制規約十四日貼單維那令當值監值於佛座左右鋪席大衆俱將行李安席上佛前設公位悅衆領二清衆鳴引磬上方丈請和尚進堂三拜畢齊立板首和尚貼以下維那貼貼畢送方丈歸堂各照單安行李晚課畢拜方丈巡寮維那作白禪堂結冬巡寮次早舉寶鼎爇名香讚念無量壽咒祈禱悅衆領監院祈禱四聖課誦畢維那云向上展具頂禮西天東土歷代祖師三拜天下弘宗演教諸大善知識三拜各人得戒和尚三拜剃度師三拜前後開山老和尚三拜起具問訊對面展具皇清某年某月某日結冬之辰大衆師雲集普禮三拜勿勞起具再白云某職事師三拜內外職事拜畢云再禮方丈和尚三拜起具問訊雲集祖堂禮祖禮畢上方丈頂禮畢歸堂兩單對拜惟元旦解冬二次如結冬式其餘朔望惟舉爐香乍爇讚每月十四三十小參凡遇結冬元旦解冬成道佛誕自恣聖壽不論有齋無齋俱上堂餘大節早參除夕不放假禪堂不請茶除夕禮祖畢上方丈即到大殿一切兩班立俟方丈到齊展具三拜辭年各歸堂寮元旦亦然拜私年者罰禮年懺三日至初四起七若有不解冬出外隨喜者重罰凡進堂者先行行一月方許引進方丈於早粥開小靜後知客鳴小板三下監值捲簾兩序自下往上立知客行禮畢堂師行禮維那問號登牌一東一西送單晚課畢大殿行禮止靜前禪堂行禮箬菴禪師客堂規約客至茶湯點心單次一一調停不得疏慢如疏慢失事者罰禪客遠至須看上中下座不得一例如明眼耆德安上客房五日作客請入賢者寮安置遠來禪衲三日作客初機晚學一日作客即隨衆一一請問名號住處登記簿上至於江湖混雜之輩早到一食晚到一宿即請別行不得安進客房失事賠罰信施辦齋散嚫等事副寺協同知事公議如式齋供小食除待賓客內外一例散嚫亦然客衆及外住法眷道友到者預先打疊外單安置如混送入堂私自攪擾倍罰本職知而不舉同罰凡求住者須令先看規約果能一一依行否次會衆職事察其立志的係參學好人可許安單入衆務察驗其道心恆遠方許進堂及當職事若全不識做工夫及已中邪毒等皆不許入堂粗野無教訓輩亦不許入堂妨衆混送者罰求戒者必須審問來歷引見書記登簿如求戒中例草率者罰客房牀帳枕席桌椅面盆手巾燈臺茶壺等物俱宜檢點如法失誤者賠罰常住錢糧齋供嚫儀禮節等俱副寺同知事典座議處喫齋時挂水牌上書今辰某居士為某事設齋齋罷即書黏齋單失誤者罰士大夫及諸方書至收好送上方丈將回書交付來人明白失誤者罰客堂僧衆不睦犯諍喧嚷者即時抽單逐出勿論是非知客副寺值歲典座凡事皆同商議如不相照應各執己見者罰失誤加罰清規云知客職典賓客凡官員檀越尊宿諸方名德相過者以茶迎待隨令行者通報方丈然後引進相見仍照管安下去處如以次賓客只就客堂相欵或欲詣諸寮相訪令行者引往其旦過寮牀帳什物燈油柴炭常令齊整新到須加溫存維那在假則攝其事僧堂前檢點行儀客僧粥飯若遇亡僧同侍者把帳暫到死主其喪雪竇在太陽禪月在石霜皆典此職毋忽箬菴祖師浴規蕩滌盡也未是本來面目灌沐潔矣終非無位真人者個那個齊該色身法身俱露須知未達色空祇道塵居身外忽悟水因方知瓦在心中果有一絲不挂底禪客便好向者裏納場敗闕凡水熱焚香默禱聖僧次方丈及尊客浴梆擊三下兩序浴一通禪堂二通列職三通普浴知隨行者人力後浴若有瘡疥者更宜在後抗拒不遵出院今將條約開列於左抵換衣服者出院高聲語笑者罰遲延時候者罰不候籖強入者罰壁上貼膏藥者罰用皂角者罰箬菴禪師厨房規約三世諸佛皆從行門而出況廚下易於求福易於造業清淨柔和求福之本偏衆懈怠造業之基一切共住者須遵開山大師規矩喫小食俱在廚下一概不許打去早課必須齊到若有不遵者香燈通知典座會同知客白方丈若有姑恕不舉者重罰不能遵守者毋勞同住慎之莫忽規矩七條開列於左凡一切大衆菜典座調理一切齊相幫不到者罰飯頭煮大衆三餐粥飯鍋鍋頭洗凡擡匾兩個飯頭相幫匾亦飯頭洗雜務庫房討客菜撿擇收留者重罰客飯頭煮客飯鍋焦輪日私留者罰磨頭私喫腐漿者重罰香燈照看大衆行李凡偷走者倍罰箬菴禪師兩序規約西則座元西堂後堂堂主書記藏主知藏知客參頭祖侍燒香記録衣鉢請客湯藥聖僧十六位東則都監監院維那副寺監收典座值歲知事知浴知山監修悅衆寮元十三位走則座元列堂後堂堂主都監監院惟繞佛都監監院在後維那書記副寺藏主知藏知客參頭監收典座值歲知事知浴知山監修祖侍燒香記録衣鉢請客湯藥聖僧悅衆寮元西職殿主間住庫頭飯頭貼案茶頭園頭行堂接供收供柴頭知器菜頭火頭磨頭鍋頭巡山米頭碗頭圊頭巡照雜務擔運灑掃香燈司水行者照客座元寮在法堂右與西堂共單傳戒一為羯磨一為教授分座秉拂凡開示垂問考工等類俱方丈命方行不同諸方草率俱無行者後堂堂主共寮在梅萼樓左此四板首分座説法必須識見超卓名望素著方授此職切不可因住久或有功行眼目不清妄授此職獲罪龍天課誦出坡皆為率領都監寮在庫房左一間上殿站在東班末跪在維那肩左行在監院後坐在監院上凡完錢糧收租庫房大事皆商酌而行監院與都監同寮監院站在西班末跪居中在方丈後凡檀越走動應酬必須赤心為常住出入銀錢交與副寺買賣貨物付之監收維總大綱心對龍天無愧不損常住不侵大衆一切毁譽不必計較維那寮在桂花樓右一間凡祈禱白椎舉唱領班白事內外及方丈有不齊者皆可舉罰當人天之綱維作大衆之首領生一事不如省一事安一人不如安衆人莫避嫌疑務要放出鐵面莫懼辛勤披露赤心則無愧斯職矣書記寮在法堂外西首第一間凡往來辭謝書啓皆代方丈為之榜文疏儀執掌惟勤寫送法語刻印語録刷訂書文可與記録同商共酌副寺寮在庫房右一間與監收共凡買辦物件須通知監院開單小則庫房商議大則客堂共酌然後與監收同辦監院副寺監收三人同到方可登帳半月到客堂兩序同結算明寫呈方丈藏主知藏寮在書記寮下一間二人共執藏鑰每年夏季六月鋪齋棹二十張先曬東櫉後曬西櫉候冷收匱此係前人一片心血斷不可將就或一二年不曬即黴爛矣曬經之日大衆煮豆米粥一餐喫小食凡有請看者須登牌某日某人請某經還則消帳解單日先去查取遺失者賠其餘知藏俱在藏樓東單知客第一見人須要有禮上等送符夢樓中等送祖師堂餘則送旦過若有舊職事歸來安賢者寮如齋主到飯則四菜茶則四果往來上客攢菜斟酌可也職事起單細查用物客被客枕不時檢閲每年八月浣滌一次留人須要客先討單三次然後細問以同住規矩示之方登名簿一切外單寧缺毋易如客方丈至先請淨面更衣喫茶預報方丈然後領見候齋畢送單客方丈後安侍者一位餘安符夢樓參堂巡寮大衆齊禮法堂右設一座若看兩序另外看單若不參堂巡寮大衆不禮單看兩序兩序回看參頭凡上堂小參須要應時問話單在藏樓西監收與副寺同寮出入銀錢什物詳細交納典座首座調性典座調命凡大衆菜蔬不得委之於貼案廚下一切職事善為調馭園中菜蔬不時檢察一生來不遺粒米三十里不捨菜葉此是古人之風衆務勤勞福歸倡者諸行放逸罪在首領毋得視為等間現有規約切須遵守值歲叢林以樹彰名大小樹木皆叢林羽翼或修房屋必須用者俱先商之兩序上白方丈然後斫伐私伐一株罰銀十兩不許共住春備梅雨一月之柴秋備陰雪數旬之薪最為要緊逐日柴薪大衆扒收敗葉斫伐新柴須要擇地毋得亂堆上堂搭座齋堂估唱亡僧茶毗靈骨入塔皆商之客堂凡柴頭上山作務大衆擔肥出坡皆要親到不得偷安本寮刀斧繩索匾擔竹扛不時檢閲亡僧靈龕後架肥桶既防日曬亦護風吹自生無量之福出坡寫牌與客堂計議可也知事寮在庫房外樓凡住久職事有益常住者皆入焉常住有大事請發心小事隨意可也知浴寮在知事左一間凡為化主不錯昧因果者少故開山以來不安斯職擇本處老誠修行者安一二備禪堂油燭浴堂手巾但一切隨緣不許打餓七站釘關違背佛制退息檀信知山常住山界一一清楚如新受斯職須邀同客堂看山界一回率領巡山時刻檢閲喫二堂飯以防偷盜寮在賢者樓第二間若拿住偷柴者送至客堂議罰以戒下次監修凡房屋破壞塔上傾圮道路沖踏用物毁壞商之監院客堂修理祖侍開山大師塔上上供時跪獻一茶果二箸三菜四點心五湯六飯七清茶凡遇祖忌辰須白方丈上供誤者罰其餘諸塔亦須不時灑掃上供儀式隨時斟酌塔上擔供客堂請灑掃發心燒香捧爐祖侍提茶燒香外則板首內則燒香實心操履究竟本分事者充之切勿亂安朔望上堂捧爐寮在松嶺閣上記録外則書記內則記録朔望小參上堂傳牌出門執杖請拂凡方丈語録文書等類細心料理方丈説法寫牌挂大王殿三日收牌語録兩本仔細寫明一存方丈一存本寮庶免遺失來往書禮登簿某月某人書一一寫明來書不可錯誤回書交明凡刻書印書裝釘須要細心料理不得草率寮在法堂外左一間衣鉢外則監院內則衣鉢出一物即登某日某人取傳一事即登某日某人報有齋儀分付行者請副寺知客交明如茶點果品即交湯藥如有香儀同當值登簿拆封出入銀錢逐月算清凡方丈內前人所遺之物皆須護惜少有遺失過歸方丈慎之慎之請客每日一人監值不離方丈一切客來兩序白事宜先通知報齋報茶白方丈分付行者如方丈在寺則白他出則登名諸方來使登名傳書通衣鉢收書封贐儀喫二堂如有失物誤事賠罰一人當值者出入禮佛早晚法座燒香不離左右方丈出門常隨侍從衣物等事去則領清回則交明衣鉢湯藥外則典座內則湯藥一切茶果須得善為收拾如方丈有客待齋先安小菜四碟客茶果子六盤不可過豐豐則不繼不可過嗇嗇則取怨夏天梅雨更要殷勤若逢常住有病人討小菜果品之類切須一一應酬寮在法堂外左第二間聖僧堂內安單和尚落堂拂座獻茶揩摩竹箆香板打七照應和尚面前香爐悅衆維那總持大綱悅衆調理細務凡寫牌收拾雜務俱要清楚如維那不在堂一切事務皆帶管攝二三悅衆打七輪流看香應酬課誦寮元凡客師到以禮相接一東一西送單早午二時板香晚間四枝香俱要坐完早晚課誦必須齊到不許在外間遊如果真為生死安心向道者領至客堂討單第一不可開口留單查出立擯常住道風安人臧否皆在寮元須擇老誠修行者為之僧值僧值者原無實位僧中之直不阿諛故不委曲故不回互故原是代方丈監察其所不及五日一換在大殿行禮交職自班首起至參頭止每早巡照三板催點路燈從方丈以及客寮催衆上殿各處嚴查早梆看開山門大衆過堂照看門戶不離山門防偷走者隨喫二堂禁止放逸大衆出坡回安置柴薪如法午梆亦然晚梆亦如早課催促日落看山門上鎖俟堂內定香催上路燈及各處琉璃二板客堂議事止靜後各處巡寮及旦過堂四枝香開大靜後禁止點燈六枝香完看息路燈細看廚茶二房火燭凡打七堂內事事料理五日之內不拘方丈職事有過則舉有失即罰若順私情伽藍不宥此乃從上遺規互相警策方丈不遵祖堂跪香大衆不遵上白方丈殿主單在天王殿前右一間與巡照門頭共寮每朝四板息琉璃供淨水燒香接大鐘完點燭大衆繞佛捲棕薦繞畢鋪開課誦下殿收棕薦上架開梆供粥鳴磬三下粥罷灑掃佛殿及天王殿如有香客來燒香有餘香燭留備早晚課誦應用不得私作人情午梆供飯晚課後定香時點琉璃開大靜接大鼓凡朔望早課須送鐺鉻小鼓上殿凡挂上供牌入廚庫二房取供二桌俟開午梆後鳴鼓三下供畢仍送入廚庫凡有經事須衣鉢寮領供器莊嚴一一點明鋪設整齊留心香燈勿致燒燬油汚經蓋桌圍謹慎小人如有失誤重罰經事畢仍一一點清交衣鉢寮派坡事半坡佛像及兩邊聖像半月一拂塵間住賢者樓安單全坡早晚課誦及坐香照堂中一例凡赴齋堂及繞佛在禪堂後庫頭同貼庫米頭共寮油鹽菜果不得亂發大衆油鹽自有定例草鞋禪堂五日一發行單三日香燈照人報數點明各寮香燈來取照數點明朔望發各堂寮油燭茶葉線香凡上供菜果俱五碗惟影堂及祖塔加湯點攢果有齋廚房稱各下院豆腐庫內有事同貼庫相幫料理照管門戶要緊飯頭供飯回出籮候齊上鍋蒸香到開梆打粥飯先盛供次齋堂後客堂再山寮餘外堂寮不許打粥飯除有病客飯頭每日料理小食飯頭相幫若尊客到候客堂侍寮報數入庫取米飯畢淨鍋小食鍋粑入庫俟行單發心用客飯鍋粑照單三處輪日發不得互混貼案有齋煎腐凡有客至候客堂侍寮來報明幾桌雜務入庫取油醬菜蔬二人料理候客飯熟齊發不得參差茶頭單在本樓三板巡照送火點燈燒開水面湯候殿主先打供水粥罷止靜燒開靜茶及四枝香燒開水晚粥罷燒二板茶打七不定每日普梆挑柴在山門內聽值歲派與照管腳盆面盆手巾凡水開必候禪堂外單齊取過方沖冷水不得倉悴動衆人念頭園頭單在旦過樓下與巡山接供共寮經理本園菜地及青龍山園地四季栽種不可失時大衆擡肥園頭候澆天旱澆水凡有時菜供過大衆方許客用先私後公查出重罰留菜種須要收好以為明春之用行堂單在齋樓右與碗頭共寮每日早午開梆值日案上燒香不得粗糙候結齋畢方許收碗值日喫頭堂候二堂人到值日行堂普茶禪堂領鍾壺遇齋鋪蒲團三個齋畢貼票齋單地五日一掃隨衆半坡值日看寮打七點柱燈鳴小板三下藥石完止燈打碎碗一賠一有心者一賠十接供單在旦過樓下左首大單同園頭巡山共寮每日接供各帶柴薪有失買賠清明前小食後往下院晚粥後回廚房候齊案板喫粥相幫收拾本寮香燈逢朔望日幫接供一回重陽後喫早粥了即往下院凡有齋帶豆腐每逢十四三十喫普茶果子供衆之物本寮輪流送至下院有失者重罰香燈輪請磨腐收供接引菴安單交飯即交寮用器不得遺失抵換私送什物查出重罰交飯須盡心若有遺失伽藍不宥必加報應凡送施主禮物收供自辦佛前燈油收供自化若弔紙須報當家上白常住料理收供領去私自作主罰單銀一季買油供衆臘月十五飯圓滿發腐十斤請人幫收十六收供上山挑米每人三斗同大衆喫米一樣只許喫不許糶如有糶者見一罰十是日方丈一齋客堂一茶元旦上山亦然每人發監院帖若干收供拜施主至初二日腐十斤十五起飯腐十斤第一小心火燭每日松柴一百斤夏季八十斤接供分帶一月油十斤鹽醬茶葉隨常住豐儉雜務來取單銀每斤二分半算四季散惟關上二分七釐草鞋豆腐錢每月一人六十文初二一半十六一半凡有齋腐隨常住發俱單嚫柴頭每日斫柴十二個多則發心少則罰兩回帶柴四個餘報值歲普請若開山斫柴商之值歲毋得硬自作主柴縛各人自辦遇有亡僧相幫料理常住發擡龕禮一錢山寮共八分照客二分知器單在接供寮旁小一間凡常住作器傢伙或修或置悉為料理有普請預將用器安天王殿前用畢收拾用竹問值歲菜頭三時菜俱預商之典座料理清潔切大衆菜一齊相幫勿使狼藉醃菜時客堂典座庫房三處商酌火頭每早三板後當值燒粥鍋禪堂板香止靜燒飯鍋飯熟不許打火開梆後毋阻晚粥亦然監值候禪堂送香燒菜鍋有齋煎腐小火頭若蒸饅頭大火頭相幫小食客飯當值燒小食菜客菜兼值燒住火即時灑掃竈前謹防火燭燒柴到三門內聽值歲派與不得爭奪磨頭竈樓安單間時自己挑柴有齋入庫量豆照數報客堂派牌幫磨大衆腐交典座客腐交庫房私喫豆腐皮者罰淨腐器洗鍋小心火燭鍋頭大衆粥飯鍋頭洗鍋相幫架筧上法雨泉舀水食罷洗碗子巡山先同知山領明山界樹木柴薪茶筍此皆所照管倘有侵占偷竊潛報常住拿究不得私自相爭及做情放走查出重罰每日三回喫二堂米頭凡有米到過數上倉篩淨榖沙發出平量毋使太過必至不及須信粒米如山慎勿遺壞若買豆曬乾上倉口袋腳籮繩索時時照管如有破損預白當家副寺料理碗頭食罷挑水淨碗箸收鎖匱中不許亂拏遺失每月用灰一擦粗糙破損者賠若交代一一點明隨衆半坡圊頭過堂關鎖後門每早四板點路燈五板挑殿旁淨桶勤換淨水洗曬手巾潔掃淨房晚課罷送各處淨桶凡浴水深五寸九溪橋挑客堂請人相幫水熱設監浴桌位請方丈浴後照浴規次第開梆夏天一日一浴春秋五日一浴冬季半月一浴要柴不得亂斫須問過值歲秋冬爬貯敗葉以防春雨巡照日暮定香開大靜接鐘鼓候定香到即鳴三板送茶房燈水開鳴四板少刻五板候接大鼓兼帶門頭照管三門鎖鑰喫二堂打掃山門內外雜務大衆鹽醬客菜作料聽典座貼案分付入庫聽發不得爭閙相幫收拾淨器淨鍋打掃廚下廚房喫飯雜務行堂菜頭行菜鍋頭打飯雜務收拾餘照廚規擔運庫內出山買物俱要細心庫房印糕等事間則相幫灑掃合院廊廡丹墀及時打掃三門外至九溪橋路徑各祖塔上俱要拔草打掃香燈禪堂掃塵燒香供水及時點燈止燈香燭半月一取草鞋五日一領照看堂師行李喫二堂飯取鍋粑除朔望二日挂上堂牌其餘照規藏樓香燈每日打茶水灑掃挑淨看行李喫二堂飯派磨腐年供入廚庫取初三還桂花樓香燈執照定香點右廊路燈開大靜止明早四板點天明即止兼帶法堂樓如逢上堂小參擂大鼓半坡派磨客腐朔望取香燭年供入廚庫取初三還梅萼樓早晚點路燈與桂花樓同兼帶法堂如逢上堂小參撞大鐘法堂上供入廚庫取上畢送還年供初三還朔望取香燭派坡等亦與桂花樓同接供寮香燈每日打茶水灑掃看行李朔望相幫接供一回十四二十取茶葉草鞋燭一枝遇陰雨打火每晚定香止靜如不到者白客堂罰派磨客腐山寮香燈打茶水灑掃淨碗打火看行李打粥飯草鞋三日一取朔望取香燭茶葉年供入廚庫取初三還祖師堂賢者寮二處香燈每晚定香止靜與禪堂同打茶水灑掃看寮上殿課誦朔望取香燭茶葉草鞋如有供入廚庫取上畢仍還年供初三還半坡派磨客腐廚房每日打茶灑掃催課誦看寮除公務若止靜不到者白典座有供入庫取供畢送還年供初三還朔望取香燭茶葉燭三對兼管法雨泉延壽堂香燈八福田中看病第一凡病人入堂單令厚軟藥石適宜煎點殷勤問候周旋毋嫌穢惡及時打掃洗浣曬焙病人倘有所需問取庫房或湯藥寮行李若干多少白客堂僧值副寺值歲點明寄庫房病愈交還或久病難瘥須調養全愈切勿始勤終怠失病人望慎之符夢樓乃尊客宴息之處切須潔淨整齊茶水及時毋得怠慢如客至照單搬取被枕客去點交客堂留心鎖鑰遺失賠償不許私索客送及化緣等查出重罰半坡磨客腐司水每日清晨打面湯三時潄口水出坡淨腳水及時打掃前後丹墀及小淨溝以洗過面之湯水沖之勿令作氣堂中有事相幫其餘照堂規間時採楊枝出生早午齋堂出生晚課誦殿上出生料理堂中有事相幫箬菴禪師接引庵規約收十方施主之供增長福壽齋十方龍象之僧成就道業非乘願力與普賢把手共遊華藏海者不能既有此心又履此行須要豎精進幢被忍辱衣乘久遠輪懷利濟心則將來福報自然超他人一頭地矣監院料理常住照看門戶典座二時粥飯須要精潔火頭愛惜柴薪兼帶灑掃雜務種園燒浴仍司洗桶凡五六七月每日一浴三四八月三日一浴正二九月五日一浴冬季三七日一浴山中職事唯監院副寺知客監收到許喫飯安單其餘非常住公務一概不許攪擾違者監院重罰凡收供洗足歸寮靜坐不得間談攛寮一切事務先白監院轉上方丈既為佛子須遵佛行肆意妄行定招愆尤苐恐日久弊生放逸念起將成佛正因翻為地獄鐵案悔之晚矣今將條約列於左破根本大戒者重罰出院飲酒喫煙者罰不聽出院私自募化者出院攪羣亂衆者出院挑唆鬥爭者出院偷盜柴薪蔬菜者出院交拳相打者出院破口相罵者出院將常住之物私作人情者罰飲食不隨衆者罰私造飲食者罰課誦不到者罰無故不收供者罰私留道友者罰不受監院約束者罰違犯條約監院不舉者倍罰箬菴禪師接引菴列職規約當家入則值歲出則為當家凡下院大小事俱要留心照應門戶除公務無故不許出外若有遺失罰賠領衆課誦不許私情留客食宿或收供有病即上常住商議每月腐錢三十文嚫與序同貼案料理大衆菜飯煎腐淨鍋開梆打板灑掃廚下隨衆課誦每月腐錢三十文雙嚫每季單銀二錢二分半醃菜雜務園頭等一齊相幫園頭料理園地應時種菜秋後收豆竿瓜棚擅燒者罰如缺爛問值歲添補自擔回兼帶圊頭燒浴收留菜種腐錢單銀嚫與貼案同火頭每日燒面湯開水粥飯息枯炭不許私作人情天晴不許打火單銀嚫同貼案硬打者白當家罰水頭挑水破柴不許人擅取取者罰隨衆課誦腐錢單銀嚫與貼案同雜務行堂淨碗供回出飯洗桶淨匾洗菜打掃殿堂路徑照管三門上常住取什務朔望供燭一對年燭四對寮燭自備腐錢單銀嚫與貼案同迦陵禪師規約常住雖古剎已為湯宅故地捨出為寺開山大師頭結箬祖中結天笠老人旁結再普塔截流大師塔常住甚平穩後康熙三十七年獨超和尚特將六吉老和尚塔葬於山前從此多生疾病寂滅者不可勝數矣後睦菴和尚寂後衆門人以塔葬於後龍脈上湯護法與本家超字十八位明字九位同白於官乃移於東厮之右音來繼席心甚不忍欲為遷移其子孫不允因將此事白於雍親王自今敕建後凡有住持趣寂者皆葬於蓮花峰本山永不許葬壞千年常住風水若有葬者許大衆鳴之當道重處不恕常住修造與諸處下院皆請堪輿看過一切門窗等類皆配生合後住者切不宜改常住無宗堂凡住過者乃入牌位但大衆禮拜非同等間必為大衆結冬打七以法住持者方許送入叢林之廢廢於老堂耆宿往往外通施主以固其權內納行單以堅其勢換易方丈請黜職事皆歸掌握甚至盜取山田私蓄徒衆常住幸無此輩已後有久職事送歸一寮不許在外結納施主招留眷屬常住並無山主檀越凡請新方丈列數名於瓶內在韋馱前同兩序大衆拈鬮出請書斷不可商之施主老堂以遺後害新方丈進院舊方丈退處客方丈同兩序一一交明倘有遺失者舊方丈賠補交清兩序方許交代若不候新方丈到即去者兩序大衆公擯以後子孫不得再入茶園乃一年常住之需須勤著人鋤荒芟草冬間灌溉春間添補穀雨後看茶及時方採茶亭後一段青龍山一段園房一段方家塢一段大人峯一段宏法寺一段八角山一段請會作者作之採茶時知山巡山日夜巡察常有顧此失彼之虞每日腐飯淨浴大衆一齊出門採二茶在夏至前後凡茶籃茶凳查清收歸延壽堂單頂以備次年之用須作一色者方丈大衆均用不許作細茶送客留方丈以偏大衆完錢糧監院都監副寺同去年年不同完過收取紅票以為後證若無紅票彼即不準必有徵討紅票歸寺呈方丈收拾匱中上號某年錢糧票幾張在內以備查考清衆外單重病入延壽堂寂後停龕延壽一日兩序如有病入上延壽堂亡後停龕舊菜房三日如方丈有病入客方丈若示寂者停龕客方丈三七日早晚課誦後大衆持咒三日五日後估唱晚粥前維那舉大衆齊念南無清淨法身毗盧遮那佛衣具包袱被褥入常住庫房客堂二處計帳餘則估唱只許行單買以遺資設腐供衆凡請職事在堂內貼單者進堂行禮都監當家知客等俱不參堂堂內貼單只紀録參堂影堂侍者雖貼單俱不參堂方丈請一齋一茶巡寮打序板集兩序看單早課送大殿位齋堂送坐位禮方丈一拜若告暫假他去有功行者回來仍歸本寮如無功行者不準打七理安楊墳俱每夜十枝香放香養息一枝香即打巡照四板淨面各歸單坐飲糖湯候廚下接板即經行大殿繞佛打站板課誦完打抽解每飯粥止靜香站大半枝站須雙足齊並不得八字參差雙手垂下不許叉手行忌袖手坐忌垂足師家考功惟提本參學人請益單問話頭不許亂統公案此係老祖規矩切不宜改香板之式理安為最巡香板長二尺監香板一尺八寸看香板長二尺二寸散香板三尺六寸凡香板巡香惟打昏沉監香兼帶掉舉板首策香專看工夫方丈看香惟是直下會取而已故巡香須是兩手捧持不許一手垂下監香一手擎一手垂不得將香板拖下應作供養想板首則上下不拘不論昏沉掉舉盡皆可打常住不許在外應酬如有信心施主特請或在常住念誦皆是隨衆茶飯下午添小食晚上添一茶清衆行單不輪人少則維那庫房客堂書記侍者人多則知藏參頭值歲典座等每日嚫金多則五分一人少則三分一人餘則盡歸常住諷經者得一半一半同寮均分焰口維那當家分輪不會另請若有爭者立刻出院施主設齋任憑發心公嚫序嚫客堂不許索討違者立擯若有發心者多寡分派若五兩則無自六兩外至十兩止每兩出銀一錢以為公嚫除公扣外分作二分一分庫房廚房一分客堂值歲寮侍寮庫房都監監院副寺監收庫頭擔運米頭貼庫廚房典座貼案飯頭客飯頭鍋頭菜頭火頭水頭磨頭雜務客堂知客照客知隨值歲寮巡山茶房值歲園房殿主巡照本寮香燈侍寮侍者行者禪堂上供有供儀寫疏有疏儀宣疏有宣疏儀俱係公扣凡遇齋五兩以下者扣二分十兩以下者扣三分客堂收貯以買各處水牌雙嚫例則柴頭園頭茶園接供茶頭廚房磨頭庫內行者圊頭巡山行者照客清波下院列職四人弘法園頭江頭園頭飯頭赤山埠下院俱雙分惟收供單分方丈十倍逢上堂香儀與序嚫同派坡亦十分常住文契關係非淺往往被人盜去以致二處爭競今後查明共若干紙貯於大匱存方丈鑰匙存庫房若要契對即方丈亦不許私看必監院副寺知客監收藏主僧值皆到方許開匱私開者罰銀十兩完錢糧方丈私開罰銀二十兩新舊交代時先點文契不清不接接即新方丈事有失者賠償夫叢林之興非興於興之時當其廢時憂勤惕慮實為興之基及其廢也非廢於廢之時當其興也縱情恣怠真為廢之本所謂千年常住人非千年也地非千年也山園田産佛相莊嚴及一切養生之具均非千年也而得千年者何袛此規矩條例前人遺留後輩遵守永遠弗替者是也能守一日便為一日常住能守百年便為百年常住矣音於康熙三十年下南時猶未脫白偶到南澗頂禮天笠老人便生無限仰慕之心至三十五年參獨叔鐵叔睦叔金山法乳叔可達叔淨土身葉叔遠叔以及先師瀚叔應叔牧叔皆親侍丈室職當記録者五次承諸老人耳提面命不一是故祖山規矩細微曲折無不盡知及來據室一一遵守絲毫不敢改易妄自杜撰取罰龍天招咎伽籃今三年已滿特將規矩再細録出以便據室者務必虔守虔遵則祖山規模不至湮沒矣迦陵禪師經房規約經書法寶元貴流通往往以無資刷印為憾音退院之日兩序公議開經房以便流通一則便於方來請閲二則不致亂印壞板特命秀峯環廣二藏主董其事此項銀錢不許入常住有餘則以修板剛夠則再買紙墨只許買不許自刷印模打違者出院凡有交代須擇二人久住老誠職事主之兩序交明方丈送客一如買例特將名目價資謹録於左金剛經帖一錢三分丈室銘五分宗鑒堂帖一錢五分續燈存稿二錢法雨山居詩一分箬祖録六分曉祖録三分天祖録一錢二分宗鑑法林六錢雜毒海八分詩韻一分夢老和尚録三分迦陵禪師録一錢二分語要一分二釐指要一分
