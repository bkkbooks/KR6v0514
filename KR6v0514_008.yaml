body:
  text: 藝文錢唐擅山水之勝而理安寺當西南諸峰之隩九溪十八澗在焉清泉環砌白雲作籓香界高閒隔越塵境其清邃秀絕之概可以導幽情而舒風雅斯亦奇矣然溯中明而上屢遭壞創法宇摧殘四方游屐罕至咏歌無聞萬歷中得契靈大師駐錫其時吳方伯用先暨鄉耆布金蔚成叢剎而賢士大夫若馮太史輩移榼來游風流宏奬蓋澹社既作而吟咏之富號稱極盛我朝以來天下安平法輪宏轉好奇愛博之士以其餘閒探林壑之邃美啟幽鍵於慈燈即事裁詩選徒紀勝日以寖多裒然成袠爰是類而集之俾積玉相鮮半珠無憾云爾志藝文詩贈佛石大師黃輝慎軒縛茅方半壁便不過溪行行苦禪增價詩工道掩名法嚴諸弟好緣簡一身輕甕食垂寒髮高峰擬再生陶望齡石簣不出屢經年無齋自坦然高名傳口耳靈氣徧山川善說何曾說真禪不賣禪近來宗教客師與實天淵鄞縣屠隆赤水竿頭重進步瓶笠上孤峰閣小神通大心空法界容拂端呈了義筆底露機鋒晏坐那伽定涼風送暮鐘澹社秀水馮夢禎具區寒隨早梅放春氣動林泉到此人青眼相期社白蓮清音茅屋下明月竹窗前澹意息心在都忘俗慮牽得與遠公近無將陶謝分去喧聊避世習苦自逃羣曲澗移時汲深松靜夜聞空山門不閉遙度九溪雲同竇淮南黃貞父訪理安方丈仁和吳用先本如收印出城郭行行入白雲泉聲迤竹響鳥語隔松聞曲澗廻峰合空門野徑分平生蕭散意獨喜對僧羣招尋豈憚遠九轉聽溪流徑僻風烟靜山深林木幽青蓮覓淨侶白社愜良遊無限登臨興斜陽不可留無錫鄒廸光愚谷行密人難識曹溪是嫡傳應門曾戒虎報曉聽啼鵑槁木生猶死方牀坐不眠誰知丈室內法界有三千紅塵曾不遠太古若為鄰面目非凡品鬚眉亦眾人結茅藏寶帙刳石奉金身小坐維摩榻巖花滿葛巾九折溪流潄石根芙蓉稠疊款禪門六時常許猿聲報一室惟留虎跡存咒得山祗來侍食要將林鬼為司閽烟霞口角菩提相似爾何慚兩足尊王穉登百穀廢寺荒蕪已百年師今結屋更安禪林如支遁堪棲鶴社似廬山喜種蓮巖畔伐薪常易米石邊接竹每供泉詩成盡是雲霞色不數清江與皎然次百穀韻仁和黃汝亨貞父短日優游亦小年不須薙髮竟安禪澄澄水白杯停雪片片峰青座擁蓮僧自開山同慧理客來潄石號寒泉陶公莫作攢眉態日飲名茶已霍然錢塘吳之鯨德公去去探幽侶前頭第幾峰鳥飛深澗影鹿臥溼苔蹤梵律山中漏經聲夜半鐘往來原不少流水共高松仁和胡𦙍嘉休復十八澗名古君今第幾重屋欺三尺雪門抱萬尋峰抽筍防羣鹿懸松鬥老龍名山終自戀有累尚周顒到此開心地應消歲月長匡牀流作枕阿閣石為梁魚泛橊花赤茶分豆子香不須談妙義白坐到羲皇常恨牽人事無能數爾過危橋撐一石老樹結長蘿理味堪埋跡山情足養和機鋒無可犯妙悟得禪那俞安期羨長經春猶在定芳草沒柴扉蓮漏聽無睡松花服不飢酬僧伸一指伏虎授三皈揮麈生風雨白雲凝翠微華亭陳繼儒眉公山中樵子不識路世上俗人誰識名何當老我松巔閣燒朮蒸藜過此生戴澳斐君龍象何年別重尋識翠微蘚深埋石骨藤陷長松圍雲竇香分乳巖窗翠滴衣忽醒塵海夢相對澹忘歸冬日寄懷佛石大師再訂見訪之約澗邊紅樹半應殘寒色猶多在理安入定不知瓶水凍放參初見石霜乾都忘剡上杯堪渡只把湖南山自看居上饒能營十笏莫愁無地可盤桓師過訪雪竇言返故山詩以送之吾師不行腳為雪到寒巖磴受孤藤印蘚開千歲緘聽詩龍欲醒味法虎猶饞又向湖南路青天颺布帆石公心印定誰傳親到龍潭已十年領取階前沒腰雪不從人覓口頭禪湖南山裏最高峰三十年懸佛石宗不向諸方浪行腳長持瓶拂侍雲松吸盡湖雲興未窮笑他簫鼓逐時工孤山鶴去人何處聖水龍降此鉢中十八澗深禪未寂三生石老素心通欲攜半偈長松下一法燈明叩遠公周宗建季侯幽絕無塵到谿山路幾重石牀常面壁雪徑少人踪捨筏離諸幻司門有二空廣長宣妙偈巖上雨漴漴過訪閣中賦贈佛石大師吳伯與師每攀躋人自鑿空行迥轉枝峰一目平洞嵌花開紅欲笑波翻鳥下白全迎空濛四注原真界幽冷千盤是淨明共道毫光新吐處東峰面壁對孤清錢希言象先溪邊握手共蕭然黃葉青山又隔年袖裏花香猶帶雨門前樹老欲參天每看簷鳥窺中食慣聽江猿啼夜眠將整舊基開白社不知誰施鶴林錢嘉定李流芳長蘅草深沙徑樵夫引苔厚石橋麋鹿行坐久忽聞松籟響此心已敵鏡池清宜興周延儒挹齋湖山淺而媚此地獨奇幽曲澗千林合層巒一寺收風分香供客雨洗石窺樓我亦塵情斷翛然竟日留蔣如奇盤初空山隱靈蹟杖策破蒼烟削壁臨秋澗圍峰束遠天竹看僧眼碧泉味道心玄轉向孤雲坐蕭然箬笠懸王宇永啟披榛十里總崎嶇遠隔高峰與聖湖蔥蒨夾溪通小彴槎枒當路竄封狐雪中掘筍堪留客雨後采茶嘗聚徒不用閉關方入定一潭寒水月明孤張元芳完樸乘興尋幽澗谿廻二九重碧雲浮片石蒼雪落羣峰入定能馴象安禪好制龍苦茗何厭少相對自顒顒李之椿大生蒲團獨悟自當年一徑深深曲澗邊松響不曾妨入定泉香偏自近參禪九峰影逐天花落斗室光從心果圓法覓真詮應許我白雲幽處是諸天山陰祁承㸁爾光渡澗竹為鄰倚巖松是閣為訪遠公來獨慚一宿覺嘉興譚貞默孟恂墟落忽已盡松風引石橋溪紆寒澑轉山捲翠陰招飛啄餘飢鳥行歸伴暮樵此間棲大隱幽澗出詩瓢古剎奇山水荒夷夙為君誅茅驚毒虎補衲拾閑雲春澗籬頭急秋濤嶂外聞閒來譚白法香麈落清芬謝師烹葵江陰黃毓礽介子生無食肉相野供乃可適感師烹綠葵慚愧非上客謝師贈木帳鉤木癭以為鉤遺我伴幽獨於我定無嫌我形亦槁木訪佛石禪師安希范我素禪關杳隔翠微深樵徑榛蕪不易尋巖壑生雲晴漠漠藤蘿蔽日晝陰陰靈泉竹引通香積曲澗篁迷護寶林半榻跏趺心便淨俗塵何事得相臨壽佛石禪師吾師臘樹開第幾手種長松鱗甲起悠悠眼底四清朝忽忽耳中一流水憶昔遯跡南山岑不道俄成祗樹林半空鐘磬江天曉幾個茅齊寒日陰自是吾師具神力禪隱人間人不識持鉢不到長者村疏經肯陞講師席以斯白晝長掩關孤雲一片相與閒有時拄杖看山出自愛衲衣風雨斑門前複澗生古寂那得過從有謝客愧我多年結白蓮壽師此日供怪石賦贈佛石大師陳萬言居一絕澗攀藤自結茆萬峰攢翠五雲交孤猿獨伴僧啼月雙鵲初啣草織巢石乳瀉蓮浮淺沼巖屏列竹綻新苞遠公莫道廬山寂枕上江聲逼樹梢李翥飛侯白社仍森古到門山肅然層臺依石足丈室出松巔檻俯壑容靜窗收峰影連都忘語移日戒虎嘯巖前題長松圖為佛石大師壽老人閉關謝塵事山色泉聲自朝暮試占僧臘誰與齊笑指石邊兩松樹呈佛石禪師王國材小結茅茨碧澗中自甘不與世相通鑿開瓊液呈天巧洗出靈巖劃鬼工施食鳥來投掌慣聽經猿去嘯山空禪扉寂寂深雲鎖俗駕何緣叩遠公十八澗紀事蔣全昌應長湖山鍾靈而結斯澗細流春淙曲瀑夏汕懷彼伊人朗徹冰鑑泠泠澗聲遠雜漁梵自愧勞塵泡影夢幻盤石橫溪柴荊倚樹吾黨躋攀有濟勝具剝啄兔驚濯纓蛙怒大竹臂圍修桐仰顧導泉歸廚洒落如注老佛嶔岑拈花袒襟懺我俗因古貌古心萬籟不生獨鳥囀林杮葉碧黑異窗同陰厭苦人跡復欲巢深諸峰崔嵬月吐其缺鐘鳴鼓歇何以空滅白雲冒枝宛若松雪照耀東山領此幽潔窈窕廻廊與石頡頏下連松閣上達竹房禪榻洞啟中函異香清夜無寐起舞月光厥明湖上烟水茫茫別法雨大師歸自蘇隄桃花未殘空門友別尚咨嗟法雨泉香戀瀹茶人語碧溪沿水樂鳥啼青嶂隔烟霞湖山有意遲歸客風雨無權剝晚花若得薙茅疎結屋南屏隖口作漁家與法雨大師話舊仁和翁汝進憶昔訪澗中故址沒荒草茅屋剛半間土壁風雨倒豫章太守回師勉當學道強仕纔轉頭究竟苦不早倏忽三十年堂閣煥然好師頓悟空空予法頗了了靈根逐日增世諦一時掃接續佛慧命提挈仰僧寶願共棲白雲禪悅可終老奉訪法雨大師徐時泰見可高僧雲臥處工斧徧幽奇猿鳥迷蘿徑江山發藻思已耽靈運賞還誦惠林詩不盡翹瞻意重來謁導師贈佛禪師白楹氣靜秋雲白足閑雪襪明三江終有盡一榻了無生對我淡玄水接言和太羹竹冠幸未敝永結石泉盟同畹仲年兄奉訪法雨大師徐天麟一笠開山虎穴邊雨前雲水證前緣鶴閒伴客過齋苑猿老翻經到講筵絕壑懸燈明獨夜破巖留磬出孤烟與君訂取松巔約每個峰頭住十年蔣紹煃鷺洲處處尋齋乞食還半為參偈半偷閒客因冒雨遲行騎僧自巢雲靜掩關竹色暗添新歲月峰巒猶識舊容顏十年前度來遊者何事風塵鬢已斑春日訪法雨師錢標鼎孟玉問道來春澗巖花已半紅魚鳴鹿苑樹鐘送虎溪風晏坐超塵累澄心悟法空葛巾我無定恨不日相從次家君韻楊文驄龍友津梁深處杳難窮不盡雲烟笑畫工行腳每思逃物外尋師只在此山中鷗忘杯影波光潔虎入牀頭物性通試問六橋橋下水從來佛印有蘇公雪中寄懷法雨大師戴琳如友石為憶安禪處山圍雪愈寒骨清支破衲髮長當蒲冠乞食人歸未啣花鳥自盤別懷同索寞轉眼又冬殘奉訪法雨大師徐懋升逃空大麓隱高名石坐三生面壁成骨似疎峰寒更瘦心同止水冷愈清叢林久蔓殘碑沒卓錫重開古磬鳴貝葉翻餘吟白雪澗泉飛落玉琤琤赴澹社仁和卓爾昌仲昌百谷歸雲色莓苔冷石牀高談輕世諦遠想到空王巢鵲新成壘衣珠舊有光梵音松際入即此是津梁山月方深臥風傳野寺鐘磴喧千澗水門隱數株松香茗塵堪滌伊蒲澹作供慈根新得雨應自日過從沈鼎新自玉仄徑轉叢薄澗聲高下聞寺鐘剛午日巖翠半秋雲趺坐喧還定清齋渥亦醺況逢老支遁長嘯欲離羣寄懷法雨大師蔣拱璧魚從松木場邊倚棹楊梅嶺下住家不向涌泉隨喜幾度凌霄作花鵓鴿繞膝無懼於菟候門不嗔青松萬株傲世白雲半片謀身次太史兄韻周正儒御清迷囂山亦俗獨以癖成幽深樹望無際餘暉漸欲收樵迷崖畔路鳥睨竹間樓搔首層霄上藜鞋到處留吳人龍仲飛潄齒中溪雪晴鐘徹上方泉聲過竹細人影度橋涼茶話收峰色樵歌轉石梁十年塵夢破秋意滿斜陽沈璜璧父重山壁立鳥難行曲磴幽深草亂生九折溪流分澗下幾層茅屋隔雲平秋來一月纔逢客老去經年不入城我有俗緣消未盡佛前來懺世間名金壇王宇春季和烟霞風骨瘦稜層一片禪心冷似冰舉動儼然圖畫裏芒鞋草笠杖枯藤本色住山真衲老多年不肯露機鋒尋常笑語皆心法慚愧今時棒喝宗泰和蕭士瑋伯玉鳥道二三里蟻封十八旋巖際低落日樹杪挂流泉掃地焚香坐開窗聽雨眠閒來持小品怪石古松邊庚午夏日禮法雨大師約十年後相從聊記歲月雷起龍伯石上士明心處深溪繞翠屏閉簾千葉界洗耳萬松聲除卻語言障知君夢覺情相將十年約石上話無生訪佛石禪師仇鐄聲之高情期五嶽小隱得佳山古木成蹊徑危峰出澗環微吟時倚樹愛客不開關所性常空寂天際絕躋攀蔣友筠菉淇石壁懸崖夾道迎翠勻春雨破苔行溪廻山轉自林壑間錯松濤與水聲浩劫荊榛現聖因鬚眉無改本來身真禪不著禪那相石骨高風寄遠神越其𤇍卓凡丰韻秀仍古能臨碧澗清一枝容寄跡雙樹願投誠性自無文澈心從藻句明泉聲深夜冷洗淨世間情辛未暮春參法雨大師賀焜含叔聞說端棲四十年今來參叩豔陽天青峰仄境三生熟碧澗飛泉一脈傳雲流石乳禪關寂月度松陰唄語圓自昔宗風應不墜願將微息