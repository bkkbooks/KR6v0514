歲月添香換茗盡情看藏經樓嶄然青壁閣玲瓏自是飛仙結搆工多少癡人符夢夢我來笑破白雲中符夢閣抹黛塗丹丈六身坐空劫習歷窮塵愁來落落與之語可作忘年一故人佛日巖千章嘉木晝陰陰九折溪聲瀉玉琴幾度倚筇同鶴立空香寒翠滿衣襟九溪橋謁迦陵和尚南屏釋篆玉嶺雲伏虎開山後吾師喜再興國中惟一衲眼裏已無僧不是尋邱壑來求斷葛藤問余因地上還著草鞋曾夏日同金觀察志章丁處士敬過理安澗流屈曲遠相迎耳底塵緣被洗清纔到寺門逢梵放忽聞人語出松聲山青如對畫圖展竹影閒隨拄杖行苔徑無泥沙轉白茲游難得夏初晴理安寺仁和邱峻晴巖危巖陡立款天牖剛風怒下萬松吼餘峰嶄崱排烟空蛟蟠虎踞蹲髯叟大紳屈折挂山腰飛珠跳沫匯清瀏潺潺繞耳瀉銀川澗區十八溪分九山靈愛聽魚子聲默驅五丁平曲岰寶慶之際結精廬喃喃梵唱僧皆偶炎涼閱歷二百餘洪波衝潰嗟烏有契靈開士佛石來枯鍊團茅洗凡垢天笠迦陵踵繼之摶獅馴象精神抖九天飛翰五雲蟠大千佛子皆合手南朝三百半荒烟此寺獨居紺殿右縱由赤足闡宗風鐘奇鬱秀亦天授我來春山螺髻新高枝處處鳴鵶舅落花浮水暗生香輕鯈咂荇齊昻首天生殊境瞬不遑鼕鼕鼓又迎予久入門小憩絕喧囂但聞隔竹敲茶臼道人為我設伊蒲山菘菽乳烹盈缶世間淡澹足天機案頭薄味耐咀口虛堂清話日下舂欲去不去如掣肘開簾栩栩微風生等閒豈與人消受我溯開山轉眼今具間變幻等蒼狗惟有空山泉日流為問昔與今殊否理安寺長白舒瞻雲亭乍入招提境迢迢碧蘚痕斷橋秋水渡破屋夕陽村竹密綠藏寺山深青到門木樨香滿路無隱亦無言西湖漁唱海寧許承祖繩武松篁密翳隱禪林石級層層一徑深梵靜鐘魚馴虎跡溪喧風雨戰龍吟理安寺靜裏能通一指禪嵓前寂歷滴寒泉不知數徧摩醯雨消盡爐中幾篆烟法雨泉涌泉勝蹟比崑崙溪澗朝宗赴海門萬國嵩呼瞻寶翰七峰環拱一峰尊大人峰志逢慧力契靈勳山色溪聲幻見聞說法點頭到頑石也教合掌對慈雲合掌巖四繞烟霞似化城靈區古剎憶佳名空餘興廢無窮感剩有殘鐘發舊聲宏法寺址八月二十五日愚谷招同畕農游九溪十八澗憩理安寺雨宿石屋山樓分韻得月字共成五十四韻仁和龔翔麟蘅圃天生我閒人置之山水窟山容秋最好萬朶青滑笏摒擋裹衣糧入山住一月誰料雨作祟連旬不肯歇街淖一尺泥㶁㶁雙髁沒瑟縮窘閉門有足若被刖兩日頗弄晴愁雲暫時揭良友折簡招質明探𡼿屼聞呼那待速披星扣山閥主人方下牀面垢腳不襪未卜游所向出門太倉卒且窮山一面決意向南發小雨止復零磴路淨且滑洞先水樂探嶺繼楊梅伐登頓竭趾踵迨遝躪藆藅導僧奔而殿輿丁喘方蹶我乏濟勝具有杖手中搰愈入愈深窅細路趨一髮側讓樵擔過聳避牧騎突摩肩箐蒙茸劈面石凹凸松篁繚烟雲陰晴蕩蓬勃密訝施步障森儼臿戟鉞交枝礙衣帽鉤罣掌頻㨡淙淙百道泉隱現勢飄忽龍攫迸磛碞蛇行入林樾鴉軋轉繰車砰訇走霆颰目接不暇瞬耳煩徒覺𦖼身落杳靄間頓疑蛻凡骨徑欲上蓮花坐受羣靈謁聞鐘得禪關渡彴認殘楬松巔閣小坐足力憩𨁸䠈窈窕螺髻峰逼人來咄咄壁捫恐遭虎巢攀定驚鶻許子奮欲前遏之意頗艴萬事貴留餘有興安可竭颯颯悲風生昏霧塞塵𡋯徑黑彳亍艱在輿轉𦤞𠨜歸至青豆房心魂尚怳惚琉璃火青熒瓦鉢香馧馞濁醪煗腳痛清泉澆吻暍一飽無多求山中富筍蕨行廚毋乃奢羅列飣肴核山僧亦多事堆槃佐餅餑大嚼戛饞扠攤飯快一寣四壁亂聒蟲啾唧類嘲訐夜半風雨作澒洞山欲拔游真賺秦關機失詎能越快意謝山靈頌莫罄揚扢二妙詩中豪氣足吞滄浡盤空鬥硬語貼妥兼奡兀而我徒支頤口中生石闕敏銳賦已定不覺喟然曰敢謝石鼎聯願領金谷罰急走浴鵠灣烟中呼艒𦩤十月七日重游理安寺湖山最勝處十八澗九溪移步景隨變引人窮攀躋峽束徑忽絕泉聲指途迷層層青蓮花包裹古招提前游悔草草到此日已西一登松巔閣頗詡得端倪詎知領眾妙蘿月樓始奇憑闌一送目許不我欺畕農極言蘿月之勝烟鬟壓霧鬢駢列羣蛾眉紛紅與駭綠萬象爭妍媸百日看不厭坐享妬老緇下樓復上樓筋力忘其疲法堂兩堵壁水墨含華滋緬懷楊龍友興酣落筆時那計七十年神物猶呵持咄哉法雨泉佛石老濬之滴不舍晝夜旱潦無盈虧何勿宏佛力移此潤畬菑錢塘十萬戶庶免凶歲飢縛關跨南澗獨石危橋支僧送客止此竟返不致辭而我步屢卻回睇有所思雖結山水緣終非邱壑姿身已入仙源俄頃仍乖離誓當逃塵網長往采朮芝山靈為證盟食言考此詩理安寺錢塘厲鶚太鴻老禪伏虎處遺跡在澗西巖翠多冷光竹禽無驚啼僧樓滿落葉幽思窮攀躋穿林日墮規泉咽風淒淒同人遊理安山訪佛石和尚于松巔閣分賦得遇字卻贈釋明水涵于春霽眾象佳良友欣乍遇偶來登松巔憩作小常住老佛動詩懷止客未可去殘梅影猶芬幽鳥聲在樹好讀溪山圖更參風月句與君成二老各得個中趣人生苦拘牽榛棘閡敗絮白日可笑人而吾忽干怒將欲逃蓬瀛海決不可渡用拙我法孤戾時應可懼賴有青松交披豁見情素眷眷理歸筇澗南山色暮曉入理安山訪智公方丈行盡西湖西復西望中清曉入林棲侵人嵐翠渾頭冷落杖霜華滿袖攜問法爾時懷舊雨予自丁卯至壬申數訪佛石法兄論禪于此看山今日愛新題智公出艮山詩稿示予二非閣上聊茶話石磬聲高仗力齊甲戌秋日同沈鵬游理安寺贈嘯亭上人錢塘嚴誠力闇已公詩法好見面不尋常為設伊蒲饌因來青豆房萬峰參岫色一鳥破溪光欲結三生契團瓢學坐忘同作錢塘沈鵬振飛故人游白業偕我過紅樓詩愛支公好情緣仲子幽活泉澄照月古木靜含秋欲就香蓮界容參六字不理安寺四首仁和程之章端明古寺埋烟翠殘冬客到稀過橋山澑折隔竹午鐘微野雀巡齋鉢寒雲綻衲衣諸天香梵寂何處著塵機仄磴紆輕策名山占老僧天書暉寶網祗樹拓金繩日薄淒鈴語霜乾出澗稜松巔高閣在瀟洒得閒憑壞壁金容儼空堂扇影銷千燈誰與續三宿戀非遙虎嘯風驚定鴉翻月墮宵昔遊看歷歷檢點舊詩瓢曲筧多通屋枯藤半繡苔江空羣木撼塔迥亂峰堆瀹茗淹禪榻攤經上石臺翻思山果熟五月趁楊梅入南澗禮箬祖塔釋際月一輪蕭森雲樹擁佳城屼㟮浮圖聳太清道衍曹溪千古盛燈懸磬嶺十虛明龍潛澗曲春波靜虎變巖陰午籟生慚愧孫枝寥落甚瓣香燒罷意怦怦春朝遊虎跑真珠二泉遂歷馬鞍山憩九溪石壁精舍錢塘陸彥龍驤武佳氣盈春山鳴珂展歬綏臨風一徘徊縱橫任所思所思在深林佳茗皜於絲沈烟煮茗水鑒味別澠淄幽賞動移晷晨光何稀微高興陟層山絕頂窮巍嶷猿狖向人嘯虎豹為我啼從遊懾心目悲風傷春荑策杖𤢜行邁鳴澗緣高棲列館疏傾崖石壁延遙枝披榛覓新術廻步迷故蹊三徑開蔣生庭無求羊綦冥坐悟物化達理不可欺誰能同妙善存情與推移遊理安寺錢塘魏之琇玉橫積翠淡斜曛林巒到寺分雨隨清梵歇潮接暮鐘聞客過題寒竹僧閒掃白雲湖山猶望幸佳氣轉氤氳仲秋雨中游理安寺奉訪智公和尚海寧楊式玉岏白上方鐘引路幽奇衣袂沾濡興不疲到此名山真可釋重來勝地果何時琳琅詩句清機發馛郁天香靜處隨塵跡未遑巖際宿過溪橋滑下遲遲時蒙見示詩稿登大人峰釋實惠雨懷有峰號大人屹立清虛表披雲造其巔一覽眾山小理安寺與智公上人話舊江寧周榘幔亭理安真佛地訪我舊時盟語挈心如揭山深氣自清螺峰插天碧法雨灑巖鳴十載重過此翛然塵夢驚理安夜坐錢塘張世犖無夜分得禪單制睡蛇夜蟲撲火落燈花更無人語僧初定續聽鐘聲月漸斜暗滴細泉知法雨默持半偈悟恒沙昏沈掉舉俱雙遣的的禪心淨七遮寺樓曉起鳥語入殘夢凭闌欲曉時天低叢樹逼雲駛一峰移石桂烟猶羃盆荷露未稀僧雛傳靧面取次嚼楊枝遊南澗留贈佛石禪師二絕仁和錢魯珍葆文迸珠濺玉瀉明砂白石溪流曲徑斜啼鳥靜時聞磬發青山斷處見人家閒憩南山香積廚雲深樹老見真如禪房鉢供曇花水講殿經繙貝葉書禮箬菴祖塔釋越磵漁陸九曲河連四海遙無時不作大波濤龍潛鯤化知多少一勺源頭冷自高溪橋晚步僧際予萍若一團蒼翠四圍山鳥不多鳴花亦閒小立石橋看明月水從杖底落溪灣賦理安寺賦以七峰環繞雙澗合流為韻海寧許承祖復齋溯夫靈境宏開異人間出古院肇興涌泉立室兼眾美於湖山現諸天之表率展金碧以成叢擅清幽而無匹綜靈竺以成三指峰巒而備七惟是廢興迭遘創造欣逢法宣上乘義貫真宗欽異數於先皇布金舍衛仰重光於聖主叠賜鸞龍閱歷三朝極輝煌于耳目繽紛五綵振聲響於鐘鏞冺一塵於深隖集萬景於高峰其水則諸溪爭赴眾澗遙環既湯湯而下注亦脈脈以成灣法雨晴飛和松風於竹閣天花晝墜紛煮雪於雲關亭收鶴影橋度波間漁唱金牛捲葑蒲於瀲灩潮來羅剎撼鼓角於塵寰其山則大人端拱於寺西八覺趨承乎林表禮彌陀於巖畔廻象依依瞻佛髻之光生青螺皎皎高翔白鶴鹿眠符夢以來馴傍睨蹲獅虎跡潛騰而自杳幸合掌之時迎憶挂瓢之獨紹巖岫分妍松篁外繞至若大扇審基於五季契靈繼起於中邦信慈雲之溥被矧猛獸之能降功深悲憫氣溢敦龐門崇不二智證無雙耿台囐之傳燈慧力挽五雲之律聳箬菴之古塔勝音冠三折之江爾乃佛日仍標化城重幻歡並龍天心傾仕宦臺增寶座之華徑築梯雲之棧拓宏法於故菴砥洪流於碧澗繡屏幽曲楚江之芝草常搴琪樹陰森優缽之曇花分瓣則見鳴佩鏗鏘香車紛沓騷客來遊名賢下榻聲清石磬翠華密契以頻臨樹仰勝幢宸翰遙宣而下答悠悠乎覺桃花流水之引人飄飄然疑瑤島瓊臺之驟納烟靄千重雲霞四合維時舍畫橈於湖曲沿赤埠於林邱憶昔年之澹社訪當代之名流星漢高凌晴挹翠微錦繡笙簧時戞根蟠古樹蛟蚪披長蘿以深入結勝侶而偕求且住高譚隱僧廬於叢薄相逢微笑適仙境於岑樓行將與高禪共忘乎山中之歲月而又何問乎世上之春秋疏十八澗結庵疏仁和胡𦙍嘉休復妙有之士囂塵勿違息心之人貌服必變故入深不厭亢俗斯全遁寂逃喧慮歸一致茲有佛石禪師少年通俠刻厲文采悟榮華之奄忽痛緣業之支離悔謝雕蟲委身猛鷙卑棲卜築掩室雙林雲氣孤回溪聲同逝靈心往還象意俱得第椽瓦未周鳥鼠攸入挂瓢或礙見山豈忘為告同志共結勝因無緣則慈增愛非捨財無豐嗇其在喜施法捐人我都成報利庶班荊蔭松之子不疲於津梁而破癡驅吝我輩咸棲於蓮社云耳重建理安禪寺疏吳之鯨德功由南山水樂洞度楊梅嶺為九溪十八澗峰廻巘合溪流清淺游屐初到恍然方壺員嶠不復知有塵世誠哉精修奧區也舊有理安寺為毒龍幻去鞠為茂草久矣禪師佛石見而樂之依泉結茅僅容膝耳棲水卓仲昌昆季及不佞與師訂方外交遂稍為經紀先後葺數椽既而馮開之大史來結澹社卓去病胡休復仲昌錢孟玉輩月凡一往乃四方有道耆宿并參請之士屨交脫戶外而客愈廣室益隘矣頃吳本如竇淮南兩方伯暨黃貞父留連信宿不忍捨去共訂後期為他日曳杖相從佳勝也余因從臾師拓基鳩工中設佛龕縱橫各五楹而諸同好咸踊躍願為勸募大約使高僧修祗參習即為鹿苑之雲房名士結伴恬棲即為虎溪之蓮社實為海內津梁非徒一壑自擅已也凡具夙因兼稟勝情者幸發歡喜心作大功德當與名山俱傳不朽矣仁和黃汝亨貞父佛石師往余見之靈鷲山別去十餘年今且誅茅結庵于十八澗中南山最幽絕處真實修行四方勝流多歸之余館玉岑為客塵所溷願假息一日潄流枕石而不易得出世人之絕塵而奔其易如此余歎羨久之頃吾友朗士作緣引更期為設龕五楹廣容勝流比於鹿苑虎溪予亦願投四大作此中一宿三過人也立為捉筆題而助之四方聲應當必不少雖然何事旁求即緣引所稱述諸君肯中興理安者不減雲臺矣樊良樞豫章西湖長於南北兩山間屐跡無所不至而九溪十八澗屐齒不至焉聞澗有法雨泉泉洒注如雨從石脈中流出理安寺踞其西偏歲久一片地落虎獌穴中是以人跡亦罕至佛石禪師結龕修行黃貞父稱其出世人絕塵而奔予謂非奔也比夫踢飜軍持嬴取溈山者也師不出山數十年西湖長莫得見其面昔遠公住廬阜三十年結蓮社十八賢皆當時名流謝康樂求入社不可得遠公謂其心雜得道成佛靈運終身愧慧業文人矣予不逮康樂遠甚固宜佛老龕中無西湖長屐跡也雖然劉遺民陶元亮皆先時為守令其入社乃在解組之後而康樂非其人也師能堅遠公桑榆之志以貞父諸君繼元亮修靜之躅而予從吳伯霖胡休仲卓去病仲昌諸君子後收之白社所謂得果此緣真一段奇事也時辛亥仲秋二日長水岳元聲往來禪者道佛石師據萬山中竟钁頭邊事楊君持手冊過余余舉向山中曰師亦打這鼓笛耶因之有感於山靈興廢之間當其巋然獨存牛羊不至鳥雀之聲不聞靈鷲有知空谷無恙一旦人境交加物我並峙草本無春山靈都盡余每過靈山洞壑老古錐開闢處往往一廻一感歎不謂師之有此舉也余讀師九日澗中詩嬾攜竹杖登高去孤負山前落帽風知師有意無意乎此舉也願借帝釋一莖草移向九溪十八澗中為師建理安寺竟知師當為余點頭一笑胡𦙍嘉佛石禪師將興復理安贊告四方盡於德公之引矣何煩余言第念少時同去病讀書薇隖與師為方外莫逆極推許師嘗作心生法生論論多破的走金陵謁紫柏大師問以經義不能屈臨行至囑深藏幽谷以悟為期歸遂徧搜兩峰得理安於荒烟野露中樂而棲之晝捃橡栗夜班荊草虎嘷於前狐穴於後恬如也於是師之道望如晨風之鬱起吳德公首為檀施架阿閣一層始有安禪之處矣而師之聲愈張問津明聖者未有不之澗中者也卓仲昌又為益三楹焉庚戌之秋感遺址而歎曰理安之廢甲子載周是為一紀數之終也終則復始斯其興矣乃以德公之言謂余曰吾將因基拓宇背為禪堂四方息心之侶參訪來茲庶有棲宿之地乎余曰東南佛事熾矣雲棲之淨土徑山之禪寂皆為緇素法場未有誘接居士如匡山蓮社者也夫情靈起伏萬緒千端則智多而愚冥澄心束影祛惑破癡則僧易而俗難故遠公東林其一時如劉遺民雷次宗宗少文周續之諸人半於釋子非獨以高情勝韻足展談笑真以度庸人百不如度慧心人一也然遠公招來淵明簡斥靈運微有分別之意師以廣大教化無所不引創東南希絕之事不更宏闊矣哉余觀廬山所記連甍如綺號為曠謐未聞致遠公抱冊叩門而請今刺名澗中者寧止十八人荷持像法當無不躍然而起者故曰是役也有三善焉理安無黍離之傷拈華有中興之所名流韻士置想依空一洗其妻肉文綺之障功德最無量矣書理安寺緣疏後栖水卓爾昌仲昌佛石大師與我輩同游不減惠休從鮑懷一侶陳也其標情妙覺如朗月靈懸清風獨寫甲午歲忽戴笠擔瓢走南山十八澗澗即理安舊址始毁毒龍繼棲豺虎獸啼鳥跡人蹤欲絕師誅茅編草一鐺自安將終身焉人固不知亦不欲人知也先是踪跡之者余與吳德公嗣後開之馮師黃寓庸胡休復暨余兄去病同為澹社藍輿往叩虛往實歸幾廿載矣頃以寓庸德公兩先生創議建剎四方雲起非師人龍威鳳慧譽夙敷能爾哉第師甘麤衣惡聚材鳩工實非師志余故為綴數語以明其志序澹社序吳之鯨由石屋沿水樂洞度嶺為十八澗山勢峭逼曲澗蜿舞樵語炊烟闃隔數里乍入其中真如雲井化城都未經見忽然溪窮山盡暫欲小憩谽谺復豁別開一境層梯碧映巖壑奇杳宛若小武夷又似嚴陵七里最幽最勝南北諸山所絕少者也地幸荒蕪既無紺殿華林之設又無行人可為嚮道客至急無所調其飢渴以故游屐亦絕少于是佛石禪師喜甚遂依阿團茅枯鍊于此蒲簷無瓦高不過眉雨至戴傘坐室中或時凍雪三日瓶儲俱空有好道者賫升糧挾燧石往訪之發火煨粥陶然清傲遂不復入城市今數十年矣居旁有一池水清冽出虎跑諸泉上危壁蒼蘚蒙護其下游魚翛沒噴如雨花余每與師踞坐池上竟日無一言神氣淒肅不復知在塵世亦不願塵世人聞聲雜至因共訂澹社為無言清坐之會馮開之太史黃貞父胡休仲卓去病仲昌諸君聞而樂之趣來同事每月一會茗供寂寞隨意談楞嚴諸經教外別傳元旨後期薄罰以督之溪光山翠俱赴杖履此社幾與廬山爭勝余因語師太史今之坡公也龍泓辨才一派清嚮與澗相接願毋相負如不佞與胡卓諸君隨意稱無咎魯直何不可矣壽法雨大師序蔣全昌天不可捫也海不可揭也崑崙五嶽不可權度也寰內之大莫踰夫海山然圖經物志有能窺高深測遐邇者唯道體彌綸宇宙包括六合大足以無外細足以納芥未始容其窺測也猥以一斑之管竟全豹一勺之蠡窮望洋道亦宜乎可見錢塘法雨大師隱十八澗三十餘年天不愛道產此偉人萬壑千峰一缾一鉢擷芝菌以當饘粥蘇蘭桂以代柴薪聯槲葉成衣冠斟寒泉為乳酪眠分虎狼之席吟隨猿鳥之行風霜古其容日月增其臘烟霞痼其志雲水洽其神手培尺咫之松而欲干青霄矣坐觀江海之濤而幾變桑田矣昔惟一蓋上雨旁風而今精藍鱗次矣昔止一身鷦巢鼠飲而今漁梵雷鳴矣昔也同類不見其蹤跡樵子不知其姓名今也遠方得而依皈公卿得而護持矣僕往來問道遊師之門寒暑凡十五易覺師口如鐘鏞無考不答法如霂霡無土不濡建經獅律虎之幢御鹿苑牛車之乘炳心燈而燭目前魑魅出慧鍔而斬言下葛藤真選佛之銓衡天人之阿傅也師善文而能不篇連師善講而能不鳩聚對賢士大夫未嘗妄投一偈遇鈍根小器未嘗妄豎一拂韜光晦影唯恐人知邁古軼羣終成我貴高士所以景仰匪人所以畏憚以故浮譽罕騰乎流俗因緣懶樹乎塵鞅挈同心於松竹之林恒患儲無儋石勵後學於江山之滸方忻教有鑪錘螺髻峰鹿臥巖涌泉井種種疑出鬼工松巔閣挂衲齋青篛庵步步漸升天際苦行積年為巖穴棲遲之黃面利生多術為東南接引之白眉人咸謂匡廬復社曹溪再世矣師之煦僕既非一朝夕奈人我山高煩惱塹闊徒似點頭之頑石還如無口之匏瓠躡禪梯而不登其巔挽慈桴而不濟其涘能不遠慙龐老近愧石公乎龍飛首歲令在玄英大師之誕辰一週之甲子山侶門人望風趨謁固知火棗交梨不必果菩提之樹伐毛洗髓不足染功德之池然僕素荷甌陶願殊華祝略陳大概敬獻小章遂為之歌曰澗之中翠微之宮其谷也容其草也豐師惟安禪實金仙之臥龍澗之左白石磊砢其苔也裹其藤也鎖師惟安禪斯濯足而消夏澗之右雲窩雪竇其鶴也瘦其蘭也臭師惟安禪歌考盤之雅奏澗之陰烟巒鬱深其清也音其猿也吟師惟安禪故能不動其心澗之陽水聲鏘鏘其泉也香其松也蒼師惟安禪樂年壽之永長記南澗棲禪記仁和周雯埜谿歲次壬申十月既望有南澗僧界弘因山中安禪制期約余昆季進山坐七以事不果越二日偕季弟雨田肩輿往理安禪寺寺乃宋建古剎也時值陰雨木葉盡脫山色空濛溪流吞汩亦一奇觀至彼禮佛已同參六吉和尚齋罷遂入禪堂與大眾和尚敷座而坐余與弟各東西向堂中僧共四十餘輩俱跏趺習靜四無人聲以炷香一枝為率香盡擊雲板一聲大眾俱起經行復視香燼啟戶持香板二人率大眾同出方便不許交談聚首仍隨眾入堂趺坐一日間大約炷香八枝凡坐香一枝後即經行一枝至日落時少息片晷交黃昏又進堂依前坐定持香板僧輪班四面巡視有閉目思睡者即以香板撻之夜深萬籟俱寂燈光熒熒四面僧眾或結跏坐者或垂足坐者或倦極不敢坐而立者或背立者或席地坐者惟聞香板聲不絕耳舉目視之見有垂首微動作點頭石狀者有驚寤而凝睇者有攲側欲跌如醉翁者有避扑而強作惺惺者有旋受扑而旋寐者千態萬狀笑幾失聲急自問欲笑者是誰強忍乃止總之在堂大眾從朝至暮自昏及晨無有一人不疲倦被撻者惟予僅免焉蓋緣心清神自不昏耳夜間亦炷香為率香燼時聞林間鳥漏下五更矣始放參小憩及東方既白鼓鐘間作眾復如昨行坐威儀井井程子云三代禮樂皆在此洵非虛語如是者凡七晝夜其時雪霰飄空烟嵐罩樹山徑蕭條人跡罕至心境雙清萬緣放下獨是余夙根淺薄未得一知半見以是為愧聊賦一詩為之解嘲然此一著子乃轉聖超凡之捷徑原非易易者竊謂人在熟鬧場中度日安肯做此冷淡生涯即有人偶向此中暫討消息或境靜心馳身閒意亂者有矣予第覺意思蕭閒毫無昏散想前生應是苦行頭陀喫冷齋飯過來者不然何以至今嚮往也是為記書復箬庵問禪師書釋道忞恭惟座下中和善誘得之往來誦說者多矣方以不獲見提唱語為憾忽教況下頒并惠新錄一披展再讀青山白雲開遮自在真古老所謂弄大旂鼓手非耶敬為禹山忻慶曷量某譾劣無庸詎堪齒錄乃兩奉手示過于奬藉豈非慈悲太殺無所不用其循循者歟敬領厚愛拜手以謝餘希恕悉弗備又前歲山兄始趨寂客冬晦老復真歸賢人相繼隱淪天地豈真遂閉乎淮楚素輕僄復奪乃良導弟知其從冥入冥也必矣聞兄悲愍迻座竹林庶幾慧照復懸不審然乎否耶本欲親詣寶坊躬申弔問奈東作方興會有百畮不易之憂特遣侍僧代慰所有俚言薄奠乞為弟陳挂靈堂聊表寸心而已臨書無任涕零之至上理安箬庵大和尚李皋香嚴跽讀法語真一滴獅子乳也皋生何辰得以親炙佛會面奉提撕雨溉寒林風揚煦渚不動一步已到華嚴世界矣曹溪一脈星日常明端於吾師有賴獨是世道衰微人心漓昧曩云世間塵勞如鉤鎖連環相續不斷不覺不知被他引入羅網而今世間塵勞更何等塵勞耶望吾師建大法幢度生死苦或灑甘露或振疾雷俾善信知歸緇素返本攪長河為酥酪變大地作黃金固知黃檗老人痛施三頓棒至今縮手不得也行見大徹堂中一夜消息悟十八人者相繼而起此蠢動含靈山河世界之福矣竊念皋生愚拙俗累尚輕而自揣生前似於者個相近然不能捨得性命下手便了每讀湛堂云一切現成遂而生疑如古德云直下承當又云擬欲起心動念承當早已蹉過此不能冰釋者礙膺之物非和尚莫除昔大慧禪師因李獻臣之問遂書十八則與之皋今日用應緣處如何做工夫敢備素楮一幅亦以此請弟子李皋頓首上再上箬庵大和尚李皋嗟乎一切天下人不知有佛祖者即被不知有障知有佛祖者即被知有障甚至家私其學戶師其說互相詆誹意見百千皋竊憂之即謂佛祖異矣而黃老異乎黃老異矣而孔孟異乎孔孟異矣而事君治民異乎饑食困眠異乎妻子聚頭處異乎賓客往來處異乎當未有三教之先是個甚麼既有三教之際是個甚麼三教不分之處是個甚麼三教各分之後是個甚麼止逐三教之流不窮三教之源正如蝦蟆在壑不識大海蚯蚓在窟不窺名山即玄不訕乎禪而無如禪之絕物太高也禪玄不棄乎儒而無切儒之立己已甚也遂至流弊無窮本來盡失當今之世禪之病在言句玄之病在精氣儒之病在詩書看得破則言句精氣詩書無非妙道然從何處看破乎種種差別即此無差別因緣種種疑惑莫非無疑惑實地昔普覺禪師曰直要到古人腳踏實地處不疑佛不疑孔子不疑老君然後借老君孔子佛鼻孔要自出氣伏望和尚興慈運悲利益一切不惜葛藤更為逗漏題跋題箬庵問禪師普說釋通際山茨昔妙喜老人詆默照邪禪謂之斷佛慧命不通懺悔而今之杜撰師僧胡喝亂喝不識好惡咸謂德山臨濟兒孫其害尤甚於默照邪禪耳予嘗喟然太息無能砥柱狂瀾丁丑夏忽得理安法兄普說其語諄諄料揀時弊通身手眼殺活臨時真不減妙喜之排斥邪禪也捧讀數過向之太息者不覺轉而釋然矣天童老人謂從古尊宿料揀禪弊無尚妙喜予則謂當代料揀禪弊者其惟我理安法兄乎諸方明眼者定當以予言為不謬
